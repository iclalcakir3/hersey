          <div class="modal-scroll">
            <div class="field-label" style="margin-bottom:6px">Başlık</div>
            <input id="todo-baslik" class="field-input" placeholder="örn. Tiyatroya git, Kitap oku..." value="${esc(f.baslik||'')}" style="font-size:15px;font-weight:700;margin-bottom:12px" oninput="todoForm.baslik=this.value"/>
            <div class="field-label" style="margin-bottom:8px">Etiket</div>
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px">
              ${ETIKETLER.map(([v,em,clr,bg])=>`<button type="button" onclick="todoForm.etiket=todoForm.etiket==='${v}'?null:'${v}';render()" style="padding:6px 4px;border-radius:20px;border:1.5px solid ${(f.etiket||'')===v?clr:'var(--border)'};background:${(f.etiket||'')===v?bg:'var(--bg)'};color:${(f.etiket||'')===v?clr:'var(--sub)'};font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;text-align:center">${em} ${v==='diger'?'Diğer':v.charAt(0).toUpperCase()+v.slice(1)}</button>`).join('')}
            </div>
            <div class="field-label" style="margin-bottom:6px">Not <span style="font-weight:500;opacity:.6">(opsiyonel)</span></div>
            <input class="field-input" placeholder="Kısa bir not..." value="${esc(f.not||'')}" style="font-size:13px;margin-bottom:16px" oninput="todoForm.not=this.value"/>
          </div>
          <div class="modal-footer">
            <div class="modal-btns">
              <button class="save-btn" onclick="surezKaydet()" style="margin-top:0;background:#2A9E78">Kaydet</button>
              <button class="modal-btn-cancel" onclick="todoForm=null;render()">Vazgeç</button>
            </div>
          </div>
        </div>
      </div>`;
    }
    html+=`<div style="height:20px"></div>`;
    return html;
  }

  let goruntule=state.todos.filter(t=>{
    const v=t.vade||t.oncelik||'orta';
    if(v!==todoVade)return false;
    return true;
  });

  // Sırala: deadline önce, sonra ekleme sırası
  goruntule=[...goruntule].sort((a,b)=>{
    if(a.tamamlandi!==b.tamamlandi)return a.tamamlandi?1:-1;
    if(a.deadline&&b.deadline)return a.deadline.localeCompare(b.deadline);
    if(a.deadline)return -1;if(b.deadline)return 1;
    return 0;
  });

  // Her vade için sayılar (aktif)
  const sayilar={};
  ['kisa','orta','uzun'].forEach(v=>{
    sayilar[v]=state.todos.filter(t=>(t.vade||t.oncelik||'orta')===v&&!t.tamamlandi).length;
  });

  // Özet şerit
  const _RENK={kisa:'#C84848',orta:'#C87828',uzun:'#4A70B0'};
  const _BG={kisa:'#FAE8E8',orta:'#FAF0DC',uzun:'#E4EEF8'};
  const _LBL={kisa:'Kısa',orta:'Orta',uzun:'Uzun'};
  html+=`<div style="display:flex;gap:6px;margin-bottom:16px">
    ${['kisa','orta','uzun'].map(v=>`
      <button onclick="todoVade='${v}';render()" style="flex:1;padding:8px 6px;border-radius:12px;border:1.5px solid ${todoVade===v?_RENK[v]:'var(--border)'};background:${todoVade===v?_BG[v]:'var(--card)'};cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .15s">
        <span style="font-size:16px;font-weight:800;color:${_RENK[v]}">${sayilar[v]}</span>
        <span style="font-size:10px;font-weight:700;color:${todoVade===v?_RENK[v]:'var(--sub)'}">${_LBL[v]}</span>
      </button>
    `).join('')}
  </div>`;

  if(goruntule.length===0){
    html+=`<div class="empty">
      <div class="empty-emoji">✅</div>
      <div class="empty-title">'Bu vadede görev yok'</div>
      <div class="empty-sub">+ butonuna basarak görev ekle</div>
    </div>`;
  } else {
    goruntule.forEach(t=>{
      const gecikme=t.deadline&&t.deadline<today&&!t.tamamlandi;
      const bugunmu=t.deadline===today&&!t.tamamlandi;
      const deadlineLbl=t.deadline?(() => {
        const d=new Date(t.deadline+'T12:00:00');
        const diff=Math.round((d-new Date(today+'T12:00:00'))/(1000*60*60*24));
        if(diff<0)return`<span style="color:#C84848;font-weight:700">${Math.abs(diff)}g geçti</span>`;
        if(diff===0)return`<span style="color:#C84848;font-weight:700">Bugün</span>`;
        if(diff===1)return`<span style="color:#C87828;font-weight:700">Yarın</span>`;
        return`<span style="color:var(--sub)">${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}</span>`;
      })():'';

      const isListe=t.tip==='liste';
      const altMaddeler=t.altMaddeler||[];
      const tamamlananAlt=altMaddeler.filter(a=>a.tamamlandi).length;
      const acik=t.acik||false;

      html+=`<div style="background:var(--card);border-radius:16px;border:1.5px solid ${gecikme?'#F0C8C8':bugunmu?'#F0D8A0':'var(--border)'};margin-bottom:8px;overflow:hidden;opacity:1">
        <div style="padding:12px 14px;display:flex;gap:10px;align-items:center">
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:700;color:var(--text);text-decoration:none;line-height:1.3">
              ${esc(t.baslik)}
              ${isListe?`<span style="font-size:11px;font-weight:600;color:var(--sub);margin-left:6px">${tamamlananAlt}/${altMaddeler.length}</span>`:''}
            </div>
            ${t.deadline?`<div style="font-size:11px;font-weight:600;margin-top:2px">📅 ${deadlineLbl}</div>`:''}
          </div>
          ${isListe?`<button onclick="todoAcKapat('${t.id}')" style="width:26px;height:26px;border-radius:7px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;color:var(--sub);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .2s;transform:rotate(${acik?180:0}deg)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button>`:''}
          <div style="display:flex;gap:4px;flex-shrink:0">
            <button onclick="todoDuzenle('${t.id}')" style="width:26px;height:26px;border-radius:7px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button onclick="todoSil('${t.id}')" style="width:26px;height:26px;border-radius:7px;border:1.5px solid #F0C8C8;background:#FAE8E8;cursor:pointer;display:flex;align-items:center;justify-content:center">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#C84848" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
            </button>
          </div>
        </div>
        ${isListe&&acik?`<div style="border-top:1px solid var(--border);padding:8px 14px 12px">
          ${altMaddeler.length===0?'<div style="font-size:12px;color:var(--sub);text-align:center;padding:8px 0">Henüz madde yok — düzenle ile ekle</div>':
            altMaddeler.map((a,i)=>`<div style="display:flex;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">
              <span style="flex:1;font-size:13px;font-weight:600;color:${a.tamamlandi?'var(--sub)':'var(--text)'};text-decoration:${a.tamamlandi?'line-through':'none'}">${esc(a.baslik)}</span>
            </div>`).join('')
          }
        </div>`:''}
      </div>`;
    });
  }

  // Form modal
  if(todoForm!==null){
    const f=todoForm;
    const fTip=f.tip||'tek';
    const altMaddeler=f.altMaddeler||[];
    html+=`<div class="modal-overlay" onclick="if(event.target===this){todoForm=null;render();}">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">${f.id?'Görevi Düzenle':'Yeni Görev'}</div>
        <div class="modal-scroll">
          <div class="field-label" style="margin-bottom:8px">Tür</div>
          <div style="display:flex;gap:6px;margin-bottom:16px">
            <button onclick="todoForm.tip='tek';render()" style="flex:1;padding:10px 4px;border-radius:10px;border:1.5px solid ${fTip==='tek'?'#6B3F28':'var(--border)'};background:${fTip==='tek'?'#FAF0DC':'var(--bg)'};color:${fTip==='tek'?'#6B3F28':'var(--sub)'};font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer">✓ Tek İş</button>
            <button onclick="todoForm.tip='liste';if(!todoForm.altMaddeler)todoForm.altMaddeler=[];render()" style="flex:1;padding:10px 4px;border-radius:10px;border:1.5px solid ${fTip==='liste'?'#6B3F28':'var(--border)'};background:${fTip==='liste'?'#FAF0DC':'var(--bg)'};color:${fTip==='liste'?'#6B3F28':'var(--sub)'};font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer">☰ Liste</button>
          </div>

          <div class="field-label" style="margin-bottom:6px">${fTip==='liste'?'Liste Başlığı':'Görev'}</div>
          <input id="todo-baslik" class="field-input" placeholder="${fTip==='liste'?'örn. Çeyiz Listesi...':'örn. Faturayı öde...'}" value="${esc(f.baslik||'')}"
            style="font-size:15px;font-weight:700;margin-bottom:16px"
            oninput="todoForm.baslik=this.value"/>

          ${fTip==='liste'?`
          <div class="field-label" style="margin-bottom:8px">Alt Maddeler</div>
          <div style="margin-bottom:8px">
            ${altMaddeler.map((a,i)=>`<div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">
              <input class="field-input" value="${esc(a.baslik||'')}" placeholder="Madde..." style="flex:1;font-size:13px;font-weight:600" oninput="todoForm.altMaddeler[${i}].baslik=this.value"/>
              <button onclick="todoForm.altMaddeler.splice(${i},1);render()" style="width:30px;height:30px;border-radius:8px;border:1.5px solid #F0C8C8;background:#FAE8E8;cursor:pointer;font-size:14px;color:#C84848">✕</button>
            </div>`).join('')}
            <button onclick="if(!todoForm.altMaddeler)todoForm.altMaddeler=[];todoForm.altMaddeler.push({baslik:'',tamamlandi:false});render()" style="width:100%;padding:8px;border-radius:10px;border:1.5px dashed var(--border);background:transparent;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--sub);cursor:pointer">+ Madde Ekle</button>
          </div>`:''}

          <div class="field-label" style="margin-bottom:8px">Vade</div>
          <div style="display:flex;gap:6px;margin-bottom:16px">
            ${[['kisa','Kısa','#C84848','#FAE8E8'],['orta','Orta','#C87828','#FAF0DC'],['uzun','Uzun','#4A70B0','#E4EEF8']].map(([v,lb,clr,bg])=>`
              <button onclick="todoForm.vade='${v}';render()" style="flex:1;padding:10px 4px;border-radius:10px;border:1.5px solid ${(f.vade||'orta')===v?clr:'var(--border)'};background:${(f.vade||'orta')===v?bg:'var(--bg)'};color:${(f.vade||'orta')===v?clr:'var(--sub)'};font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer">${lb}</button>
            `).join('')}
          </div>

          <div class="field-label" style="margin-bottom:6px">Son Tarih <span style="font-weight:600;opacity:0.6">(opsiyonel)</span></div>
          <input type="date" class="field-input" value="${f.deadline||''}" style="font-size:14px;font-weight:600;margin-bottom:16px"
            onchange="todoForm.deadline=this.value||null"/>
        </div>
        <div class="modal-footer">
          <div class="modal-btns">
            <button class="save-btn" onclick="todoKaydet()" style="margin-top:0">Kaydet</button>
            <button class="modal-btn-cancel" onclick="todoForm=null;render()">Vazgeç</button>
          </div>
        </div>
      </div>
    </div>`;
  }

  html+=`<div style="height:20px"></div>`;
  return html;
}

function buildTakip(){

  if(!state.takip)state.takip={randevular:[],abonelikler:[],odemeler:[],harcamalar:[],etkinlikler:[]};
  if(!state.takip.etkinlikler)state.takip.etkinlikler=[];
  if(!state.takip.harcamalar)state.takip.harcamalar=[];
  const today=todayStr();
  const now=new Date();

  const SEKME_CFG={
    odeme:{lbl:'Ödemeler',renk:'#C87828',bg:'#FAF0DC',liste:state.takip.odemeler,icon:SVG.odeme},
    harcama:{lbl:'Harcamalar',renk:'#B84A6A',bg:'#FAE8F0',liste:state.takip.harcamalar,icon:SVG.harcama},
  };

  const cfg=SEKME_CFG[takipSekme];

  let html='';

  const liste=cfg.liste||[];

  // ── ÖDEMELER ──
  if(takipSekme==='odeme'){
    // Sub-tabs: aylık / yıllık
    const odPeriyot = typeof odemePeriyot!=='undefined'?odemePeriyot:'aylik';

    // ── Yıllık özet hesapla (sadece aktif periyottaki ödemeler) ──
    const tumOdemeler = state.takip.odemeler||[];
    const yillikOzet={};
    tumOdemeler.filter(o=>(o.periyot||'aylik')===odPeriyot).forEach(o=>{
      (o.gecmis||[]).forEach(g=>{
        if(!g.tutar)return;
        const yil=g.tarih?g.tarih.slice(0,4):g.ay?g.ay.slice(0,4):null;
        if(!yil)return;
        if(!yillikOzet[yil])yillikOzet[yil]={toplam:0,adet:0};
        yillikOzet[yil].toplam+=g.tutar;
        yillikOzet[yil].adet++;
      });
    });
    const yillarSirali=Object.keys(yillikOzet).sort((a,b)=>b-a);

    html+=`<div style="display:flex;background:var(--bg);border-radius:14px;padding:3px;gap:3px;border:1.5px solid var(--border);margin-bottom:16px">
      <button onclick="odemePeriyot='aylik';render()" style="flex:1;padding:9px;border-radius:11px;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;background:${odPeriyot==='aylik'?'var(--card)':'transparent'};color:${odPeriyot==='aylik'?'var(--text)':'var(--sub)'};box-shadow:${odPeriyot==='aylik'?'0 2px 8px rgba(0,0,0,.08)':'none'};transition:all .15s">📅 Aylık</button>
      <button onclick="odemePeriyot='yillik';render()" style="flex:1;padding:9px;border-radius:11px;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;background:${odPeriyot==='yillik'?'var(--card)':'transparent'};color:${odPeriyot==='yillik'?'var(--text)':'var(--sub)'};box-shadow:${odPeriyot==='yillik'?'0 2px 8px rgba(0,0,0,.08)':'none'};transition:all .15s">📆 Yıllık</button>
    </div>`;

    const filtreliListe = liste.filter(o=>( o.periyot||'aylik' )===odPeriyot);
    const bekleyen = filtreliListe.filter(o=>!o.odendi).sort((a,b)=>(a.gun||0)-(b.gun||0));
    const odendi = filtreliListe.filter(o=>o.odendi).sort((a,b)=>(a.gun||0)-(b.gun||0));

    // Her ödeme için efektif aylık tutar: sabit tutar varsa o, yoksa geçmiş ortalaması
    function efektifTutar(o){
      // Önce geçmiş ödemelerden son ödenen tutara bak
      const gc=o.gecmis||[];
      const tutarlilar=gc.filter(g=>g.tutar>0);
      if(tutarlilar.length>0){
        // En son ödenen tutarı döndür
        return tutarlilar[tutarlilar.length-1].tutar;
      }
      // Geçmiş yoksa sabit tutarı kullan
      return o.tutar||0;
    }
    const toplamAylik = bekleyen.reduce((s,o)=>s+efektifTutar(o),0);
    const tahminiVar = bekleyen.some(o=>!o.tutar&&(o.gecmis||[]).some(g=>g.tutar>0));

    if(ozetAcikYil===null&&yillarSirali.length>0) ozetAcikYil=yillarSirali[0];
    if(ozetAcikAy===null) ozetAcikAy=new Date().getMonth()+1;
    const AYLAR_TR=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];

    // Seçilen ay+yıl için tüm ödemelerin toplamı
    const secilenKey=ozetAcikYil&&ozetAcikAy?ozetAcikYil+'-'+String(ozetAcikAy).padStart(2,'0'):null;
    let aylikSecimToplam=0,aylikSecimAdet=0;
    if(secilenKey){
      tumOdemeler.filter(o=>(o.periyot||'aylik')===odPeriyot).forEach(o=>{
        (o.gecmis||[]).forEach(g=>{
          const gKey=g.ay||(g.tarih?g.tarih.slice(0,7):null);
          if(gKey===secilenKey&&g.tutar){aylikSecimToplam+=g.tutar;aylikSecimAdet++;}
        });
      });
    }
    const secilenOzet=ozetAcikYil&&yillikOzet[ozetAcikYil]?yillikOzet[ozetAcikYil]:null;

    if(bekleyen.length>0){
      html+=`<div style="background:linear-gradient(135deg,${cfg.renk}18,${cfg.renk}08);border:1.5px solid ${cfg.renk}30;border-radius:16px;padding:14px;margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div>
            <div style="font-size:11px;font-weight:700;color:${cfg.renk};text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">${odPeriyot==='yillik'?(ozetAcikYil||'')+' Toplamı':secilenKey?AYLAR_TR[(ozetAcikAy||1)-1]+' Toplamı':'Aylık Toplam'}</div>
            <div style="font-size:26px;font-weight:800;color:var(--text)">${odPeriyot==='yillik'?(secilenOzet&&secilenOzet.toplam>0?Math.round(secilenOzet.toplam).toLocaleString('tr-TR'):'—'):(aylikSecimToplam>0?aylikSecimToplam.toFixed(0):'—')} <span style="font-size:14px;font-weight:600;color:var(--sub)">${(odPeriyot==='yillik'?secilenOzet&&secilenOzet.toplam>0:aylikSecimToplam>0)?'₺':''}</span></div>
          </div>

        </div>
        ${odPeriyot==='aylik'&&yillarSirali.length>0?`<div style="border-top:1.5px solid ${cfg.renk}20;padding-top:10px">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
            <select onchange="ozetAcikAy=parseInt(this.value);render()" style="flex:1;padding:5px 8px;border-radius:10px;border:1.5px solid ${cfg.renk}40;background:var(--card);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:${cfg.renk};cursor:pointer;outline:none">
              ${AYLAR_TR.map((a,i)=>`<option value="${i+1}" ${ozetAcikAy===i+1?'selected':''}>${a}</option>`).join('')}
            </select>
            <select onchange="ozetAcikYil=this.value;render()" style="padding:5px 8px;border-radius:10px;border:1.5px solid ${cfg.renk}40;background:var(--card);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:${cfg.renk};cursor:pointer;outline:none">
              ${yillarSirali.map(y=>`<option value="${y}" ${ozetAcikYil===y?'selected':''}>${y}</option>`).join('')}
            </select>

          </div>
        </div>`:''}
        ${odPeriyot==='yillik'&&yillarSirali.length>0?`<div style="border-top:1.5px solid ${cfg.renk}20;padding-top:10px;display:flex;align-items:center;justify-content:space-between;gap:8px">
          <select onchange="ozetAcikYil=this.value;render()" style="padding:5px 10px;border-radius:10px;border:1.5px solid ${cfg.renk}40;background:var(--card);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:${cfg.renk};cursor:pointer;outline:none">
            ${yillarSirali.map(y=>`<option value="${y}" ${ozetAcikYil===y?'selected':''}>${y}</option>`).join('')}
          </select>

        </div>`:''}
      </div>`;
    }

    if(filtreliListe.length===0){
      html+=`<div class="empty"><div class="empty-emoji">💳</div><div class="empty-title">${odPeriyot==='aylik'?'Aylık ödeme yok':'Yıllık ödeme yok'}</div><div class="empty-sub">+ ile ekle</div></div>`;
    } else {
      if(bekleyen.length){
        html+=`<div style="font-size:11px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:10px">Aktif · ${bekleyen.length}</div>`;
        bekleyen.forEach(o=>{ html+=takipKartOdeme(o,today,cfg,odPeriyot); });
      }
      if(odendi.length){
        html+=`<div style="font-size:11px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:0.7px;margin:16px 0 10px">Ödendi · ${odendi.length}</div>`;
        odendi.forEach(o=>{ html+=takipKartOdeme(o,today,cfg,odPeriyot); });
      }
    }
  }

  // ── HARCAMALAR ──
  else if(takipSekme==='harcama'){
    const harcamalar=state.takip.harcamalar||[];
    const AYLAR_TR=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];

    // Yıl listesini KALEM tarihlerinden üret (harcama üst tarihi değil)
    const tumYillarSet=new Set();
    harcamalar.forEach(h=>{
      (h.kalemler||[]).forEach(k=>{if(k.tarih)tumYillarSet.add(parseInt(k.tarih.slice(0,4)));});
      // Kalemi olmayan harcamalarda h.tarih'e bak
      if((!h.kalemler||!h.kalemler.length)&&h.tarih) tumYillarSet.add(parseInt(h.tarih.slice(0,4)));
    });
    const tumYillar=[...tumYillarSet].filter(Boolean).sort((a,b)=>b-a);
    // Tarihsiz kalem var mı?
    const tarihsizVar=harcamalar.some(h=>(h.kalemler||[]).some(k=>!k.tarih));
    // harcamaYil=0 → tarihsiz mod
    if(harcamaYil>0&&!tumYillar.includes(harcamaYil)&&tumYillar.length>0) harcamaYil=tumYillar[0];

    // Seçilen yılda kalemi olan harcamaları göster (harcama kartı her zaman görünür ama özet kalem bazlı)
    const sirali=harcamalar.slice().sort((a,b)=>{
      // Son kalem tarihine göre sırala
      const son=h=>[...(h.kalemler||[])].map(k=>k.tarih||'').filter(Boolean).sort().reverse()[0]||h.tarih||'';
      return son(b).localeCompare(son(a));
    });

    function harcamaTamOdendi(h){
      if(!h.kalemler||!h.kalemler.length) return false;
      return h.kalemler.every(k=>k.odendi);
    }

    // Yıl seçici
    html+=`<div style="margin-bottom:12px">
      <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none">
        ${tumYillar.length===0?`<div style="font-size:13px;color:var(--sub);padding:8px 0">Henüz harcama yok</div>`:''}
        ${tumYillar.length>0?`<button onclick="harcamaYil=-1;harcamaAy=0;render()" style="flex-shrink:0;padding:8px 16px;border-radius:20px;border:1.5px solid ${harcamaYil===-1?cfg.renk:'var(--border)'};background:${harcamaYil===-1?cfg.renk:'var(--bg)'};color:${harcamaYil===-1?'white':'var(--sub)'};font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer">Tümü</button>`:''}
        ${tumYillar.map(y=>`<button onclick="harcamaYil=${y};harcamaAy=0;render()" style="flex-shrink:0;padding:8px 16px;border-radius:20px;border:1.5px solid ${harcamaYil===y?cfg.renk:'var(--border)'};background:${harcamaYil===y?cfg.renk:'var(--bg)'};color:${harcamaYil===y?'white':'var(--sub)'};font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer">${y}</button>`).join('')}
        <button onclick="harcamaYil=0;harcamaAy=0;render()" style="flex-shrink:0;padding:8px 16px;border-radius:20px;border:1.5px solid ${harcamaYil===0?cfg.renk:'var(--border)'};background:${harcamaYil===0?cfg.renk:'var(--bg)'};color:${harcamaYil===0?'white':'var(--sub)'};font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer">Tarihsiz</button>
      </div>

    </div>`;

    // Özet kart - seçilen yıldaki kalemleri topla
    if(sirali.length>0){
      let tumBekleyen=0, tumOdendi=0;
      sirali.forEach(h=>{
        (h.kalemler||[]).forEach(k=>{
          if(harcamaYil===0){
            if(k.tarih) return; // sadece tarihi olmayanlar
          } else if(harcamaYil===-1){
            // Tümü: hepsi dahil
          } else {
            if(k.tarih&&parseInt(k.tarih.slice(0,4))!==harcamaYil) return;
            if(!k.tarih) return;
          }
          if(k.odendi) tumOdendi+=(k.tutar||0);
          else tumBekleyen+=(k.tutar||0);
        });
        // Kalemi olmayan harcamalar
        if(!h.kalemler||!h.kalemler.length){
          if(harcamaYil===-1) tumBekleyen+=(h.tutar||0);
          else if(harcamaYil!==0&&h.tarih&&parseInt(h.tarih.slice(0,4))===harcamaYil) tumBekleyen+=(h.tutar||0);
        }
      });
      const toplamTutar=tumBekleyen+tumOdendi;
      html+=`<div style="background:linear-gradient(135deg,${cfg.renk}18,${cfg.renk}08);border:1.5px solid ${cfg.renk}30;border-radius:16px;padding:14px;margin-bottom:16px">
        <div style="display:flex;gap:0">
          <div style="flex:1;min-width:0">
            <div style="font-size:10px;font-weight:700;color:#C84848;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px">Bekleyen</div>
            <div style="font-size:17px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${tumBekleyen.toLocaleString('tr-TR')} <span style="font-size:13px;font-weight:700;color:var(--sub)">₺</span></div>
          </div>
          <div style="flex:1;min-width:0;border-left:1.5px solid ${cfg.renk}20;padding-left:10px">
            <div style="font-size:10px;font-weight:700;color:#4A9060;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px">Ödendi</div>
            <div style="font-size:17px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${tumOdendi.toLocaleString('tr-TR')} <span style="font-size:13px;font-weight:700;color:var(--sub)">₺</span></div>
          </div>
          <div style="flex:1;min-width:0;border-left:1.5px solid ${cfg.renk}20;padding-left:10px">
            <div style="font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px">Toplam</div>
            <div style="font-size:17px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${toplamTutar.toLocaleString('tr-TR')} <span style="font-size:13px;font-weight:700;color:var(--sub)">₺</span></div>
          </div>
        </div>
      </div>`;
    }

    // Filtre sekmeleri - yıl bazlı kalem sayısı
    // Seçilen yılda kalemi olan harcamaları filtrele
    const yilliHarcamalar=sirali.filter(h=>{
      if(harcamaYil===-1) return true; // tümü
      if(harcamaYil===0) return (h.kalemler||[]).some(k=>!k.tarih); // tarihsiz
      if(h.kalemler&&h.kalemler.length) return h.kalemler.some(k=>k.tarih&&parseInt(k.tarih.slice(0,4))===harcamaYil);
      return h.tarih&&parseInt(h.tarih.slice(0,4))===harcamaYil;
    });
    const hepsi=yilliHarcamalar.length;
    const bekSayı=yilliHarcamalar.filter(h=>!harcamaTamOdendi(h)).length;
    const odSayı=yilliHarcamalar.filter(h=>harcamaTamOdendi(h)).length;
    html+=`<div style="display:flex;background:var(--bg);border-radius:14px;padding:3px;gap:3px;border:1.5px solid var(--border);margin-bottom:16px">
      <button onclick="harcamaFiltre='tumu';render()" style="flex:1;padding:9px 4px;border-radius:11px;border:none;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:${harcamaFiltre==='tumu'?'var(--card)':'transparent'};color:${harcamaFiltre==='tumu'?'var(--text)':'var(--sub)'};box-shadow:${harcamaFiltre==='tumu'?'0 2px 8px rgba(0,0,0,.08)':'none'}">Tümü${hepsi?' · '+hepsi:''}</button>
      <button onclick="harcamaFiltre='bekleyen';render()" style="flex:1;padding:9px 4px;border-radius:11px;border:none;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:${harcamaFiltre==='bekleyen'?'var(--card)':'transparent'};color:${harcamaFiltre==='bekleyen'?'#C84848':'var(--sub)'};box-shadow:${harcamaFiltre==='bekleyen'?'0 2px 8px rgba(0,0,0,.08)':'none'}">Bekleyen${bekSayı?' · '+bekSayı:''}</button>
      <button onclick="harcamaFiltre='odendi';render()" style="flex:1;padding:9px 4px;border-radius:11px;border:none;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:${harcamaFiltre==='odendi'?'var(--card)':'transparent'};color:${harcamaFiltre==='odendi'?'#4A9060':'var(--sub)'};box-shadow:${harcamaFiltre==='odendi'?'0 2px 8px rgba(0,0,0,.08)':'none'}">Ödendi${odSayı?' · '+odSayı:''}</button>
    </div>`;

    const gosterilen=harcamaFiltre==='bekleyen'?yilliHarcamalar.filter(h=>!harcamaTamOdendi(h)):harcamaFiltre==='odendi'?yilliHarcamalar.filter(h=>harcamaTamOdendi(h)):yilliHarcamalar;

    if(harcamalar.length===0){
      html+=`<div class="empty"><div class="empty-emoji">💸</div><div class="empty-title">Harcama kaydı yok</div><div class="empty-sub">+ ile büyük harcamalarını ekle</div></div>`;
    } else if(yilliHarcamalar.length===0){
      html+=`<div class="empty"><div class="empty-emoji">💸</div><div class="empty-title">${harcamaYil===0?'Tarihsiz kalem yok':harcamaYil===-1?'Harcama yok':harcamaYil+' yılında kayıt yok'}</div></div>`;
    } else if(gosterilen.length===0){
      html+=`<div class="empty"><div class="empty-emoji">💸</div><div class="empty-title">${harcamaFiltre==='bekleyen'?'Bekleyen harcama yok':'Ödenmiş harcama yok'}</div></div>`;
    } else {
      gosterilen.forEach(h=>{
          // Sadece seçilen yıla ait kalemleri say
          const tumKalemler=h.kalemler&&h.kalemler.length?h.kalemler:[];
          const kalemler=harcamaYil===-1?tumKalemler:harcamaYil===0?tumKalemler.filter(k=>!k.tarih):tumKalemler.filter(k=>k.tarih&&parseInt(k.tarih.slice(0,4))===harcamaYil);
          const bekDoviz={}, odDoviz={};
          kalemler.forEach(k=>{const d=k.doviz||'₺'; if(k.odendi) odDoviz[d]=(odDoviz[d]||0)+(k.tutar||0); else bekDoviz[d]=(bekDoviz[d]||0)+(k.tutar||0);});
          const toplamTutar=kalemler.reduce((s,k)=>s+(k.tutar||0),0);
          const bekStr=Object.entries(bekDoviz).filter(([,v])=>v>0).map(([d,v])=>`${v.toLocaleString('tr-TR')} ${d}`).join(' + ');
          const odStr=Object.entries(odDoviz).filter(([,v])=>v>0).map(([d,v])=>`${v.toLocaleString('tr-TR')} ${d}`).join(' + ');
          const kartToplamStr=(bekStr||odStr)?[bekStr,odStr?`<span style="color:#4A9060;font-size:12px">✓ ${odStr}</span>`:''].filter(Boolean).join(' + '):(toplamTutar?toplamTutar.toLocaleString('tr-TR')+' ₺':'—');
          // Kaç farklı yıla yayıldığını göster
          const yillar=[...new Set(tumKalemler.map(k=>k.tarih?k.tarih.slice(0,4):null).filter(Boolean))].sort();
          const yilStr=yillar.length>1?yillar[0]+'–'+yillar[yillar.length-1]:yillar[0]||'';
          html+=`<div style="background:var(--card);border-radius:16px;border:1.5px solid var(--border);padding:14px;margin-bottom:8px">
            <div style="display:flex;gap:12px;align-items:flex-start">
              <div style="width:42px;height:42px;border-radius:12px;background:${cfg.bg};display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px">${h.emoji||'💸'}</div>
              <div style="flex:1;min-width:0">
                <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px">${esc(h.baslik)}</div>
                <div style="display:flex;flex-wrap:wrap;gap:5px;align-items:center">
                  <span style="font-size:15px;font-weight:800;color:${cfg.renk}">${kartToplamStr}</span>

                </div>
                ${h.not?`<div style="font-size:12px;color:var(--sub);margin-top:5px;font-style:italic">${esc(h.not)}</div>`:''}
                ${yilStr?`<div style="font-size:11px;font-weight:600;color:var(--sub);margin-top:4px">📅 ${yilStr}${yillar.length>1?' · '+tumKalemler.length+' kalem':''}</div>`:''}
              </div>
              <div style="display:flex;gap:4px;flex-shrink:0">
                <button onclick="harcamaAcKapat('${h.id}')" style="width:30px;height:30px;border-radius:8px;border:1.5px solid ${h.acik?cfg.renk:'var(--border)'};background:${h.acik?cfg.bg:'var(--bg)'};cursor:pointer;display:flex;align-items:center;justify-content:center">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="${h.acik?cfg.renk:'currentColor'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transition:transform .2s;transform:rotate(${h.acik?180:0}deg)"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
                <button onclick="takipDuzenle('harcama','${h.id}')" style="width:30px;height:30px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
                <button onclick="takipSil('harcama','${h.id}')" style="width:30px;height:30px;border-radius:8px;border:1.5px solid #F0C8C8;background:#FAE8E8;cursor:pointer;display:flex;align-items:center;justify-content:center">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#C84848" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
                </button>
              </div>
            </div>
          </div>
          ${h.acik&&kalemler.length>0?`<div style="background:var(--card);border-radius:0 0 16px 16px;border:1.5px solid var(--border);border-top:none;padding:0 14px 12px">${buildHarcamaKalemler(h,kalemler)}</div>`:''}
        `;
      });
    }
  }

  // Form modal
  if(takipForm!==null){
    html+=buildTakipForm();
  }

  html+=`<div style="height:20px"></div>`;
  return html;
}

function todoDuzenle(id){
  const t=(state.todos||[]).find(x=>x.id===id);if(!t)return;
  todoForm={...t};render();
}

function surezDuzenle(id){
  const t=(state.surezler||[]).find(x=>x.id===id);
  if(!t)return;
  todoForm={...t,_sureziz:true};
  render();
  setTimeout(()=>{const el=document.getElementById('todo-baslik');if(el)el.focus();},80);
}

function todoSil(id){
  state.todos=(state.todos||[]).filter(t=>t.id!==id);
  save();render();showToast('Silindi');
}

function todoAcKapat(id){
  const t=state.todos.find(x=>x.id===id);
  if(!t)return;
  t.acik=!t.acik;
  save();render();
}

function todoYeniAc(){
  if(todoVade==='sureziz'){
    todoForm={id:null,baslik:'',not:'',_sureziz:true};
    render();
    setTimeout(()=>{const el=document.getElementById('todo-baslik');if(el)el.focus();},80);
    return;
  }
  todoForm={id:null,baslik:'',vade:todoVade||'orta',deadline:null,tip:'tek',altMaddeler:[],acik:false};
  render();
  setTimeout(()=>{const el=document.getElementById('todo-baslik');if(el){el.focus();}},80);
}

function istekSil(id){
  state.istekler=(state.istekler||[]).filter(x=>x.id!==id);
  save();render();showToast('Silindi');
}

function surezSil(id){
  state.surezler=(state.surezler||[]).filter(x=>x.id!==id);
  save();render();showToast('Silindi');
}

function takipKartOdeme(o,today,cfg,periyot){
  periyot=periyot||o.periyot||'aylik';
  const odendi=o.odendi||false;
  const acik=odemeAcikId===o.id;

  // ── İstatistik hesapla ──
  const gecmis=o.gecmis||[];
  const toplamOdeme=gecmis.length;
  const tutar=o.tutar||0;
  const toplamTutar=gecmis.reduce((s,g)=>s+(g.tutar||tutar||0),0);
  const AYLAR_LONG=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  const gecmisSirali=[...gecmis].reverse().slice(0,12);
  const simdi2=new Date(today+'T12:00:00');
  const AYLAR_K=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
  // Tüm geçmiş kayıtlarından benzersiz ay listesi oluştur (kronolojik)
  const tumAylar=[...new Set(gecmis.map(g=>g.ay||(g.tarih?g.tarih.slice(0,7):null)).filter(Boolean))].sort();
  const grafAylar=tumAylar.map(key=>{
    const kayit=gecmis.filter(g=>g.ay===key||(g.tarih&&g.tarih.slice(0,7)===key));
    const ayTutar=kayit.length>0?(kayit.reduce((s,g)=>s+(g.tutar||tutar||0),0)/kayit.length):null;
    const ayNo=parseInt(key.slice(5,7))-1;
    const yil=key.slice(2,4);
    return {key,lbl:AYLAR_K[ayNo]+"'"+yil,tutar:ayTutar};
  });
  const grafTutarlar=grafAylar.map(a=>a.tutar);
  const grafMax=Math.max(...grafTutarlar.filter(t=>t!==null),1);
  const grafMin=Math.min(...grafTutarlar.filter(t=>t!==null),0);
  const grafRange=grafMax-grafMin||1;

  // Rutin ödeme zamanı gösterimi
  let zamanStr='';
  let badgeStr='';
  const todayD=new Date(today+'T12:00:00');
  const todayGun=todayD.getDate();
  const todayAy=todayD.getMonth()+1;
  const AYLAR=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];

  const effGun = o.gun || (periyot!=='aylik' && o.tarih ? new Date(o.tarih+'T12:00:00').getDate() : null);
  if(periyot==='aylik'){
    zamanStr=effGun?`Her ayın ${effGun}. günü`:'Her ay';
    if(effGun){
      const diff=effGun-todayGun;
      if(diff===0)badgeStr=`<span style="background:#FAE8E8;color:#C84848;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700">Bugün</span>`;
      else if(diff===1)badgeStr=`<span style="background:#FAF0DC;color:#C87828;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700">Yarın</span>`;
      else if(diff>0&&diff<=7)badgeStr=`<span style="background:${cfg.bg};color:${cfg.renk};padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700">${diff}g sonra</span>`;
      else if(diff<0)badgeStr=`<span style="background:#FAE8E8;color:#C84848;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700">${Math.abs(diff)}g geçti</span>`;
    }
  } else if(periyot==='yillik'){
    const tarihler=o.tarihler&&o.tarihler.length?o.tarihler:(effGun&&o.ay?[{ay:o.ay,gun:effGun}]:[]);
    if(tarihler.length){
      zamanStr=tarihler.map(t=>`${t.gun||'?'} ${AYLAR[(t.ay||1)-1]}`).join(' · ');
      // Find nearest upcoming
      const nearest=tarihler.map(t=>{const diff=(t.ay-todayAy)*30+((t.gun||0)-todayGun);return diff;}).sort((a,b)=>a-b);
      const d=nearest[0];
      if(d===0)badgeStr=`<span style="background:#FAE8E8;color:#C84848;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700">Bugün</span>`;
      else if(d>0&&d<=14)badgeStr=`<span style="background:${cfg.bg};color:${cfg.renk};padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700">${d}g sonra</span>`;
      else if(d<0&&d>-14)badgeStr=`<span style="background:#FAE8E8;color:#C84848;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700">${Math.abs(d)}g geçti</span>`;
    }
  }
  const tarihStr=zamanStr;
  const gecikme=badgeStr.includes('geçti')&&!odendi;
  const bugunmu=badgeStr.includes('Bugün')&&!odendi;

  // ── İstatistik paneli HTML ──
  const istatPanel=acik?`
  <div style="border-top:1.5px solid var(--border);margin-top:12px;padding-top:14px">
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <div style="flex:1;background:${cfg.bg};border-radius:12px;padding:10px 12px;text-align:center">
        <div style="font-size:22px;font-weight:800;color:${cfg.renk}">${toplamOdeme}</div>
        <div style="font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.4px;margin-top:2px">Ödeme Ayı</div>
      </div>
      <div style="flex:1;background:${cfg.bg};border-radius:12px;padding:10px 12px;text-align:center">
        <div style="font-size:22px;font-weight:800;color:${cfg.renk}">${toplamTutar.toLocaleString('tr-TR')}₺</div>
        <div style="font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.4px;margin-top:2px">Toplam Ödendi</div>
      </div>
      ${tutar?`<div style="flex:1;background:var(--bg);border-radius:12px;padding:10px 12px;text-align:center;border:1.5px solid var(--border)">
        <div style="font-size:22px;font-weight:800;color:var(--text)">${tutar.toLocaleString('tr-TR')}₺</div>
        <div style="font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.4px;margin-top:2px">Aylık Tutar</div>
      </div>`:''}
    </div>
    <div style="margin-bottom:14px">
      <div style="font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Fiyat Değişimi — Son 6 Ay</div>
      ${(()=>{
        const W=300,H=80,padL=4,padR=4,padT=8,padB=20;
        const iW=W-padL-padR, iH=H-padT-padB;
        const noktalar=grafAylar.map((a,i)=>{
          const x=padL+(i/(grafAylar.length-1||1))*iW;
          const y=a.tutar!==null?padT+iH-(((a.tutar-grafMin)/grafRange)*iH):null;
          return {x,y,lbl:a.lbl,tutar:a.tutar};
        });
        const gercek=noktalar.filter(n=>n.y!==null);
        if(gercek.length<2) return '<div style="text-align:center;font-size:12px;color:var(--sub);padding:16px 0">Grafik için en az 2 kayıt gerekli</div>';
        // Çizgi path
        const path=gercek.map((n,i)=>(i===0?`M${n.x},${n.y}`:`L${n.x},${n.y}`)).join(' ');
        // Alan dolgu
        const alanPath=`${path} L${gercek[gercek.length-1].x},${padT+iH} L${gercek[0].x},${padT+iH} Z`;
        // Noktalar ve etiketler
        const circles=noktalar.map(n=>n.y!==null?`
          <circle cx="${n.x}" cy="${n.y}" r="3.5" fill="${cfg.renk}" stroke="white" stroke-width="1.5"/>
          <text x="${n.x}" y="${n.y-7}" text-anchor="middle" font-size="8" font-weight="700" fill="${cfg.renk}">${n.tutar!==null?n.tutar+'₺':''}</text>
        `:'').join('');
        const labels=noktalar.map(n=>`<text x="${n.x}" y="${H-3}" text-anchor="middle" font-size="9" font-weight="700" fill="var(--sub)">${n.lbl}</text>`).join('');
        return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;overflow:visible">
          <defs>
            <linearGradient id="grafGrad-${o.id}" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="${cfg.renk}" stop-opacity="0.25"/>
              <stop offset="100%" stop-color="${cfg.renk}" stop-opacity="0.02"/>
            </linearGradient>
          </defs>
          <path d="${alanPath}" fill="url(#grafGrad-${o.id})"/>
          <path d="${path}" fill="none" stroke="${cfg.renk}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          ${circles}
          ${labels}
        </svg>`;
      })()}
    </div>

    ${gecmisSirali.length>0?`
    <div>
      <div style="font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Ödeme Geçmişi</div>
      ${gecmisSirali.map(g=>{
        const tarihG=g.tarih||'';
        const ayG=g.ay||(tarihG?tarihG.slice(0,7):'');
        const ayNoG=ayG?parseInt(ayG.slice(5,7))-1:-1;
        const yilG=ayG?ayG.slice(0,4):'';
        const ayLblG=ayNoG>=0?AYLAR_LONG[ayNoG]+' '+yilG:tarihG;
        const gunLblG=tarihG?tarihG.slice(8,10)+' '+ayLblG:ayLblG;
        const gi=gecmis.indexOf(g);
        return `<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)">
          <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0">
            <span style="font-size:12px;font-weight:600;color:var(--text)">${gunLblG}</span>
            <button data-id="${o.id}" data-gi="${gi}" data-tarih="${g.tarih||''}" data-tutar="${g.tutar||0}" onclick="odemeGecmisDuzenle(this.dataset.id,parseInt(this.dataset.gi),this.dataset.tarih,parseFloat(this.dataset.tutar)||0)" style="width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:12px;font-weight:800;color:${cfg.renk}">${(g.tutar||tutar)?(g.tutar||tutar).toLocaleString('tr-TR')+'₺':'✓'}</span>
            <button onclick="odemeGecmisSil('${o.id}',${gi})" style="width:32px;height:32px;border-radius:8px;border:1.5px solid #F0C8C8;background:#FAE8E8;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#C84848" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
            </button>
          </div>
        </div>`;
      }).join('')}
    </div>`:`<div style="text-align:center;padding:8px 0;font-size:12px;color:var(--sub)">Henüz ödeme geçmişi yok</div>`}
  </div>`:'';

  return `<div style="background:var(--card);border-radius:16px;border:1.5px solid ${gecikme?'#F0C8C8':bugunmu?'#F0D8A0':odendi?'#C8E6D4':acik?cfg.renk+'50':'var(--border)'};padding:16px;margin-bottom:8px;opacity:${odendi?0.75:1};box-sizing:border-box">
    <div style="display:flex;align-items:center;gap:10px">
      <button onclick="takipToggleOdeme('${o.id}')" style="width:36px;height:36px;border-radius:10px;border:none;background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1">
        ${odendi?'✅':'💸'}
      </button>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-decoration:${odendi?'line-through':'none'};margin-bottom:3px">${esc(o.baslik)}</div>
        <div style="height:18px;display:flex;align-items:center;gap:5px;margin-bottom:3px">
          ${tarihStr?`<span style="font-size:11px;font-weight:600;color:var(--sub)">📅 ${tarihStr}</span>`:'<span style="font-size:11px;color:transparent">—</span>'}
          ${badgeStr}
        </div>
        <div style="height:18px;display:flex;align-items:center;gap:5px">
          ${(()=>{
            if(o.tutar) return `<span style="font-size:12px;font-weight:800;color:${odendi?'var(--sub)':cfg.renk}">${o.tutar}₺</span>`;
            const gc=(o.gecmis||[]).filter(g=>g.tutar>0);
            if(!gc.length) return '<span style="font-size:12px;color:transparent">—</span>';
            const ort=Math.round(gc.reduce((s,g)=>s+g.tutar,0)/gc.length);
            return `<span style="font-size:12px;font-weight:800;color:${odendi?'var(--sub)':cfg.renk}">~${ort}₺ <span style="font-weight:600;opacity:.7">ort.</span></span>`;
          })()}
          ${gecmis.length>0?`<span style="font-size:12px;font-weight:700;color:var(--sub);background:var(--bg);border:1px solid var(--border);padding:1px 7px;border-radius:6px">${gecmis.length} ödeme</span>`:''}
        </div>
      </div>
      <div style="display:flex;gap:3px;flex-shrink:0;align-items:center;margin-left:auto">
        <button onclick="odemeAcikId=odemeAcikId==='${o.id}'?null:'${o.id}';render()" style="width:26px;height:26px;border-radius:7px;border:1.5px solid ${acik?cfg.renk:'var(--border)'};background:${acik?cfg.renk+'18':'var(--bg)'};cursor:pointer;display:flex;align-items:center;justify-content:center">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="${acik?cfg.renk:'currentColor'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        </button>
        <button onclick="takipDuzenle('odeme','${o.id}')" style="width:26px;height:26px;border-radius:7px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button onclick="takipSil('odeme','${o.id}')" style="width:26px;height:26px;border-radius:7px;border:1.5px solid #F0C8C8;background:#FAE8E8;cursor:pointer;display:flex;align-items:center;justify-content:center">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#C84848" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        </button>
      </div>
    </div>
    ${istatPanel}
  </div>`;
}

function todoKaydet(){
  const el=document.getElementById('todo-baslik');
  const baslik=(el?el.value:todoForm.baslik||'').trim();
  if(!baslik){showToast('Bir başlık gir 📝');return;}
  if(!state.todos)state.todos=[];
  if(!state.surezler)state.surezler=[];
  if(!state.istekler)state.istekler=[];
  const now=todayStr();
  const kayit={...todoForm,baslik,vade:todoForm.vade||'orta'};
  if(todoForm.id){
    state.todos=state.todos.map(t=>t.id===todoForm.id?kayit:t);
    showToast('Güncellendi ✓');
  } else {
    state.todos.push({...kayit,id:Date.now().toString(),tamamlandi:false,tamamlandiTarih:null,olusturmaTarih:now});
    showToast('Görev eklendi ✓');
  }
  todoForm=null;save();render();
}

function istekKaydet(){
  var el=document.getElementById('istek-baslik');
  var baslik=(el?el.value:istekForm.baslik||'').trim();
  if(!baslik){showToast('Başlık gir 📝');return;}
  if(!state.istekler)state.istekler=[];
  var kayit={...istekForm,baslik};
  if(istekForm.id){
    state.istekler=state.istekler.map(x=>x.id===istekForm.id?kayit:x);
    showToast('Güncellendi ✓');
  } else {
    state.istekler.push({...kayit,id:Date.now().toString(),tamamlandi:false});
    showToast('Eklendi ✓');
  }
  istekForm=null;save();render();
}

function surezKaydet(){
  const el=document.getElementById('todo-baslik');
  const baslik=(el?el.value:todoForm.baslik||'').trim();
  if(!baslik){showToast('Bir başlık gir 📝');return;}
  if(!todoForm.etiket){showToast('Bir etiket seç 🏷️');return;}
  if(!state.surezler)state.surezler=[];
  const kayit={...todoForm,baslik};
  delete kayit._sureziz;
  if(todoForm.id){
    state.surezler=state.surezler.map(x=>x.id===todoForm.id?kayit:x);
    showToast('Güncellendi ✓');
  } else {
    state.surezler.push({...kayit,id:Date.now().toString(),tamamlandi:false});
    showToast('Eklendi ✓');
  }
  todoForm=null;save();render();
}

function surezGrupToggle(k){
  if(!state.surezGrupAcik)state.surezGrupAcik={};
  state.surezGrupAcik[k]=state.surezGrupAcik[k]===false?true:false;
  save();render();
}

function istekDuzenle(id){
  const t=(state.istekler||[]).find(x=>x.id===id);
  if(!t)return;
  istekForm={...t};render();
  setTimeout(function(){var el=document.getElementById('istek-baslik');if(el)el.focus();},80);
}

function buildTakipForm(){
  const f=takipForm;
  const s=takipSekme;
  const RENK={odeme:'#C87828',harcama:'#B84A6A'};
  const clr=RENK[s];

  let fields='';
  if(s==='odeme'){
    const fPeriyot=f.periyot||odemePeriyot||'aylik';
    fields=`
      <div class="field-label" style="margin-bottom:6px">Başlık</div>
      <input id="tf-baslik" class="field-input" placeholder="örn. Kira, Elektrik..." value="${esc(f.baslik||'')}" style="font-size:15px;font-weight:700;margin-bottom:12px" oninput="takipForm.baslik=this.value"/>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
        <div>
          <div class="field-label" style="margin-bottom:6px">Tutar (₺)</div>
          <input type="number" class="field-input" placeholder="0" value="${f.tutar||''}" style="font-size:15px;font-weight:700" onchange="takipForm.tutar=parseFloat(this.value)||null"/>
        </div>
        <div>
          <div class="field-label" style="margin-bottom:6px">Periyot</div>
          <div style="display:flex;background:var(--bg);border-radius:12px;padding:3px;gap:3px;border:1.5px solid var(--border)">
            <button type="button" onclick="takipForm.periyot='aylik';render()" style="flex:1;padding:8px 4px;border-radius:9px;border:none;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:${fPeriyot==='aylik'?'var(--card)':'transparent'};color:${fPeriyot==='aylik'?'var(--text)':'var(--sub)'};transition:all .15s">Aylık</button>
            <button type="button" onclick="takipForm.periyot='yillik';render()" style="flex:1;padding:8px 4px;border-radius:9px;border:none;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:${fPeriyot==='yillik'?'var(--card)':'transparent'};color:${fPeriyot==='yillik'?'var(--text)':'var(--sub)'};transition:all .15s">Yıllık</button>
          </div>
        </div>
      </div>
      <div class="field-label" style="margin-bottom:8px">Ödeme Zamanı</div>
      ${fPeriyot==='aylik'?`
      <div style="display:flex;gap:10px;margin-bottom:16px;align-items:center">
        <div style="flex:1">
          <div style="font-size:10px;font-weight:700;color:var(--sub);margin-bottom:5px;text-transform:uppercase">Ayın Günü</div>
          <input type="number" class="field-input" min="1" max="31" placeholder="1-31" value="${f.gun||''}" style="font-size:18px;font-weight:800;text-align:center" onchange="takipForm.gun=parseInt(this.value)||null"/>
        </div>
        <div style="font-size:13px;font-weight:600;color:var(--sub);padding-top:20px">. günü (her ay)</div>
      </div>`:`
      <div style="margin-bottom:12px">
        <div style="font-size:10px;font-weight:700;color:var(--sub);margin-bottom:8px;text-transform:uppercase">Tarihler (birden fazla ekleyebilirsin)</div>
        ${(f.tarihler||[]).map((t,ti)=>`
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
          <select class="field-input" style="font-size:13px;font-weight:700;flex:1" onchange="takipForm.tarihler[${ti}].ay=parseInt(this.value)">
            ${['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'].map((m,i)=>`<option value="${i+1}" ${(t.ay||1)===i+1?'selected':''}>${m}</option>`).join('')}
          </select>
          <input type="number" class="field-input" min="1" max="31" placeholder="Gün" value="${t.gun||''}" style="font-size:15px;font-weight:800;text-align:center;width:70px" onchange="takipForm.tarihler[${ti}].gun=parseInt(this.value)||null"/>
          <button type="button" onclick="takipForm.tarihler.splice(${ti},1);render()" style="width:32px;height:40px;border-radius:10px;border:1.5px solid #F0C8C8;background:#FAE8E8;cursor:pointer;font-size:14px">✕</button>
        </div>`).join('')}
        <button type="button" onclick="if(!takipForm.tarihler)takipForm.tarihler=[];takipForm.tarihler.push({ay:1,gun:1});render()" style="width:100%;padding:10px;border-radius:12px;border:1.5px dashed var(--border);background:transparent;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--sub);cursor:pointer;margin-bottom:16px">+ Tarih Ekle</button>
      </div>`}
    `;
  } else if(s==='harcama'){
    const kalemler=f.kalemler&&f.kalemler.length?f.kalemler:[{aciklama:'',tutar:null,doviz:'₺'}];
    fields=`
      <div class="field-label" style="margin-bottom:6px">Başlık</div>
      <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">
        <input class="field-input" value="${f.emoji||'💸'}" maxlength="2" style="width:48px;flex-shrink:0;font-size:22px;text-align:center;padding:6px 4px" oninput="takipForm.emoji=this.value"/>
        <input id="tf-baslik" class="field-input" placeholder="örn. Tatil, Laptop..." value="${esc(f.baslik||'')}" style="flex:1;font-size:15px;font-weight:700" oninput="takipForm.baslik=this.value"/>
      </div>
      <div style="margin-bottom:14px">
        <div class="field-label" style="margin-bottom:6px">Toplam</div>
        <div id="harcama-toplam" style="font-size:18px;font-weight:800;color:#B84A6A;padding:4px 0;line-height:1.3">—</div>
      </div>
      <div class="field-label" style="margin-bottom:8px">Kalemler</div>
      <div id="kalemler-wrap">
      ${kalemler.map((k,ki)=>`
      <div id="kalem-row-${ki}" style="background:var(--bg);border-radius:12px;border:1.5px solid var(--border);padding:10px;margin-bottom:8px">
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
          <button type="button" onclick="takipForm.kalemler[${ki}].odendi=!takipForm.kalemler[${ki}].odendi;render()" style="width:28px;height:28px;flex-shrink:0;border-radius:8px;border:2px solid ${k.odendi?'#4A9060':'var(--border)'};background:${k.odendi?'#4A9060':'transparent'};cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s">${k.odendi?'<svg width="11" height="11" viewBox="0 0 12 12"><polyline points="2 6 5 9 10 3" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}</button>
          <input class="field-input" placeholder="Açıklama" value="${esc(k.aciklama||'')}" style="flex:1;font-size:13px;font-weight:600;opacity:${k.odendi?0.5:1};text-decoration:${k.odendi?'line-through':'none'}" oninput="takipForm.kalemler[${ki}].aciklama=this.value"/>
          <button type="button" onclick="harcamaKalemSil(${ki})" style="width:28px;height:28px;flex-shrink:0;border-radius:8px;border:1.5px solid #F0C8C8;background:#FAE8E8;cursor:pointer;font-size:13px;color:#C84848">✕</button>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="text" inputmode="decimal" class="field-input" placeholder="0" value="${k.tutar||''}" style="flex:1;font-size:15px;font-weight:800;text-align:right;opacity:${k.odendi?0.5:1}" oninput="harcamaKalemGuncelle(${ki},this.value)"/>
          <select class="field-input" style="width:62px;flex-shrink:0;font-size:12px;font-weight:700;padding:8px 4px;text-align:center" onchange="takipForm.kalemler[${ki}].doviz=this.value;harcamaToplam()">
            ${['₺','$','€','£','¥','₽','CHF'].map(d=>`<option value="${d}" ${(k.doviz||'₺')===d?'selected':''}>${d}</option>`).join('')}
          </select>
          <input type="date" class="field-input" value="${k.tarih||''}" style="flex:1.2;font-size:12px;font-weight:600;opacity:${k.odendi?0.5:1}" onchange="takipForm.kalemler[${ki}].tarih=this.value" placeholder="Tarih"/>
        </div>
      </div>`).join('')}
      </div>
      <button type="button" onclick="harcamaKalemEkle()" style="width:100%;padding:10px;border-radius:12px;border:1.5px dashed var(--border);background:transparent;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--sub);cursor:pointer;margin-bottom:14px">+ Kalem Ekle</button>
      <div class="field-label" style="margin-bottom:6px">Not <span style="opacity:.6;font-weight:500">(opsiyonel)</span></div>
      <input class="field-input" placeholder="Kısa bir not..." value="${esc(f.not||'')}" style="font-size:13px;margin-bottom:16px" oninput="takipForm.not=this.value"/>
    `;
  }

  return `<div class="modal-overlay" onclick="if(event.target===this){takipForm=null;render();}">
    <div class="modal-sheet">
      <div style="padding:0">
        <div class="modal-handle"></div>
        <div class="modal-title" style="color:${clr}">${f.id?'Düzenle':s==='harcama'?'Harcama Ekle':'Ödeme Ekle'}</div>
      </div>
      <div class="modal-scroll">${fields}</div>
      <div class="modal-footer">
        <div class="modal-btns">
          <button class="save-btn" onclick="takipKaydet()" style="margin-top:0;background:${clr}">Kaydet</button>
          <button class="modal-btn-cancel" onclick="takipForm=null;render()">Vazgeç</button>
        </div>
      </div>
    </div>
  </div>`;
}

// ── TAKİP AKSİYONLARI ──
function harcamaKalemGuncelle(ki,val){
  if(!takipForm.kalemler)return;
  takipForm.kalemler[ki].tutar=parseFloat(val.replace(',','.'))||null;
  harcamaToplam();
}
function harcamaToplam(){
  const el=document.getElementById('harcama-toplam');
  if(!el||!takipForm||!takipForm.kalemler)return;
  const bekDg={}, odDg={};
  takipForm.kalemler.forEach(k=>{
    const d=k.doviz||'₺';
    if(k.odendi) odDg[d]=(odDg[d]||0)+(k.tutar||0);
    else bekDg[d]=(bekDg[d]||0)+(k.tutar||0);
  });
  const bekStr=Object.entries(bekDg).filter(([,v])=>v>0).map(([d,v])=>v.toLocaleString('tr-TR')+' '+d).join(' + ');
  const odStr=Object.entries(odDg).filter(([,v])=>v>0).map(([d,v])=>v.toLocaleString('tr-TR')+' '+d).join(' + ');
  let html='';
  if(bekStr) html+=`<span style="color:#B84A6A">${bekStr}</span>`;
  if(odStr) html+=`${bekStr?'<br>':''}`;
  if(odStr) html+=`<span style="font-size:12px;color:#4A9060;font-weight:700">✓ ${odStr} ödendi</span>`;
  el.innerHTML=html||'—';
}
function harcamaKalemSil(ki){
  if(!takipForm.kalemler)return;
  takipForm.kalemler.splice(ki,1);
  if(!takipForm.kalemler.length)takipForm.kalemler.push({aciklama:'',tutar:null,doviz:'₺'});
  render();
}
function harcamaKalemEkle(){
  if(!takipForm.kalemler)takipForm.kalemler=[];
  const lastDoviz=(takipForm.kalemler.slice(-1)[0]||{}).doviz||'₺';
  takipForm.kalemler.push({aciklama:'',tutar:null,doviz:lastDoviz,tarih:''});
  render();
}
function takipYeniAc(){
  if(takipSekme==='harcama') takipForm={id:null,emoji:'💸',baslik:'',kalemler:[{aciklama:'',tutar:null,doviz:'₺',tarih:''}],not:''};
  else takipForm={id:null,baslik:'',tutar:null,periyot:odemePeriyot||'aylik',gun:null,ay:null,tarihler:[],odendi:false};
  render();
  setTimeout(()=>{const el=document.getElementById('tf-baslik');if(el)el.focus();},80);
}
function takipDuzenle(tip,id){
  const liste=state.takip[tip==='randevu'?'randevular':tip==='abonelik'?'abonelikler':tip==='harcama'?'harcamalar':'odemeler'];
  const item=liste.find(x=>x.id===id);
  if(!item)return;
  const itemCopy={...item};
  if(tip==='harcama'&&!itemCopy.kalemler)itemCopy.kalemler=[{aciklama:'',tutar:itemCopy.tutar||null}];
  takipForm={...itemCopy};render();
}
function takipKaydet(){
  const el=document.getElementById('tf-baslik');
  const baslik=(el?el.value:takipForm.baslik||'').trim();
  if(!baslik){showToast('Bir başlık gir 📝');return;}
  const key=takipSekme==='harcama'?'harcamalar':'odemeler';
  if(!state.takip)state.takip={randevular:[],abonelikler:[],odemeler:[],harcamalar:[],etkinlikler:[]};
  if(!state.takip.etkinlikler)state.takip.etkinlikler=[];
  if(!state.takip.harcamalar)state.takip.harcamalar=[];
  let kayit={...takipForm,baslik};
  if(takipSekme==='harcama'&&kayit.kalemler){
    kayit.tutar=kayit.kalemler.reduce((s,k)=>s+(k.tutar||0),0);
    // store doviz summary
    const dg={};kayit.kalemler.forEach(k=>{const d=k.doviz||'₺';dg[d]=(dg[d]||0)+(k.tutar||0);});
    kayit.dovizOzet=dg;
  }
  if(takipForm.id){
    state.takip[key]=state.takip[key].map(x=>x.id===takipForm.id?kayit:x);
    showToast('Güncellendi ✓');
  } else {
    state.takip[key].push({...kayit,id:Date.now().toString()});
    showToast('Eklendi ✓');
  }
  takipForm=null;save();render();
}

function odemeGecmisTarihKaydet(id,idx){
  const tarihInput=document.getElementById('tarih-input');
  const tutarInput=document.getElementById('tutar-input');
  if(!tarihInput||!tarihInput.value){showToast('Tarih seç');return;}
  const o=state.takip.odemeler.find(x=>x.id===id);
  if(!o||!o.gecmis||!o.gecmis[idx])return;
  const yeniTarih=tarihInput.value;
  o.gecmis[idx].tarih=yeniTarih;
  o.gecmis[idx].ay=yeniTarih.slice(0,7);
  if(tutarInput&&tutarInput.value){
    const yeniTutar=parseFloat(tutarInput.value.replace(',','.'));
    if(!isNaN(yeniTutar)&&yeniTutar>0) o.gecmis[idx].tutar=yeniTutar;
  }
  document.getElementById('tarih-modal')?.remove();
  save();render();showToast('Güncellendi ✓');
}
function odemeGecmisSil(id,idx){
  const o=state.takip.odemeler.find(x=>x.id===id);
  if(!o||!o.gecmis)return;
  o.gecmis.splice(idx,1);
  // geçmiş yoksa sonOdemeAy/sonOdemeYil sıfırla
  if(o.gecmis.length===0){delete o.sonOdemeAy;delete o.sonOdemeYil;}
  save();render();showToast('Kayıt silindi');
}
function takipSil(tip,id){
  if(!state.takip)state.takip={randevular:[],abonelikler:[],odemeler:[],harcamalar:[],etkinlikler:[]};
  if(!state.takip.etkinlikler)state.takip.etkinlikler=[];
  const key=tip==='randevu'?'randevular':tip==='abonelik'?'abonelikler':tip==='harcama'?'harcamalar':'odemeler';
  if(!state.takip[key]){showToast('Zaten boş');return;}
  state.takip[key]=state.takip[key].filter(x=>x.id!==id);
  save();render();showToast('Silindi ✓');
}

  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px';

    <div style="background:#FDF8F4;border-radius:20px;padding:24px;width:100%;max-width:320px;box-shadow:0 20px 60px rgba(0,0,0,.3)">

function odemeKaydetOnayla(id){
  const o=state.takip.odemeler.find(x=>x.id===id);
  if(!o)return;
  const tutarEl=document.getElementById('ok-tutar');
  const tarihEl=document.getElementById('ok-tarih');
  const tutar=tutarEl?parseFloat(tutarEl.value)||0:0;
  const tarih=tarihEl?tarihEl.value:new Date().toISOString().slice(0,10);
  if(!o.gecmis)o.gecmis=[];
  const ay=tarih.slice(0,7);
  o.gecmis.push({ay,tarih,tutar:tutar||undefined});
  o.sonOdemeAy=ay;
  document.getElementById('odeme-kaydet-modal')?.remove();
  showToast('Ödeme eklendi ✓'+(tutar?' — '+tutar+'₺':''));
  save();render();
}
function buildHarcamaKalemler(h,kalemler){
  var AYSK=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
  var acik=h.acik||false;
  var sayi=kalemler.filter(function(k){return k.tutar;}).length;
  var wrap=document.createElement('div');
  var btn=document.createElement('button');
  btn.style.cssText='display:flex;align-items:center;gap:4px;background:transparent;border:none;cursor:pointer;padding:6px 0 0;color:var(--sub);font-family:Nunito,sans-serif;font-size:11px;font-weight:700';
  btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="transition:transform .2s;transform:rotate('+(acik?180:0)+'deg)"><polyline points="6 9 12 15 18 9"/></svg> '+(acik?'Kapat':'Kalemleri Gör')+' ('+sayi+')';
  btn.addEventListener('click',function(e){e.stopPropagation();harcamaAcKapat(h.id);});
  wrap.appendChild(btn);
  if(acik){
    var list=document.createElement('div');
    list.style.cssText='margin-top:6px;padding-top:8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:4px';
    kalemler.filter(function(k){return k.tutar;}).slice().sort(function(a,b){var td=(a.tarih||'').localeCompare(b.tarih||'');return td!==0?td:(b.tutar||0)-(a.tutar||0);}).forEach(function(k){
      var kTarihStr=k.tarih?(function(){var d=new Date(k.tarih+'T12:00:00');return d.getDate()+' '+AYSK[d.getMonth()]+' '+(d.getFullYear()+'').slice(2);})():'';
      var row=document.createElement('div');
      row.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);opacity:'+(k.odendi?0.55:1);
      var left=document.createElement('div');
      left.style.minWidth='0';
      var lbl=document.createElement('span');
      lbl.style.cssText='font-size:12px;font-weight:600;color:var(--sub);text-decoration:'+(k.odendi?'line-through':'none');
      lbl.textContent=k.aciklama||'—';
      left.appendChild(lbl);
      if(kTarihStr){var dt=document.createElement('span');dt.style.cssText='font-size:10px;font-weight:600;color:var(--sub);margin-left:6px;opacity:.7';dt.textContent='📅 '+kTarihStr;left.appendChild(dt);}
      var right=document.createElement('span');
      right.style.cssText='font-size:12px;font-weight:800;color:'+(k.odendi?'#4A9060':'var(--text)')+';white-space:nowrap;margin-left:8px';
      right.textContent=(k.odendi?'✓ ':'')+((k.tutar||0).toLocaleString('tr-TR'))+' '+(k.doviz||'₺');
      row.appendChild(left);row.appendChild(right);list.appendChild(row);
    });
    wrap.appendChild(list);
  }
  return wrap.outerHTML;
}

function harcamaAcKapat(id,e){if(e)e.stopPropagation();
  const h=(state.takip.harcamalar||[]).find(x=>x.id===id);
  if(!h)return;
  h.acik=!h.acik;
  save();render();
}
function takipToggleOdeme(id){
  const o=state.takip.odemeler.find(x=>x.id===id);
  if(!o)return;
  odemeKaydetModal(id);
}

applyDarkMode();
render();

// ── PULL TO REFRESH (soft) ──
(function(){
  let startY=0, pulling=false, indicator=null;
  const THRESHOLD=80;

  function createIndicator(){
    if(indicator)return;
    indicator=document.createElement('div');
    indicator.id='ptr-indicator';
    indicator.style.cssText='position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:center;height:0;overflow:hidden;z-index:999;transition:height .2s;background:#F5A888;';
    indicator.innerHTML='<div style="display:flex;align-items:center;gap:8px;font-family:Nunito,sans-serif;font-size:13px;font-weight:700;color:rgba(61,31,10,.75)"><svg id="ptr-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(61,31,10,.75)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transition:transform .3s"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg><span id="ptr-txt">Yenilemek için çek</span></div>';
    document.body.appendChild(indicator);
  }

  async function softRefresh(){
    if(window._fbUser&&window._fbUser.uid){
      try{
        const {getFirestore,doc,getDoc}=await import("https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js");
        const db=getFirestore();
        const snap=await getDoc(doc(db,"users",window._fbUser.uid));
        if(snap.exists()){
          const remote=JSON.parse(snap.data().state);
          Object.assign(state,remote);
          state._egzMerged=false;
          _ensureState();
          try{localStorage.setItem(SK,JSON.stringify(state));}catch{}
        }
      }catch(e){console.error('soft refresh err',e);}
    }
    render();
    showToast('Yenilendi ✓');
  }

  document.addEventListener('touchstart',e=>{
    if(document.documentElement.scrollTop===0) startY=e.touches[0].clientY, pulling=true;
  },{passive:true});

  document.addEventListener('touchmove',e=>{
    if(!pulling)return;
    createIndicator();
    const dy=e.touches[0].clientY-startY;
    if(dy<0){pulling=false;return;}
    const h=Math.min(dy*0.5,THRESHOLD);
    indicator.style.height=h+'px';
    const icon=document.getElementById('ptr-icon');
    const txt=document.getElementById('ptr-txt');
    if(icon)icon.style.transform=`rotate(${(h/THRESHOLD)*360}deg)`;
    if(txt)txt.textContent=h>=THRESHOLD*0.9?'Bırak, yenileniyor...':'Yenilemek için çek';
  },{passive:true});

  document.addEventListener('touchend',e=>{
    if(!pulling||!indicator)return;
    const h=parseFloat(indicator.style.height)||0;
    if(h>=THRESHOLD*0.9){
      indicator.style.height='50px';
      softRefresh().finally(()=>{
        setTimeout(()=>{if(indicator)indicator.style.height='0';},600);
      });
    } else {
      indicator.style.height='0';
    }
    pulling=false;
  },{passive:true});
})();
</script>
