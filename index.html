// Actions
function setView(v){cv=v;render();}
function _indir(icerik, dosyaAdi, tip){
  const blob=new Blob([icerik],{type:tip});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=dosyaAdi;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},100);
}
function indir(){
  _indir('<!DOCTYPE html>\n'+document.documentElement.outerHTML,'hobi_takip_uygulama.html','text/html;charset=utf-8');
}
function indirVeri(){
  _indir(JSON.stringify(state,null,2),'hobi_takip_veri_'+(new Date().toISOString().slice(0,10))+'.json','application/json;charset=utf-8');
}
function veriyukle(){
  const input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{try{Object.assign(state,JSON.parse(ev.target.result));save();render();showToast('Veri yüklendi ✓');}catch{showToast('Geçersiz dosya');}};
    r.readAsText(f);
  };input.click();
}
function buildAyarlar(){
  const user = window._fbUser;
  const girisBlok = user
    ? `<div style="background:var(--card);border-radius:16px;padding:14px 16px;margin-bottom:20px;border:1.5px solid var(--border);display:flex;align-items:center;gap:12px">
        <img src="${user.photoURL}" style="width:40px;height:40px;border-radius:50%;flex-shrink:0" onerror="this.style.display='none'"/>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${user.displayName||''}</div>
          <div style="font-size:11px;font-weight:600;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${user.email||''}</div>
        </div>
        <button onclick="window._fbSignOut&&window._fbSignOut()" style="padding:7px 14px;border-radius:10px;border:1.5px solid var(--border);background:transparent;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;color:var(--sub)">Çıkış</button>
      </div>`
    : `<button onclick="window._fbSignIn?window._fbSignIn():showToast('Yükleniyor...')" style="width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:14px;border-radius:16px;border:1.5px solid var(--border);background:var(--card);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;color:var(--text);margin-bottom:20px">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google ile Giriş Yap
      </button>`;
  const _adVal=(state.kullaniciAdi||'');
  return `<div style="padding-top:8px">${girisBlok}
    <div style="font-size:13px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:12px">Profil</div>
    <div style="background:var(--card);border-radius:16px;border:1.5px solid var(--border);padding:14px 16px;margin-bottom:24px;display:flex;gap:10px;align-items:center">
      <div style="flex:1">
        <div style="font-size:12px;font-weight:700;color:var(--sub);margin-bottom:6px">İsim</div>
        <input class="field-input" placeholder="İsminizi girin..." value="${esc(_adVal)}" style="font-size:14px;font-weight:700" onchange="state.kullaniciAdi=this.value;save()" onblur="state.kullaniciAdi=this.value;save()"/>
      </div>
    </div>
    <div style="font-size:13px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:12px">Dışa Aktar</div>
    <div style="display:flex;gap:10px;margin-bottom:24px">
      <button onclick="indir()" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px;border-radius:16px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;font-family:'Nunito',sans-serif">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M12 8v8"/><path d="M8 14l4 4 4-4"/></svg>
        <span style="font-size:13px;font-weight:800;color:var(--text)">Uygulama</span>
        <span style="font-size:11px;font-weight:600;color:var(--sub)">.html dosyası</span>
      </button>
      <button onclick="indirVeri()" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px;border-radius:16px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;font-family:'Nunito',sans-serif">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
        <span style="font-size:13px;font-weight:800;color:var(--text)">Veri</span>
        <span style="font-size:11px;font-weight:600;color:var(--sub)">.json dosyası</span>
      </button>
    </div>
    <div style="font-size:13px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:12px">İçe Aktar</div>
    <button onclick="veriyukle()" style="width:100%;display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:16px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;font-family:'Nunito',sans-serif">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>
      <div style="text-align:left">
        <div style="font-size:13px;font-weight:800;color:var(--text)">Veri Yükle</div>
        <div style="font-size:11px;font-weight:600;color:var(--sub)">JSON dosyasından içe aktar</div>
      </div>
    </button>
    <div style="height:20px"></div>
  </div>`;
}
function setFilter(g){fg=g;render();}
function toggleArch(){archOpen=!archOpen;render();}
function openAdd(){eid=null;fs={name:"",emoji:"🌱",freq:{type:"daily",tpd:1,dpw:3},group:"Diğer",ci:0,adimlar:[],adimNotlar:{}};eo=false;isAdd_=true;render();}
function openEdit(id){
  const h=state.hobbies.find(x=>x.id===id);if(!h)return;
  eid=id;fs={name:h.name,emoji:h.emoji,freq:{...h.freq},group:h.group,ci:h.ci||0,adimlar:[...(h.adimlar||[])],adimNotlar:{...(h.adimNotlar||{})}};eo=false;isAdd_=true;render();
}
function cancelAdd(){eid=null;isAdd_=false;render();}
function saveHobby(){
  const ni=document.getElementById("hni");
  const name=(ni?ni.value:fs.name).trim();
  if(!name){showToast("Bir isim gir 📝");return;}
  if(!fs.group)fs.group="Diğer";
  fs.name=name;
  if(eid){state.hobbies=state.hobbies.map(h=>h.id===eid?{...h,...fs,adimlar:fs.adimlar||[],adimNotlar:fs.adimNotlar||{}}:h);showToast("Güncellendi ✓");eid=null;isAdd_=false;}
  else{state.hobbies.push({id:Date.now().toString(),...fs,adimlar:fs.adimlar||[],adimNotlar:fs.adimNotlar||{},archived:false,createdAt:todayStr()});showToast("Hobi eklendi 🌸");isAdd_=false;}
  save();isAdd_=false;adimModalId=null;eid=null;render();
}
function adimEkle(){
  const inp=document.getElementById('yeni-adim');
  const v=inp?inp.value.trim():'';
  if(!v)return;
  if(!fs.adimlar)fs.adimlar=[];
  if(fs.adimlar.length>=10)return;
  fs.adimlar.push(v);inp.value='';render();
}
function adimSil(i){if(!fs.adimlar)return;fs.adimlar.splice(i,1);render();}
function adimDuzenlemeAc(i){adimDuzenlemeIdx=i;render();setTimeout(()=>{const el=document.getElementById('adim-edit-'+i);if(el){el.focus();el.select();}},50);}
function adimDuzenlemeBitir(i){
  const inp=document.getElementById('adim-edit-'+i);
  if(inp&&inp.value.trim())fs.adimlar[i]=inp.value.trim();
  adimDuzenlemeIdx=null;render();
}
function adimModalAc(id){adimModalId=id;render();}
function adimModalKapat(){adimModalId=null;render();}
function adimToggle(hobId,adimIdx,tarih){
  if(!state.adimDurumlar)state.adimDurumlar={};
  const key='adim_'+hobId+'_'+adimIdx+'_'+tarih;
  state.adimDurumlar[key]=!state.adimDurumlar[key];
  save();render();
}
function adimNotAc(i){adimNotModalIdx=i;render();setTimeout(()=>{const el=document.getElementById('adim-not-inp');if(el)el.focus();},50);}
function adimNotKapat(){adimNotModalIdx=null;render();}
function adimNotKaydet(){
  const el=document.getElementById('adim-not-inp');
  if(!el)return;
  const val=el.value;
  if(!fs.adimNotlar)fs.adimNotlar={};
  fs.adimNotlar[adimNotModalIdx]=val;
  const hobId=eid||adimModalId;
  if(hobId){const h=state.hobbies.find(x=>x.id===hobId);if(h){if(!h.adimNotlar)h.adimNotlar={};h.adimNotlar[adimNotModalIdx]=val;save();}}
  adimNotModalIdx=null;render();
}
function openHobiMenu(id){
  adimModalId=id;
  duzenleAcik=false;
  const h=state.hobbies.find(x=>x.id===id);
  if(!h)return;
  eid=id;
  fs={name:h.name,emoji:h.emoji,freq:{...h.freq},group:h.group,ci:h.ci||0,adimlar:[...(h.adimlar||[])],adimNotlar:{...(h.adimNotlar||{})}};
  eo=false;isAdd_=false;
  render();
}
function buildAdimModal(){
  if(!adimModalId)return '';
  const h=state.hobbies.find(x=>x.id===adimModalId);
  if(!h)return '';
  const adimlar=h.adimlar||[];
  const bugun=todayStr();
  if(!state.adimDurumlar)state.adimDurumlar={};
  const tumGruplar=[...new Set([...state.groups,"Kişisel","Sağlık","Hobi","Diğer","Vitamin"])];
  const grpIdx=tumGruplar.indexOf(h.group);
  const renk=grpIdx>=0?GROUP_COLORS[grpIdx%GROUP_COLORS.length]:'#F0EDE8';
  const freq=fs.freq;

  return `<div onclick="adimModalKapat()" style="position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px">
    <div onclick="event.stopPropagation()" style="width:100%;max-width:420px;background:var(--card);border-radius:20px;padding:0 0 20px;box-shadow:0 8px 40px rgba(0,0,0,.2);max-height:88vh;overflow-y:auto">

      <!-- Başlık -->
      <div style="display:flex;align-items:center;gap:10px;padding:16px 16px 12px;border-bottom:1.5px solid var(--border);position:sticky;top:0;background:var(--card);z-index:1;border-radius:20px 20px 0 0">
        <div style="width:34px;height:34px;border-radius:10px;background:${renk};display:flex;align-items:center;justify-content:center;font-size:18px">${h.emoji}</div>
        <div style="flex:1;font-size:15px;font-weight:800;color:var(--text)">${esc(h.name)}</div>
        <button onclick="adimModalKapat()" style="width:30px;height:30px;border:none;background:var(--bg);border-radius:8px;cursor:pointer;font-size:18px;color:var(--sub)">×</button>
      </div>

      <!-- Adımlar -->
      <div style="padding:14px 16px 0">
        <div style="font-size:11px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">Bugünün Adımları</div>
        ${adimlar.length===0
          ?`<div style="padding:12px;background:var(--bg);border-radius:12px;text-align:center;color:var(--sub);font-size:12px;font-weight:600;margin-bottom:14px">Henüz adım eklenmemiş</div>`
          :adimlar.map((a,i)=>{
              const key='adim_'+h.id+'_'+i+'_'+bugun;
              const done=!!state.adimDurumlar[key];
              return `<div onclick="adimToggle('${h.id}',${i},'${bugun}')" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;margin-bottom:6px;background:${done?renk+'80':'var(--bg)'};border:1px solid ${renk};cursor:pointer">
                <div style="width:20px;height:20px;border-radius:6px;border:2px solid ${renk};background:${done?renk:'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
                  ${done?'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#3D1F0A" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>':''}
                </div>
                <span style="font-size:13px;font-weight:700;color:var(--text);text-decoration:${done?'line-through':'none'};opacity:${done?.6:1}">${esc(a)}</span>
              </div>`;
            }).join('')
        }
      </div>

      <!-- Düzenle (açılır) -->
      <div style="padding:0 16px 0">
        <button onclick="duzenleAcik=!duzenleAcik;render()" style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:14px;border:1.5px solid var(--border);background:var(--bg);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;color:var(--text);margin-bottom:${duzenleAcik?'8px':'0'}">
          <span>✏️ Düzenle</span>
          <span style="font-size:16px;color:var(--sub)">${duzenleAcik?'▴':'▾'}</span>
        </button>
        ${duzenleAcik?`<div style="background:var(--bg);border-radius:14px;padding:12px;margin-bottom:0">
          <!-- Emoji + Ad -->
          <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
            <div onclick="toggleEmoji()" style="width:42px;height:42px;border-radius:12px;background:var(--card);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;flex-shrink:0">${fs.emoji}</div>
            <input id="hni" class="field-input" placeholder="Hobi adı…" value="${esc(fs.name)}" style="flex:1;height:42px;font-size:14px"/>
          </div>
          ${eo?`<div class="emoji-grid" style="margin-bottom:10px">${EMOJIS.map(e=>`<div class="emoji-opt ${fs.emoji===e?"sel":""}" onclick="pickEmoji('${e}')">${e}</div>`).join("")}</div>`:""}
          <!-- Sıklık -->
          <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
            <div class="seg" style="flex:1;margin:0">
              <button class="seg-btn ${freq.type==="daily"?"active":""}" onclick="setFT('daily')">Günlük</button>
              <button class="seg-btn ${freq.type==="weekly"?"active":""}" onclick="setFT('weekly')">Haftalık</button>
            </div>
            <div class="stepper" style="flex-shrink:0">
              <button class="step-btn" onclick="adj('${freq.type==="daily"?"tpd":"dpw"}',-1)">−</button>
              <div class="step-val">${freq.type==="daily"?freq.tpd:freq.dpw}</div>
              <button class="step-btn" onclick="adj('${freq.type==="daily"?"tpd":"dpw"}',1)">+</button>
            </div>
            <span style="font-size:11px;font-weight:600;color:var(--sub);flex-shrink:0">${freq.type==="daily"?"kez/gün":"gün/hafta"}</span>
          </div>
          <!-- Grup -->
          <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px">
            ${([...new Set([...state.groups,"Kişisel","Sağlık","Hobi","Diğer","Vitamin"])]).map((g,gi)=>{const gc=GROUP_COLORS[gi%GROUP_COLORS.length];const isA=fs.group===g;return `<div class="form-tag" style="font-size:11px;padding:4px 10px;background:${isA?gc:'transparent'};border-color:${isA?'transparent':'var(--border)'};color:${isA?'#3D1F0A':'var(--sub)'};font-weight:${isA?800:600}" onclick="setFG('${esc(g)}')">${esc(g)}</div>`;}).join("")}
          </div>
          <!-- Adım yönetimi -->
          <div style="margin-bottom:12px">
            <div style="font-size:11px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Adım Listesi ${fs.adimlar&&fs.adimlar.length>0?`(${fs.adimlar.length}/10)`:""}</div>
            <div style="display:flex;flex-direction:column;gap:3px;margin-bottom:6px">
              ${(fs.adimlar||[]).map((a,i)=>adimDuzenlemeIdx===i
                ?`<div style="display:flex;gap:4px"><input id="adim-edit-${i}" class="field-input" value="${esc(a)}" style="flex:1;font-size:12px;padding:5px 8px" onkeydown="if(event.key==='Enter'){adimDuzenlemeBitir(${i})}"/><button onclick="adimDuzenlemeBitir(${i})" style="padding:5px 8px;border:none;background:var(--text);color:white;border-radius:8px;cursor:pointer;font-size:11px;font-weight:700">✓</button><button onclick="adimSil(${i})" style="width:26px;height:26px;border:none;background:var(--bg);border-radius:8px;cursor:pointer;font-size:13px;color:var(--sub)">×</button></div>`
                :`<div style="padding:5px 8px;background:var(--card);border-radius:8px"><div style="display:flex;align-items:center;gap:4px"><span onclick="adimDuzenlemeAc(${i})" style="flex:1;font-size:12px;font-weight:600;color:var(--text);cursor:pointer">${esc(a)}</span><button onclick="adimNotAc(${i})" style="width:22px;height:22px;border:none;background:transparent;cursor:pointer;font-size:12px">📝</button><button onclick="adimSil(${i})" style="width:22px;height:22px;border:none;background:transparent;cursor:pointer;font-size:13px;color:var(--sub)">×</button></div>${(fs.adimNotlar||{})[i]?"<div style=\"font-size:10px;color:var(--sub);margin-top:2px\">"+esc((fs.adimNotlar||{})[i])+"</div>":""}</div>`
              ).join("")}
            </div>
            ${(fs.adimlar||[]).length<10?`<div style="display:flex;gap:6px"><input id="yeni-adim" class="field-input" placeholder="Yeni adım…" style="flex:1;font-size:12px;padding:6px 10px" onkeydown="if(event.key==='Enter'){event.preventDefault();adimEkle()}"/><button onclick="adimEkle()" style="padding:6px 12px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer">+ Ekle</button></div>`:`<div style="font-size:11px;color:var(--sub);font-weight:600;text-align:center">Maksimum 10 adım</div>`}
          </div>
          <button class="save-btn" onclick="saveHobby()" style="padding:12px">Kaydet</button>
        </div>`:""}
      </div>

      <!-- Arşivle -->
      <div style="padding:8px 16px 0">
        <button onclick="confirmArchive(adimModalId);adimModalKapat()" style="width:100%;padding:12px;border-radius:14px;border:1.5px solid #D07060;background:transparent;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;color:#D07060">🚫 Arşivle</button>
      </div>
    </div>
  </div>`;
}
function buildAdimNotModal(){
  if(adimNotModalIdx===null)return '';
  const a=(fs.adimlar||[])[adimNotModalIdx]||'';
  const mevcutNot=(fs.adimNotlar||{})[adimNotModalIdx]||'';
  return `<div onclick="adimNotKapat()" style="position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;padding:16px">
    <div onclick="event.stopPropagation()" style="width:100%;max-width:400px;background:var(--card);border-radius:20px;padding:20px 20px 24px;box-shadow:0 8px 40px rgba(0,0,0,.2)">
      <div style="font-size:14px;font-weight:800;color:var(--text);margin-bottom:4px">${esc(a)}</div>
      <div style="font-size:11px;font-weight:600;color:var(--sub);margin-bottom:12px">Not ekle</div>
      <textarea id="adim-not-inp" style="width:100%;min-height:100px;border:1.5px solid var(--border);border-radius:12px;padding:10px 12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;background:var(--bg);color:var(--text);resize:none;box-sizing:border-box">${mevcutNot}</textarea>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button onclick="adimNotKapat()" style="flex:1;padding:10px;border-radius:12px;border:1.5px solid var(--border);background:transparent;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;color:var(--sub)">İptal</button>
        <button onclick="adimNotKaydet()" style="flex:1;padding:10px;border-radius:12px;border:none;background:var(--text);color:white;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer">Kaydet</button>
      </div>
    </div>
  </div>`;
}
function toggleEmoji(){eo=!eo;render();}
function pickEmoji(e){fs.emoji=e;eo=false;render();}
function renderEmojiGrid(q){
  const grid=document.getElementById('emoji-grid-container');
  if(!grid)return;
  const filtered=q?EMOJIS.filter(e=>e.includes(q)):EMOJIS;
  grid.innerHTML=filtered.map(e=>`<div class="emoji-opt ${fs.emoji===e?'sel':''}" onclick="pickEmoji('${e}')">${e}</div>`).join('');
}
function setFT(t){fs.freq.type=t;render();}
function adj(f,d){
  if(f==="tpd")fs.freq.tpd=Math.max(1,Math.min(10,fs.freq.tpd+d));
  if(f==="dpw")fs.freq.dpw=Math.max(1,Math.min(7,fs.freq.dpw+d));
  render();
}
function setFG(g){fs.group=g;render();}
function setCI(i){}
function confirmArchive(id){caid=id;render();}
function doArchive(){state.hobbies=state.hobbies.map(h=>h.id===caid?{...h,archived:true}:h);save();caid=null;showToast("Bırakıldı");render();}
function unarchive(id){state.hobbies=state.hobbies.map(h=>h.id===id?{...h,archived:false}:h);save();showToast("Geri alındı ✓");render();}
function deleteHobby(id){state.hobbies=state.hobbies.filter(h=>h.id!==id);delete state.logs[id];save();showToast("Silindi");render();}
function addGroup(){
  const i=document.getElementById("ngi");const v=i?i.value.trim():"";
  if(!v)return;state.groups.push(v);save();showToast("Grup eklendi ✓");render();
}
function deleteGroup(g){
  if(state.hobbies.filter(h=>!h.archived&&h.group===g).length){showToast("Önce hobiler taşınsın");return;}
  state.groups=state.groups.filter(x=>x!==g);save();showToast("Silindi");render();
}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}

// ─────────────────────────────────────────────
// YAPILACAKLAR
// ─────────────────────────────────────────────

function buildTodo(){
  if(!state.todos)state.todos=[];
  if(!state.surezler)state.surezler=[];
  if(!state.istekler)state.istekler=[];
  const today=todayStr();

  const VADE_RENK={kisa:'#C84848',orta:'#C87828',uzun:'#4A70B0'};
  const VADE_BG={kisa:'#FAE8E8',orta:'#FAF0DC',uzun:'#E4EEF8'};
  const VADE_LBL={kisa:'Kısa Vade',orta:'Orta Vade',uzun:'Uzun Vade'};
  const VADE_ICON={
    kisa:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>`,
    orta:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/></svg>`,
    uzun:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>`,
  };

  // İstekler sekmesi ayrı davranır
  if(todoVade==='istekler'){
    const istekler=state.istekler||[];
    const goruntuleIstekler=todoFilter==='aktif'?istekler.filter(x=>!x.tamamlandi):todoFilter==='tamamlandi'?istekler.filter(x=>x.tamamlandi):istekler;
    let html='';
    if(goruntuleIstekler.length===0){
      html+=`<div class="empty"><div class="empty-emoji">🌟</div><div class="empty-title">İstek listesi boş</div><div class="empty-sub">+ ile ekle</div></div>`;
    } else {
      goruntuleIstekler.forEach(function(t){
        html+=`<div style="background:var(--card);border-radius:16px;border:1.5px solid ${t.tamamlandi?'#C8E6D4':'var(--border)'};padding:14px;margin-bottom:8px;display:flex;gap:10px;align-items:center;opacity:${t.tamamlandi?0.6:1}">
          <button onclick="istekToggle('${t.id}')" style="width:26px;height:26px;border-radius:7px;border:2px solid ${t.tamamlandi?'#4A9060':'var(--border)'};background:${t.tamamlandi?'#4A9060':'transparent'};cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s">
            ${t.tamamlandi?'<svg width="11" height="11" viewBox="0 0 12 12"><polyline points="2 6 5 9 10 3" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}
          </button>
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:700;color:${t.tamamlandi?'var(--sub)':'var(--text)'};text-decoration:${t.tamamlandi?'line-through':'none'}">${esc(t.baslik)}</div>
            ${t.not?`<div style="font-size:12px;color:var(--sub);margin-top:3px;font-style:italic">${esc(t.not)}</div>`:''}
          </div>
          <div style="display:flex;gap:4px">
            <button onclick="istekDuzenle('${t.id}')" style="width:26px;height:26px;border-radius:7px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button onclick="istekSil('${t.id}')" style="width:26px;height:26px;border-radius:7px;border:1.5px solid #F0C8C8;background:#FAE8E8;cursor:pointer;display:flex;align-items:center;justify-content:center">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#C84848" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
            </button>
          </div>
        </div>`;
      });
    }
    if(istekForm!==null){
      html+=`<div class="modal-overlay" onclick="if(event.target===this){istekForm=null;render();}">
        <div class="modal-sheet">
          <div class="modal-handle"></div>
          <div class="modal-title" style="color:#2A9E78">${istekForm.id?'Düzenle':'İstek Ekle'}</div>
          <div class="modal-scroll">
            <div class="field-label" style="margin-bottom:6px">Başlık</div>
            <input id="istek-baslik" class="field-input" placeholder="örn. Tiyatroya git, Kitap oku..." value="${esc(istekForm.baslik||'')}" style="font-size:15px;font-weight:700;margin-bottom:12px" oninput="istekForm.baslik=this.value"/>
            <div class="field-label" style="margin-bottom:6px">Not <span style="opacity:.6;font-weight:500">(opsiyonel)</span></div>
            <input class="field-input" placeholder="Kısa bir not..." value="${esc(istekForm.not||'')}" style="font-size:13px;margin-bottom:16px" oninput="istekForm.not=this.value"/>
          </div>
          <div class="modal-footer">
            <div class="modal-btns">
              <button class="save-btn" onclick="istekKaydet()" style="margin-top:0;background:#2A9E78">Kaydet</button>
              <button class="modal-btn-cancel" onclick="istekForm=null;render()">Vazgeç</button>
            </div>
          </div>
        </div>
      </div>`;
    }
    html+=`<div style="height:20px"></div>`;
    return html;
  }

  // Seçili vadeye göre filtrele
  // Süresiz ayrı liste
  if(todoVade==='sureziz'){
    const surezler=state.surezler||[];
    const goruntuleSureziz=todoFilter==='aktif'?surezler.filter(t=>!t.tamamlandi):todoFilter==='tamamlandi'?surezler.filter(t=>t.tamamlandi):surezler;
    let html='';
    // İstatistik
    const aktifS=surezler.filter(t=>!t.tamamlandi).length;
    const tamS=surezler.filter(t=>t.tamamlandi).length;
    html+=`<div style="display:flex;gap:8px;margin-bottom:16px">
      <div style="flex:1;background:var(--card);border-radius:14px;border:1.5px solid var(--border);padding:12px 10px;text-align:center">
        <div style="font-size:22px;font-weight:800;color:var(--text)">${aktifS}</div>
        <div style="font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.5px">Bekleyen</div>
      </div>
      <div style="flex:1;background:var(--card);border-radius:14px;border:1.5px solid var(--border);padding:12px 10px;text-align:center">
        <div style="font-size:22px;font-weight:800;color:#4A9060">${tamS}</div>
        <div style="font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.5px">Tamamlanan</div>
      </div>
    </div>`;
    // Filtre
    html+=`<div style="display:flex;gap:6px;margin-bottom:16px">
      ${[['aktif','Bekleyenler'],['tamamlandi','Tamamlananlar'],['hepsi','Hepsi']].map(([v,lb])=>`
        <button onclick="todoFilter='${v}';render()" style="flex:1;padding:8px 4px;border-radius:10px;border:1.5px solid ${todoFilter===v?'#2A9E78':'var(--border)'};background:${todoFilter===v?'#E0F4EE':'var(--bg)'};color:${todoFilter===v?'#2A9E78':'var(--sub)'};font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;cursor:pointer">${lb}</button>
      `).join('')}
    </div>`;
    if(goruntuleSureziz.length===0){
      html+=`<div class="empty"><div class="empty-emoji">🌟</div><div class="empty-title">${todoFilter==='tamamlandi'?'Henüz tamamlanan yok':'Süresiz madde yok'}</div><div class="empty-sub">+ ile ekle</div></div>`;
    } else {
      const SUREZ_ETIKET_CFG={standup:{em:'🎤',clr:'#7A6EC4',bg:'#EEEDF8'},konser:{em:'🎵',clr:'#C84848',bg:'#FAE8E8'},tiyatro:{em:'🎭',clr:'#C87828',bg:'#FAF0DC'},gezi:{em:'✈️',clr:'#2A9E78',bg:'#E0F4EE'},etkinlik:{em:'🎉',clr:'#B84A6A',bg:'#FAE8F0'},müze:{em:'🏛️',clr:'#6B4F3A',bg:'#F5EFE8'},piknik:{em:'🧺',clr:'#4A9060',bg:'#E8F5EC'},diger:{em:'📌',clr:'var(--sub)',bg:'var(--bg)'}};
      const ETIKET_SIRA=['standup','konser','tiyatro','gezi','etkinlik','müze','piknik','diger'];
      const gruplar={};
      goruntuleSureziz.forEach(function(t){
        const k=t.etiket&&SUREZ_ETIKET_CFG[t.etiket]?t.etiket:'diger';
        if(!gruplar[k])gruplar[k]=[];
        gruplar[k].push(t);
      });
      if(!state.surezGrupAcik)state.surezGrupAcik={};
      ETIKET_SIRA.forEach(function(k){
        const cfg=SUREZ_ETIKET_CFG[k];
        const lbl=k==='diger'?'Diğer':k.charAt(0).toUpperCase()+k.slice(1);
        if(!gruplar[k])gruplar[k]=[];
        const grupAcik=state.surezGrupAcik[k]!==false;
        html+='<button data-grp="'+k+'" onclick="surezGrupToggle(this.dataset.grp)" style="width:100%;display:flex;align-items:center;gap:8px;margin:16px 0 10px;background:transparent;border:none;cursor:pointer;padding:0;text-align:left">'
          +'<span style="font-size:13px;font-weight:800;color:'+cfg.clr+'">'+cfg.em+' '+lbl+'</span>'
          +'<span style="font-size:10px;font-weight:600;color:var(--sub)">('+(gruplar[k]?gruplar[k].length:0)+')</span>'
          +'<div style="flex:1;height:1px;background:var(--border)"></div>'
          +'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="'+cfg.clr+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="transition:transform .2s;transform:rotate('+(grupAcik?0:180)+'deg);flex-shrink:0"><polyline points="6 9 12 15 18 9"/></svg>'
          +'</button>';
        if(grupAcik){
          gruplar[k].forEach(function(t){
            html+='<div style="background:var(--card);border-radius:16px;border:1.5px solid var(--border);margin-bottom:8px;overflow:hidden;opacity:'+(t.tamamlandi?0.6:1)+'">'
              +'<div style="padding:12px 14px;display:flex;gap:10px;align-items:center">'
              +'<button data-id="'+t.id+'" onclick="surezToggle(this.dataset.id)" style="width:26px;height:26px;border-radius:7px;border:1.5px solid '+(t.tamamlandi?'#4A9060':'var(--border)')+';background:'+(t.tamamlandi?'#4A9060':'transparent')+';cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s">'
              +(t.tamamlandi?'<svg width="10" height="10" viewBox="0 0 12 12"><polyline points="2 6 5 9 10 3" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>':'')
              +'</button>'
              +'<div style="flex:1;min-width:0">'
              +'<div style="font-size:15px;font-weight:700;color:'+(t.tamamlandi?'var(--sub)':'var(--text)')+';text-decoration:'+(t.tamamlandi?'line-through':'none')+';line-height:1.3">'+esc(t.baslik)+'</div>'
              +(t.not?'<div style="font-size:13px;color:var(--sub);margin-top:4px">'+esc(t.not)+'</div>':'')
              +'</div>'
              +'<div style="display:flex;gap:4px;flex-shrink:0">'
              +'<button data-id="'+t.id+'" onclick="surezDuzenle(this.dataset.id)" style="width:28px;height:28px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>'
              +'<button data-id="'+t.id+'" onclick="surezSil(this.dataset.id)" style="width:28px;height:28px;border-radius:8px;border:1.5px solid #F0C8C8;background:#FAE8E8;cursor:pointer;display:flex;align-items:center;justify-content:center"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#C84848" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg></button>'
              +'</div></div></div>';
          });
        }
      });
    }
    // Form modal
    if(todoForm!==null&&todoForm._sureziz){
      const f=todoForm;
      const ETIKETLER=[['standup','🎤','#7A6EC4','#EEEDF8'],['konser','🎵','#C84848','#FAE8E8'],['tiyatro','🎭','#C87828','#FAF0DC'],['gezi','✈️','#2A9E78','#E0F4EE'],['etkinlik','🎉','#B84A6A','#FAE8F0'],['müze','🏛️','#6B4F3A','#F5EFE8'],['piknik','🧺','#4A9060','#E8F5EC']];
      html+=`<div class="modal-overlay" onclick="if(event.target===this){todoForm=null;render();}">
        <div class="modal-sheet">
          <div class="modal-handle"></div>
          <div class="modal-title" style="color:#2A9E78">${f.id?'Düzenle':'Süresiz Ekle'}</div>
          <div class="modal-scroll">
            <div class="field-label" style="margin-bottom:6px">Başlık</div>
            <input id="todo-baslik" class="field-input" placeholder="örn. Tiyatroya git, Kitap oku..." value="${esc(f.baslik||'')}" style="font-size:15px;font-weight:700;margin-bottom:12px" oninput="todoForm.baslik=this.value"/>
            <div class="field-label" style="margin-bottom:8px">Etiket</div>
            <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">
              ${ETIKETLER.map(([v,em,clr,bg])=>`<button type="button" onclick="todoForm.etiket=todoForm.etiket==='${v}'?null:'${v}';render()" style="padding:6px 12px;border-radius:20px;border:1.5px solid ${(f.etiket||'')===v?clr:'var(--border)'};background:${(f.etiket||'')===v?bg:'var(--bg)'};color:${(f.etiket||'')===v?clr:'var(--sub)'};font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer">${em} ${v.charAt(0).toUpperCase()+v.slice(1)}</button>`).join('')}
            </div>
            <div class="field-label" style="margin-bottom:6px">Not <span style="font-weight:500;opacity:.6">(opsiyonel)</span></div>
            <input class="field-input" placeholder="Kısa bir not..." value="${esc(f.not||'')}" style="font-size:13px;margin-bottom:16px" oninput="todoForm.not=this.value"/>
          </div>
          <div class="modal-footer">
            <div class="modal-btns">
              <button class="save-btn" onclick="surezKaydet()" style="margin-top:0;background:#2A9E78">Kaydet</button>
              <button class="modal-btn-cancel" onclick="todoForm=null;render()">Vazgeç</button>
            </div>
          </div>
        </div>
      </div>`;
    }
    html+=`<div style="height:20px"></div>`;
    return html;
  }

  let goruntule=state.todos.filter(t=>{
    const v=t.vade||t.oncelik||'orta';
    if(v!==todoVade)return false;
    if(todoFilter==='aktif')return!t.tamamlandi;
    if(todoFilter==='tamamlandi')return t.tamamlandi;
    return true;
  });

  // Sırala: deadline önce, sonra ekleme sırası
  goruntule=[...goruntule].sort((a,b)=>{
    if(a.tamamlandi!==b.tamamlandi)return a.tamamlandi?1:-1;
    if(a.deadline&&b.deadline)return a.deadline.localeCompare(b.deadline);
    if(a.deadline)return -1;if(b.deadline)return 1;
    return 0;
  });

  // Her vade için sayılar (aktif)
  const sayilar={};
  ['kisa','orta','uzun'].forEach(v=>{
    sayilar[v]=state.todos.filter(t=>(t.vade||t.oncelik||'orta')===v&&!t.tamamlandi).length;
  });

  // İstatistikler (seçili vade)
  const toplamAktif=state.todos.filter(t=>(t.vade||t.oncelik||'orta')===todoVade&&!t.tamamlandi).length;
  const toplamTamam=state.todos.filter(t=>(t.vade||t.oncelik||'orta')===todoVade&&t.tamamlandi).length;
  const bugunBiten=state.todos.filter(t=>(t.vade||t.oncelik||'orta')===todoVade&&t.deadline===today&&!t.tamamlandi).length;

  let html='';

  // Özet bar
  html+=`<div style="display:flex;gap:8px;margin-bottom:16px">
    <div style="flex:1;background:var(--card);border-radius:14px;border:1.5px solid var(--border);padding:12px 10px;text-align:center">
      <div style="font-size:22px;font-weight:800;color:var(--text)">${toplamAktif}</div>
      <div style="font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.5px">Bekleyen</div>
    </div>
    <div style="flex:1;background:var(--card);border-radius:14px;border:1.5px solid var(--border);padding:12px 10px;text-align:center">
      <div style="font-size:22px;font-weight:800;color:#4A9060">${toplamTamam}</div>
      <div style="font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.5px">Tamamlanan</div>
    </div>
    ${bugunBiten>0?`<div style="flex:1;background:#FAE8E8;border-radius:14px;border:1.5px solid #F0C8C8;padding:12px 10px;text-align:center">
      <div style="font-size:22px;font-weight:800;color:#C84848">${bugunBiten}</div>
      <div style="font-size:10px;font-weight:700;color:#C84848;text-transform:uppercase;letter-spacing:0.5px">Bugün</div>
    </div>`:''}
  </div>`;

  // Filtre
  html+=`<div style="display:flex;gap:6px;margin-bottom:16px">
    ${[['aktif','Bekleyenler'],['tamamlandi','Tamamlananlar'],['hepsi','Hepsi']].map(([v,lb])=>`
      <button onclick="todoFilter='${v}';render()" style="flex:1;padding:8px 4px;border-radius:10px;border:1.5px solid ${todoFilter===v?VADE_RENK[todoVade]:'var(--border)'};background:${todoFilter===v?VADE_BG[todoVade]:'var(--bg)'};color:${todoFilter===v?VADE_RENK[todoVade]:'var(--sub)'};font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s">${lb}</button>
    `).join('')}
  </div>`;

  if(goruntule.length===0){
    html+=`<div class="empty">
      <div class="empty-emoji">${todoFilter==='tamamlandi'?'🎉':'✅'}</div>
      <div class="empty-title">${todoFilter==='tamamlandi'?'Henüz tamamlanan yok':'Bu vadede görev yok'}</div>
      <div class="empty-sub">${todoFilter==='aktif'?'+ butonuna basarak görev ekle':''}</div>
    </div>`;
  } else {
    goruntule.forEach(t=>{
      const gecikme=t.deadline&&t.deadline<today&&!t.tamamlandi;
      const bugunmu=t.deadline===today&&!t.tamamlandi;
      const deadlineLbl=t.deadline?(() => {
        const d=new Date(t.deadline+'T12:00:00');
        const diff=Math.round((d-new Date(today+'T12:00:00'))/(1000*60*60*24));
        if(diff<0)return`<span style="color:#C84848;font-weight:700">${Math.abs(diff)}g geçti</span>`;
        if(diff===0)return`<span style="color:#C84848;font-weight:700">Bugün</span>`;
        if(diff===1)return`<span style="color:#C87828;font-weight:700">Yarın</span>`;
        return`<span style="color:var(--sub)">${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}</span>`;
      })():'';

      const isListe=t.tip==='liste';
      const altMaddeler=t.altMaddeler||[];
      const tamamlananAlt=altMaddeler.filter(a=>a.tamamlandi).length;
      const acik=t.acik||false;

      html+=`<div style="background:var(--card);border-radius:16px;border:1.5px solid ${gecikme?'#F0C8C8':bugunmu?'#F0D8A0':'var(--border)'};margin-bottom:8px;overflow:hidden;opacity:${t.tamamlandi?0.6:1}">
        <div style="padding:12px 14px;display:flex;gap:10px;align-items:center">
          <button onclick="todoToggle('${t.id}')" style="width:26px;height:26px;border-radius:7px;border:2px solid ${t.tamamlandi?'#4A9060':'var(--border)'};background:${t.tamamlandi?'#4A9060':'transparent'};cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s">
            ${t.tamamlandi?'<svg width="12" height="12" viewBox="0 0 12 12"><polyline points="2 6 5 9 10 3" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}
          </button>
          <div style="flex:1;min-width:0">

  }

  // Form modal
  if(todoForm!==null){
    const f=todoForm;
    const fTip=f.tip||'tek';
    const altMaddeler=f.altMaddeler||[];
    html+=`<div class="modal-overlay" onclick="if(event.target===this){todoForm=null;render();}">

          <input id="todo-baslik" class="field-input" placeholder="${fTip==='liste'?'örn. Çeyiz Listesi...':'örn. Faturayı öde...'}" value="${esc(f.baslik||'')}"
            style="font-size:15px;font-weight:700;margin-bottom:16px"
            oninput="todoForm.baslik=this.value"/>

          ${fTip==='liste'?`
          <div class="field-label" style="margin-bottom:8px">Alt Maddeler</div>
          <div style="margin-bottom:8px">
            ${altMaddeler.map((a,i)=>`<div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">

            </div>`).join('')}
            <button onclick="if(!todoForm.altMaddeler)todoForm.altMaddeler=[];todoForm.altMaddeler.push({baslik:'',tamamlandi:false});render()" style="width:100%;padding:8px;border-radius:10px;border:1.5px dashed var(--border);background:transparent;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--sub);cursor:pointer">+ Madde Ekle</button>
          </div>`:''}

          <div class="field-label" style="margin-bottom:8px">Vade</div>
          <div style="display:flex;gap:6px;margin-bottom:16px">
            ${[['kisa','Kısa','#C84848','#FAE8E8'],['orta','Orta','#C87828','#FAF0DC'],['uzun','Uzun','#4A70B0','#E4EEF8']].map(([v,lb,clr,bg])=>`
              <button onclick="todoForm.vade='${v}';render()" style="flex:1;padding:10px 4px;border-radius:10px;border:1.5px solid ${(f.vade||'orta')===v?clr:'var(--border)'};background:${(f.vade||'orta')===v?bg:'var(--bg)'};color:${(f.vade||'orta')===v?clr:'var(--sub)'};font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer">${lb}</button>
            `).join('')}
          </div>

          <div class="field-label" style="margin-bottom:6px">Son Tarih <span style="font-weight:600;opacity:0.6">(opsiyonel)</span></div>
          <input type="date" class="field-input" value="${f.deadline||''}" style="font-size:14px;font-weight:600;margin-bottom:16px"
            onchange="todoForm.deadline=this.value||null"/>
        </div>
        <div class="modal-footer">
          <div class="modal-btns">
            <button class="save-btn" onclick="todoKaydet()" style="margin-top:0">Kaydet</button>
            <button class="modal-btn-cancel" onclick="todoForm=null;render()">Vazgeç</button>
          </div>
        </div>
      </div>
    </div>`;
  }

  html+=`<div style="height:20px"></div>`;
  return html;
}

function buildTakip(){
  if(!state.takip)state.takip={randevular:[],abonelikler:[],odemeler:[],harcamalar:[],etkinlikler:[]};
  if(!state.takip.etkinlikler)state.takip.etkinlikler=[];
  if(!state.takip.harcamalar)state.takip.harcamalar=[];
  const today=todayStr();
  const now=new Date();

  const SEKME_CFG={
    odeme:{lbl:'Ödemeler',renk:'#C87828',bg:'#FAF0DC',liste:state.takip.odemeler,icon:SVG.odeme},
    harcama:{lbl:'Harcamalar',renk:'#B84A6A',bg:'#FAE8F0',liste:state.takip.harcamalar,icon:SVG.harcama},
  };

  const cfg=SEKME_CFG[takipSekme];

  let html='';

  const liste=cfg.liste||[];


  // ── ÖDEMELER ──
  if(takipSekme==='odeme'){
    // Sub-tabs: aylık / yıllık
    const odPeriyot = typeof odemePeriyot!=='undefined'?odemePeriyot:'aylik';

    // ── Yıllık özet hesapla (sadece aktif periyottaki ödemeler) ──
    const tumOdemeler = state.takip.odemeler||[];
    const yillikOzet={};
    tumOdemeler.filter(o=>(o.periyot||'aylik')===odPeriyot).forEach(o=>{
      (o.gecmis||[]).forEach(g=>{
        if(!g.tutar)return;
        const yil=g.tarih?g.tarih.slice(0,4):g.ay?g.ay.slice(0,4):null;
        if(!yil)return;
        if(!yillikOzet[yil])yillikOzet[yil]={toplam:0,adet:0};
        yillikOzet[yil].toplam+=g.tutar;
        yillikOzet[yil].adet++;
      });
    });
    const yillarSirali=Object.keys(yillikOzet).sort((a,b)=>b-a);


    html+=`<div style="display:flex;background:var(--bg);border-radius:14px;padding:3px;gap:3px;border:1.5px solid var(--border);margin-bottom:16px">
      <button onclick="odemePeriyot='aylik';render()" style="flex:1;padding:9px;border-radius:11px;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;background:${odPeriyot==='aylik'?'var(--card)':'transparent'};color:${odPeriyot==='aylik'?'var(--text)':'var(--sub)'};box-shadow:${odPeriyot==='aylik'?'0 2px 8px rgba(0,0,0,.08)':'none'};transition:all .15s">📅 Aylık</button>
      <button onclick="odemePeriyot='yillik';render()" style="flex:1;padding:9px;border-radius:11px;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;background:${odPeriyot==='yillik'?'var(--card)':'transparent'};color:${odPeriyot==='yillik'?'var(--text)':'var(--sub)'};box-shadow:${odPeriyot==='yillik'?'0 2px 8px rgba(0,0,0,.08)':'none'};transition:all .15s">📆 Yıllık</button>
    </div>`;

    const filtreliListe = liste.filter(o=>( o.periyot||'aylik' )===odPeriyot);
    const bekleyen = filtreliListe.filter(o=>!o.odendi).sort((a,b)=>(a.gun||0)-(b.gun||0));
    const odendi = filtreliListe.filter(o=>o.odendi).sort((a,b)=>(a.gun||0)-(b.gun||0));

    // Her ödeme için efektif aylık tutar: sabit tutar varsa o, yoksa geçmiş ortalaması
    function efektifTutar(o){
      // Önce geçmiş ödemelerden son ödenen tutara bak
      const gc=o.gecmis||[];
      const tutarlilar=gc.filter(g=>g.tutar>0);
      if(tutarlilar.length>0){
        // En son ödenen tutarı döndür
        return tutarlilar[tutarlilar.length-1].tutar;
      }
      // Geçmiş yoksa sabit tutarı kullan
      return o.tutar||0;
    }
    const toplamAylik = bekleyen.reduce((s,o)=>s+efektifTutar(o),0);
    const tahminiVar = bekleyen.some(o=>!o.tutar&&(o.gecmis||[]).some(g=>g.tutar>0));

    if(ozetAcikYil===null&&yillarSirali.length>0) ozetAcikYil=yillarSirali[0];
    if(ozetAcikAy===null) ozetAcikAy=new Date().getMonth()+1;
    const AYLAR_TR=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];

    // Seçilen ay+yıl için tüm ödemelerin toplamı
    const secilenKey=ozetAcikYil&&ozetAcikAy?ozetAcikYil+'-'+String(ozetAcikAy).padStart(2,'0'):null;
    let aylikSecimToplam=0,aylikSecimAdet=0;
    if(secilenKey){
      tumOdemeler.filter(o=>(o.periyot||'aylik')===odPeriyot).forEach(o=>{
        (o.gecmis||[]).forEach(g=>{
          const gKey=g.ay||(g.tarih?g.tarih.slice(0,7):null);
          if(gKey===secilenKey&&g.tutar){aylikSecimToplam+=g.tutar;aylikSecimAdet++;}
        });
      });
    }
    const secilenOzet=ozetAcikYil&&yillikOzet[ozetAcikYil]?yillikOzet[ozetAcikYil]:null;

    if(bekleyen.length>0){
      html+=`<div style="background:linear-gradient(135deg,${cfg.renk}18,${cfg.renk}08);border:1.5px solid ${cfg.renk}30;border-radius:16px;padding:14px;margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div>
            <div style="font-size:11px;font-weight:700;color:${cfg.renk};text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">${odPeriyot==='yillik'?(ozetAcikYil||'')+' Toplamı':secilenKey?AYLAR_TR[(ozetAcikAy||1)-1]+' Toplamı':'Aylık Toplam'}</div>
            <div style="font-size:26px;font-weight:800;color:var(--text)">${odPeriyot==='yillik'?(secilenOzet&&secilenOzet.toplam>0?Math.round(secilenOzet.toplam).toLocaleString('tr-TR'):'—'):(aylikSecimToplam>0?aylikSecimToplam.toFixed(0):'—')} <span style="font-size:14px;font-weight:600;color:var(--sub)">${(odPeriyot==='yillik'?secilenOzet&&secilenOzet.toplam>0:aylikSecimToplam>0)?'₺':''}</span></div>
          </div>

        </div>
        ${odPeriyot==='aylik'&&yillarSirali.length>0?`<div style="border-top:1.5px solid ${cfg.renk}20;padding-top:10px">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
            <select onchange="ozetAcikAy=parseInt(this.value);render()" style="flex:1;padding:5px 8px;border-radius:10px;border:1.5px solid ${cfg.renk}40;background:var(--card);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:${cfg.renk};cursor:pointer;outline:none">
              ${AYLAR_TR.map((a,i)=>`<option value="${i+1}" ${ozetAcikAy===i+1?'selected':''}>${a}</option>`).join('')}
            </select>
            <select onchange="ozetAcikYil=this.value;render()" style="padding:5px 8px;border-radius:10px;border:1.5px solid ${cfg.renk}40;background:var(--card);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:${cfg.renk};cursor:pointer;outline:none">
              ${yillarSirali.map(y=>`<option value="${y}" ${ozetAcikYil===y?'selected':''}>${y}</option>`).join('')}
            </select>

          </div>
        </div>`:''}
        ${odPeriyot==='yillik'&&yillarSirali.length>0?`<div style="border-top:1.5px solid ${cfg.renk}20;padding-top:10px;display:flex;align-items:center;justify-content:space-between;gap:8px">
          <select onchange="ozetAcikYil=this.value;render()" style="padding:5px 10px;border-radius:10px;border:1.5px solid ${cfg.renk}40;background:var(--card);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:${cfg.renk};cursor:pointer;outline:none">
            ${yillarSirali.map(y=>`<option value="${y}" ${ozetAcikYil===y?'selected':''}>${y}</option>`).join('')}
          </select>

        </div>`:''}
      </div>`;
    }



    if(filtreliListe.length===0){
      html+=`<div class="empty"><div class="empty-emoji">💳</div><div class="empty-title">${odPeriyot==='aylik'?'Aylık ödeme yok':'Yıllık ödeme yok'}</div><div class="empty-sub">+ ile ekle</div></div>`;
    } else {
      if(bekleyen.length){
        html+=`<div style="font-size:11px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:10px">Aktif · ${bekleyen.length}</div>`;
        bekleyen.forEach(o=>{ html+=takipKartOdeme(o,today,cfg,odPeriyot); });
      }
      if(odendi.length){
        html+=`<div style="font-size:11px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:0.7px;margin:16px 0 10px">Ödendi · ${odendi.length}</div>`;
        odendi.forEach(o=>{ html+=takipKartOdeme(o,today,cfg,odPeriyot); });
      }
    }
  }

  // ── HARCAMALAR ──
  else if(takipSekme==='harcama'){
    const harcamalar=state.takip.harcamalar||[];
    function harcamaTarih(h){
      if(h.kalemler&&h.kalemler.length){const t=h.kalemler.map(k=>k.tarih||'').filter(Boolean).sort().reverse()[0];if(t)return t;}
      return h.tarih||'';
    }
    // Yıl listesi - mevcut harcamalardan
    const tumYillar=[...new Set(harcamalar.map(h=>{const t=harcamaTarih(h);return t?parseInt(t.slice(0,4)):null;}).filter(Boolean))].sort((a,b)=>b-a);
    if(!tumYillar.includes(harcamaYil)&&tumYillar.length>0) harcamaYil=tumYillar[0];
    const AYLAR_TR=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];

    // Yıl/Ay filtresi uygula
    const filtreliHarcamalar=harcamalar.filter(h=>{
      const t=harcamaTarih(h);
      if(!t) return harcamaAy===0;
      const yil=parseInt(t.slice(0,4));
      const ay=parseInt(t.slice(5,7));
      if(yil!==harcamaYil) return false;
      if(harcamaAy>0&&ay!==harcamaAy) return false;
      return true;
    });
    const sirali=filtreliHarcamalar.slice().sort((a,b)=>harcamaTarih(b).localeCompare(harcamaTarih(a)));

    // Kalem bazlı ödendi/bekleyen hesapla
    function harcamaBekleyenTutar(h){
      if(!h.kalemler||!h.kalemler.length) return h.tutar||0;
      return h.kalemler.filter(k=>!k.odendi).reduce((s,k)=>s+(k.tutar||0),0);
    }
    function harcamaOdendiTutar(h){
      if(!h.kalemler||!h.kalemler.length) return 0;
      return h.kalemler.filter(k=>k.odendi).reduce((s,k)=>s+(k.tutar||0),0);
    }
    function harcamaTamOdendi(h){
      if(!h.kalemler||!h.kalemler.length) return false;
      return h.kalemler.every(k=>k.odendi);
    }
    function harcamaHicOdenmedi(h){
      if(!h.kalemler||!h.kalemler.length) return true;
      return h.kalemler.every(k=>!k.odendi);
    }

    // Yıl seçici
    html+=`<div style="margin-bottom:12px">
      <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none">
        ${tumYillar.length===0?`<div style="font-size:13px;color:var(--sub);padding:8px 0">Henüz harcama yok</div>`:''}
        ${tumYillar.map(y=>`<button onclick="harcamaYil=${y};harcamaAy=0;render()" style="flex-shrink:0;padding:8px 16px;border-radius:20px;border:1.5px solid ${harcamaYil===y?cfg.renk:'var(--border)'};background:${harcamaYil===y?cfg.renk:'var(--bg)'};color:${harcamaYil===y?'white':'var(--sub)'};font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer">${y}</button>`).join('')}
      </div>

    </div>`;

    // Özet kart - ödendi/bekleyen ayrımıyla
    if(sirali.length>0){
      const tumBekleyen=sirali.reduce((s,h)=>s+harcamaBekleyenTutar(h),0);
      const tumOdendi=sirali.reduce((s,h)=>s+harcamaOdendiTutar(h),0);
      const toplamTutar=tumBekleyen+tumOdendi;
      html+=`<div style="background:linear-gradient(135deg,${cfg.renk}18,${cfg.renk}08);border:1.5px solid ${cfg.renk}30;border-radius:16px;padding:14px;margin-bottom:16px">
        <div style="display:flex;gap:0">
          <div style="flex:1;min-width:0">
            <div style="font-size:10px;font-weight:700;color:#C84848;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px">Bekleyen</div>
            <div style="font-size:17px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${tumBekleyen.toLocaleString('tr-TR')} <span style="font-size:13px;font-weight:700;color:var(--sub)">₺</span></div>
          </div>
          <div style="flex:1;min-width:0;border-left:1.5px solid ${cfg.renk}20;padding-left:10px">
            <div style="font-size:10px;font-weight:700;color:#4A9060;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px">Ödendi</div>
            <div style="font-size:17px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${tumOdendi.toLocaleString('tr-TR')} <span style="font-size:13px;font-weight:700;color:var(--sub)">₺</span></div>
          </div>
          <div style="flex:1;min-width:0;border-left:1.5px solid ${cfg.renk}20;padding-left:10px">
            <div style="font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px">Toplam</div>
            <div style="font-size:17px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${toplamTutar.toLocaleString('tr-TR')} <span style="font-size:13px;font-weight:700;color:var(--sub)">₺</span></div>
          </div>
        </div>
      </div>`;
    }

    // Filtre sekmeleri
    const hepsi=sirali.length;
    const bekSayı=sirali.filter(h=>!harcamaTamOdendi(h)).length;
    const odSayı=sirali.filter(h=>harcamaTamOdendi(h)).length;
    html+=`<div style="display:flex;background:var(--bg);border-radius:14px;padding:3px;gap:3px;border:1.5px solid var(--border);margin-bottom:16px">
      <button onclick="harcamaFiltre='tumu';render()" style="flex:1;padding:9px 4px;border-radius:11px;border:none;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:${harcamaFiltre==='tumu'?'var(--card)':'transparent'};color:${harcamaFiltre==='tumu'?'var(--text)':'var(--sub)'};box-shadow:${harcamaFiltre==='tumu'?'0 2px 8px rgba(0,0,0,.08)':'none'}">Tümü${hepsi?' · '+hepsi:''}</button>
      <button onclick="harcamaFiltre='bekleyen';render()" style="flex:1;padding:9px 4px;border-radius:11px;border:none;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:${harcamaFiltre==='bekleyen'?'var(--card)':'transparent'};color:${harcamaFiltre==='bekleyen'?'#C84848':'var(--sub)'};box-shadow:${harcamaFiltre==='bekleyen'?'0 2px 8px rgba(0,0,0,.08)':'none'}">Bekleyen${bekSayı?' · '+bekSayı:''}</button>
      <button onclick="harcamaFiltre='odendi';render()" style="flex:1;padding:9px 4px;border-radius:11px;border:none;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:${harcamaFiltre==='odendi'?'var(--card)':'transparent'};color:${harcamaFiltre==='odendi'?'#4A9060':'var(--sub)'};box-shadow:${harcamaFiltre==='odendi'?'0 2px 8px rgba(0,0,0,.08)':'none'}">Ödendi${odSayı?' · '+odSayı:''}</button>
    </div>`;

    const gosterilen=harcamaFiltre==='bekleyen'?sirali.filter(h=>!harcamaTamOdendi(h)):harcamaFiltre==='odendi'?sirali.filter(h=>harcamaTamOdendi(h)):sirali;

    if(harcamalar.length===0){
      html+=`<div class="empty"><div class="empty-emoji">💸</div><div class="empty-title">Harcama kaydı yok</div><div class="empty-sub">+ ile büyük harcamalarını ekle</div></div>`;
    } else if(sirali.length===0){
      html+=`<div class="empty"><div class="empty-emoji">💸</div><div class="empty-title">${harcamaAy>0?AYLAR_TR[harcamaAy-1]+' '+harcamaYil:harcamaYil} için kayıt yok</div></div>`;
    } else if(gosterilen.length===0){
      html+=`<div class="empty"><div class="empty-emoji">💸</div><div class="empty-title">${harcamaFiltre==='bekleyen'?'Bekleyen harcama yok':'Ödenmiş harcama yok'}</div></div>`;
    } else {
      gosterilen.forEach(h=>{
          const _ht=harcamaTarih(h);
          const gunStr=_ht?(()=>{const d=new Date(_ht+'T12:00:00');return d.getDate()+' '+['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'][d.getMonth()];})():'';
          const kalemler=h.kalemler&&h.kalemler.length?h.kalemler:[];
          const bekDoviz={}, odDoviz={};
          kalemler.forEach(k=>{const d=k.doviz||'₺'; if(k.odendi) odDoviz[d]=(odDoviz[d]||0)+(k.tutar||0); else bekDoviz[d]=(bekDoviz[d]||0)+(k.tutar||0);});
          const toplamTutar=kalemler.length?kalemler.reduce((s,k)=>s+(k.tutar||0),0):(h.tutar||0);
          const bekStr=Object.entries(bekDoviz).filter(([,v])=>v>0).map(([d,v])=>`${v.toLocaleString('tr-TR')} ${d}`).join(' + ');
          const odStr=Object.entries(odDoviz).filter(([,v])=>v>0).map(([d,v])=>`${v.toLocaleString('tr-TR')} ${d}`).join(' + ');
          const kartToplamStr=(bekStr||odStr)?[bekStr,odStr?`<span style="color:#4A9060;font-size:12px">✓ ${odStr}</span>`:''].filter(Boolean).join(' + '):(toplamTutar.toLocaleString('tr-TR')+' ₺');
          html+=`<div style="background:var(--card);border-radius:16px;border:1.5px solid var(--border);padding:14px;margin-bottom:8px">
            <div style="display:flex;gap:12px;align-items:flex-start">
              <div style="width:42px;height:42px;border-radius:12px;background:${cfg.bg};display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px">${h.emoji||'💸'}</div>
              <div style="flex:1;min-width:0">
                <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px">${esc(h.baslik)}</div>
                <div style="display:flex;flex-wrap:wrap;gap:5px;align-items:center">
                  <span style="font-size:15px;font-weight:800;color:${cfg.renk}">${kartToplamStr}</span>

                </div>
                ${h.not?`<div style="font-size:12px;color:var(--sub);margin-top:5px;font-style:italic">${esc(h.not)}</div>`:''}
              </div>
              <div style="display:flex;gap:4px;flex-shrink:0">
                <button onclick="harcamaAcKapat('${h.id}')" style="width:30px;height:30px;border-radius:8px;border:1.5px solid ${h.acik?cfg.renk:'var(--border)'};background:${h.acik?cfg.bg:'var(--bg)'};cursor:pointer;display:flex;align-items:center;justify-content:center">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="${h.acik?cfg.renk:'currentColor'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transition:transform .2s;transform:rotate(${h.acik?180:0}deg)"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
                <button onclick="takipDuzenle('harcama','${h.id}')" style="width:30px;height:30px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
                <button onclick="takipSil('harcama','${h.id}')" style="width:30px;height:30px;border-radius:8px;border:1.5px solid #F0C8C8;background:#FAE8E8;cursor:pointer;display:flex;align-items:center;justify-content:center">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#C84848" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
                </button>
              </div>
            </div>
          </div>
          ${h.acik&&kalemler.length>0?`<div style="background:var(--card);border-radius:0 0 16px 16px;border:1.5px solid var(--border);border-top:none;padding:0 14px 12px">${buildHarcamaKalemler(h,kalemler)}</div>`:''}
        `;
      });
    }
  }


  // Form modal
  if(takipForm!==null){
    html+=buildTakipForm();
  }

  html+=`<div style="height:20px"></div>`;
  return html;
}

function takipKartOdeme(o,today,cfg,periyot){
  periyot=periyot||o.periyot||'aylik';
  const odendi=o.odendi||false;
  const acik=odemeAcikId===o.id;

  // ── İstatistik hesapla ──
  const gecmis=o.gecmis||[];
  const toplamOdeme=gecmis.length;
  const tutar=o.tutar||0;
  const toplamTutar=gecmis.reduce((s,g)=>s+(g.tutar||tutar||0),0);
  const AYLAR_LONG=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  const gecmisSirali=[...gecmis].reverse().slice(0,12);
  const simdi2=new Date(today+'T12:00:00');
  const AYLAR_K=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
  // Tüm geçmiş kayıtlarından benzersiz ay listesi oluştur (kronolojik)
  const tumAylar=[...new Set(gecmis.map(g=>g.ay||(g.tarih?g.tarih.slice(0,7):null)).filter(Boolean))].sort();
  const grafAylar=tumAylar.map(key=>{
    const kayit=gecmis.filter(g=>g.ay===key||(g.tarih&&g.tarih.slice(0,7)===key));
    const ayTutar=kayit.length>0?(kayit.reduce((s,g)=>s+(g.tutar||tutar||0),0)/kayit.length):null;
    const ayNo=parseInt(key.slice(5,7))-1;
    const yil=key.slice(2,4);
    return {key,lbl:AYLAR_K[ayNo]+"'"+yil,tutar:ayTutar};
  });
  const grafTutarlar=grafAylar.map(a=>a.tutar);
  const grafMax=Math.max(...grafTutarlar.filter(t=>t!==null),1);
  const grafMin=Math.min(...grafTutarlar.filter(t=>t!==null),0);
  const grafRange=grafMax-grafMin||1;

  // Rutin ödeme zamanı gösterimi
  let zamanStr='';
  let badgeStr='';
  const todayD=new Date(today+'T12:00:00');
  const todayGun=todayD.getDate();
  const todayAy=todayD.getMonth()+1;
  const AYLAR=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];

  const effGun = o.gun || (periyot!=='aylik' && o.tarih ? new Date(o.tarih+'T12:00:00').getDate() : null);
  if(periyot==='aylik'){
    zamanStr=effGun?`Her ayın ${effGun}. günü`:'Her ay';
    if(effGun){
      const diff=effGun-todayGun;
      if(diff===0)badgeStr=`<span style="background:#FAE8E8;color:#C84848;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700">Bugün</span>`;
      else if(diff===1)badgeStr=`<span style="background:#FAF0DC;color:#C87828;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700">Yarın</span>`;
      else if(diff>0&&diff<=7)badgeStr=`<span style="background:${cfg.bg};color:${cfg.renk};padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700">${diff}g sonra</span>`;
      else if(diff<0)badgeStr=`<span style="background:#FAE8E8;color:#C84848;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700">${Math.abs(diff)}g geçti</span>`;
    }
  } else if(periyot==='yillik'){
    const tarihler=o.tarihler&&o.tarihler.length?o.tarihler:(effGun&&o.ay?[{ay:o.ay,gun:effGun}]:[]);
    if(tarihler.length){
      zamanStr=tarihler.map(t=>`${t.gun||'?'} ${AYLAR[(t.ay||1)-1]}`).join(' · ');
      // Find nearest upcoming
      const nearest=tarihler.map(t=>{const diff=(t.ay-todayAy)*30+((t.gun||0)-todayGun);return diff;}).sort((a,b)=>a-b);
      const d=nearest[0];
      if(d===0)badgeStr=`<span style="background:#FAE8E8;color:#C84848;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700">Bugün</span>`;
      else if(d>0&&d<=14)badgeStr=`<span style="background:${cfg.bg};color:${cfg.renk};padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700">${d}g sonra</span>`;
      else if(d<0&&d>-14)badgeStr=`<span style="background:#FAE8E8;color:#C84848;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700">${Math.abs(d)}g geçti</span>`;
    }
  }
  const tarihStr=zamanStr;
  const gecikme=badgeStr.includes('geçti')&&!odendi;
  const bugunmu=badgeStr.includes('Bugün')&&!odendi;

  // ── İstatistik paneli HTML ──
  const istatPanel=acik?`
  <div style="border-top:1.5px solid var(--border);margin-top:12px;padding-top:14px">
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <div style="flex:1;background:${cfg.bg};border-radius:12px;padding:10px 12px;text-align:center">
        <div style="font-size:22px;font-weight:800;color:${cfg.renk}">${toplamOdeme}</div>
        <div style="font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.4px;margin-top:2px">Ödeme Ayı</div>
      </div>
      <div style="flex:1;background:${cfg.bg};border-radius:12px;padding:10px 12px;text-align:center">
        <div style="font-size:22px;font-weight:800;color:${cfg.renk}">${toplamTutar.toLocaleString('tr-TR')}₺</div>
        <div style="font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.4px;margin-top:2px">Toplam Ödendi</div>
      </div>
      ${tutar?`<div style="flex:1;background:var(--bg);border-radius:12px;padding:10px 12px;text-align:center;border:1.5px solid var(--border)">
        <div style="font-size:22px;font-weight:800;color:var(--text)">${tutar.toLocaleString('tr-TR')}₺</div>
        <div style="font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.4px;margin-top:2px">Aylık Tutar</div>
      </div>`:''}
    </div>
    <div style="margin-bottom:14px">
      <div style="font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Fiyat Değişimi — Son 6 Ay</div>
      ${(()=>{
        const W=300,H=80,padL=4,padR=4,padT=8,padB=20;
        const iW=W-padL-padR, iH=H-padT-padB;
        const noktalar=grafAylar.map((a,i)=>{
          const x=padL+(i/(grafAylar.length-1||1))*iW;
          const y=a.tutar!==null?padT+iH-(((a.tutar-grafMin)/grafRange)*iH):null;
          return {x,y,lbl:a.lbl,tutar:a.tutar};
        });
        const gercek=noktalar.filter(n=>n.y!==null);
        if(gercek.length<2) return '<div style="text-align:center;font-size:12px;color:var(--sub);padding:16px 0">Grafik için en az 2 kayıt gerekli</div>';
        // Çizgi path
        const path=gercek.map((n,i)=>(i===0?`M${n.x},${n.y}`:`L${n.x},${n.y}`)).join(' ');
        // Alan dolgu
        const alanPath=`${path} L${gercek[gercek.length-1].x},${padT+iH} L${gercek[0].x},${padT+iH} Z`;
        // Noktalar ve etiketler
        const circles=noktalar.map(n=>n.y!==null?`
          <circle cx="${n.x}" cy="${n.y}" r="3.5" fill="${cfg.renk}" stroke="white" stroke-width="1.5"/>
          <text x="${n.x}" y="${n.y-7}" text-anchor="middle" font-size="8" font-weight="700" fill="${cfg.renk}">${n.tutar!==null?n.tutar+'₺':''}</text>
        `:'').join('');
        const labels=noktalar.map(n=>`<text x="${n.x}" y="${H-3}" text-anchor="middle" font-size="9" font-weight="700" fill="var(--sub)">${n.lbl}</text>`).join('');
        return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;overflow:visible">
          <defs>
            <linearGradient id="grafGrad-${o.id}" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="${cfg.renk}" stop-opacity="0.25"/>
              <stop offset="100%" stop-color="${cfg.renk}" stop-opacity="0.02"/>
            </linearGradient>
          </defs>
          <path d="${alanPath}" fill="url(#grafGrad-${o.id})"/>
          <path d="${path}" fill="none" stroke="${cfg.renk}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          ${circles}
          ${labels}
        </svg>`;
      })()}
    </div>

    ${gecmisSirali.length>0?`
    <div>
      <div style="font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Ödeme Geçmişi</div>
      ${gecmisSirali.map(g=>{
        const tarihG=g.tarih||'';

        const ayLblG=ayNoG>=0?AYLAR_LONG[ayNoG]+' '+yilG:tarihG;
        const gunLblG=tarihG?tarihG.slice(8,10)+' '+ayLblG:ayLblG;

        return `<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)">
          <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0">
            <span style="font-size:12px;font-weight:600;color:var(--text)">${gunLblG}</span>
            <button onclick="odemeGecmisDuzenle('${o.id}',${gi},'${g.tarih||''}')" style="width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:12px;font-weight:800;color:${cfg.renk}">${(g.tutar||tutar)?(g.tutar||tutar).toLocaleString('tr-TR')+'₺':'✓'}</span>
            <button onclick="odemeGecmisSil('${o.id}',${gi})" style="width:32px;height:32px;border-radius:8px;border:1.5px solid #F0C8C8;background:#FAE8E8;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#C84848" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
            </button>
          </div>
        </div>`;
      }).join('')}
    </div>`:`<div style="text-align:center;padding:8px 0;font-size:12px;color:var(--sub)">Henüz ödeme geçmişi yok</div>`}
  </div>`:'';

  return `<div style="background:var(--card);border-radius:16px;border:1.5px solid ${gecikme?'#F0C8C8':bugunmu?'#F0D8A0':odendi?'#C8E6D4':acik?cfg.renk+'50':'var(--border)'};padding:16px;margin-bottom:8px;opacity:${odendi?0.75:1};box-sizing:border-box">
    <div style="display:flex;align-items:center;gap:10px">
      <button onclick="takipToggleOdeme('${o.id}')" style="width:36px;height:36px;border-radius:10px;border:none;background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1">
        ${odendi?'✅':'💸'}
      </button>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-decoration:${odendi?'line-through':'none'};margin-bottom:3px">${esc(o.baslik)}</div>
        <div style="height:18px;display:flex;align-items:center;gap:5px;margin-bottom:3px">
          ${tarihStr?`<span style="font-size:11px;font-weight:600;color:var(--sub)">📅 ${tarihStr}</span>`:'<span style="font-size:11px;color:transparent">—</span>'}
          ${badgeStr}
        </div>
        <div style="height:18px;display:flex;align-items:center;gap:5px">
          ${(()=>{
            if(o.tutar) return `<span style="font-size:12px;font-weight:800;color:${odendi?'var(--sub)':cfg.renk}">${o.tutar}₺</span>`;
            const gc=(o.gecmis||[]).filter(g=>g.tutar>0);
            if(!gc.length) return '<span style="font-size:12px;color:transparent">—</span>';
            const ort=Math.round(gc.reduce((s,g)=>s+g.tutar,0)/gc.length);
            return `<span style="font-size:12px;font-weight:800;color:${odendi?'var(--sub)':cfg.renk}">~${ort}₺ <span style="font-weight:600;opacity:.7">ort.</span></span>`;
          })()}
          ${gecmis.length>0?`<span style="font-size:12px;font-weight:700;color:var(--sub);background:var(--bg);border:1px solid var(--border);padding:1px 7px;border-radius:6px">${gecmis.length} ödeme</span>`:''}

        </button>
        <button onclick="takipDuzenle('odeme','${o.id}')" style="width:26px;height:26px;border-radius:7px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button onclick="takipSil('odeme','${o.id}')" style="width:26px;height:26px;border-radius:7px;border:1.5px solid #F0C8C8;background:#FAE8E8;cursor:pointer;display:flex;align-items:center;justify-content:center">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#C84848" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        </button>
      </div>
    </div>
    ${istatPanel}
  </div>`;
}

function buildTakipForm(){
  const f=takipForm;
  const s=takipSekme;
  const RENK={randevu:'#7A6EC4',abonelik:'#2A9E78',odeme:'#C87828',harcama:'#B84A6A'};
  const clr=RENK[s];

  let fields='';
  if(s==='odeme'){
    const fPeriyot=f.periyot||odemePeriyot||'aylik';
    fields=`
      <div class="field-label" style="margin-bottom:6px">Başlık</div>

          <input type="number" class="field-input" placeholder="0" value="${f.tutar||''}" style="font-size:15px;font-weight:700" onchange="takipForm.tutar=parseFloat(this.value)||null"/>
