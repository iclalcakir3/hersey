  --text:#3D1F0A;
  --sub:#7A6858;
  --accent:#C86848;
  --accent2:#5A9E88;
  --accent3:#7A6EC4;
  --accent4:#C48830;
  --accent5:#4F90B8;
  --header-bg:linear-gradient(135deg,#F5A888 0%,#EDB888 100%);
  --btn-bg:#A86050;
  --nav-active:#3D1F0A;
  --nav-bg:#FFFCF9;
}

[data-theme="dark"]{
  --bg:#1A1210;
  --card:#2A1F1A;
  --border:#3D2E26;
  --text:#F0E8E0;
  --sub:#9A8878;
  --accent:#E0906A;
  --accent2:#6AB89A;
  --accent3:#9A90D8;
  --accent4:#D8A040;
  --accent5:#6AAAD0;
  --header-bg:linear-gradient(135deg,#7A4030 0%,#6A4820 100%);
  --btn-bg:#8A5040;
  --nav-active:#F0E8E0;
  --nav-bg:#221810;
}
[data-theme="dark"] body{background:#1A1210;color:#F0E8E0;}
[data-theme="dark"] .rail{background:rgba(34,24,16,.97);}
[data-theme="dark"] .field-input{background:#2A1F1A;color:#F0E8E0;}
[data-theme="dark"] .save-btn{background:#8A5040;}
[data-theme="dark"] .main-check{background:#2A1F1A;}
[data-theme="dark"] .modal-sheet,[data-theme="dark"] .archive-card{background:#2A1F1A;}

/* Header */
.header{
  background:linear-gradient(135deg,#F5A888 0%,#EDB888 100%);
  padding:calc(env(safe-area-inset-top,0px) + 16px) 20px 16px 20px;
  position:sticky;top:0;z-index:100;
  border-bottom:none;
}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;}
.header-greeting{font-size:12px;font-weight:700;color:rgba(61,31,10,.75);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:4px;}
.header-title{font-size:20px;font-weight:800;color:#3D1F0A;}
.add-btn{
  width:40px;height:36px;border-radius:50%;background:#3D1F0A;
  border:none;color:white;font-size:20px;font-weight:300;line-height:1;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:4px;
  box-shadow:0 4px 14px rgba(44,44,44,.25);
  transition:transform .15s,box-shadow .15s;
}
.add-btn:active{transform:scale(.92);box-shadow:0 2px 6px rgba(44,44,44,.15);}

/* Bottom nav */
/* Dikey Rail */
.rail{
  position:fixed;left:0;top:80px;bottom:0;
  width:52px;
  background:rgba(255,252,249,.97);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-right:1.5px solid var(--border);
  display:flex;flex-direction:column;align-items:center;
  padding:8px 4px calc(env(safe-area-inset-bottom,0px) + 8px);
  gap:2px;
  z-index:99;
  overflow-y:auto;
  scrollbar-width:none;
  -ms-overflow-style:none;
  -webkit-overflow-scrolling:touch;
}
.rail::-webkit-scrollbar{display:none;}
.rail-item{
  width:40px;height:40px;border-radius:12px;
  border:none;background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--sub);transition:background .15s;
  flex-shrink:0;padding:8px;box-sizing:border-box;
}
.rail-item svg{width:100%;height:100%;pointer-events:none;display:block;}
.rail-item.active{background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.1);}
.rail-sep{width:24px;height:1px;background:var(--border);margin:4px 0;flex-shrink:0;pointer-events:none;}
.rail-lbl{font-size:8px;font-weight:800;color:var(--sub);letter-spacing:.6px;text-transform:uppercase;text-align:center;padding:6px 0 2px;width:100%;pointer-events:none;}

/* Content */
.content{padding:20px 20px 40px 68px;max-width:100%;margin:0;}

/* Section title */
.section-title{font-size:12px;font-weight:700;color:var(--sub);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:14px;}

/* Group filter pills */
.pills{display:flex;gap:8px;overflow-x:auto;padding-bottom:16px;scrollbar-width:none;justify-content:center;flex-wrap:wrap;}
.pills::-webkit-scrollbar{display:none;}
.pill{
  flex-shrink:0;padding:7px 16px;border-radius:100px;
  font-size:13px;font-weight:700;cursor:pointer;
  background:var(--card);border:1.5px solid var(--border);color:var(--sub);
  transition:all .15s;
}
.pill.active{color:white;border-color:transparent;} .pill.active.tumupill{color:#2C2C2C;}

/* Hobby card */
.hobby-row{
  display:flex;align-items:center;gap:4px;
  padding:4px 6px;background:var(--card);
  border-radius:0;height:40px;
}
.hobby-row-left{display:flex;align-items:center;gap:4px;width:112px;flex-shrink:0;min-width:0;}
.hobby-row-emoji{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.hobby-row-info{display:flex;flex-direction:column;min-width:0;}
.hobby-row-name{font-size:12px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;}
.hobby-row-streak{font-size:10px;font-weight:700;color:var(--sub);}
.hobby-row-dots{display:flex;gap:0;flex:1;align-items:center;}
.hobby-row-actions{display:flex;align-items:center;gap:0px;flex-shrink:0;}
.main-check{
  width:26px;height:26px;border-radius:6px;
  border:1.5px solid var(--border);background:white;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;flex-shrink:0;
  font-size:9px;font-weight:800;color:var(--sub);
}
.main-check.done{border-color:transparent;color:white;}
.streak{font-size:10px;font-weight:700;color:var(--sub);}

/* Week dots */
.week-row{display:flex;gap:2px;}
.week-cell{flex:1;display:flex;flex-direction:column;align-items:center;}
.week-label{display:none;}
.week-dot{
  flex:1;min-width:26px;max-width:52px;height:26px;border-radius:0;
  background:var(--border);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:6px;font-weight:800;color:var(--sub);
  transition:all .15s;
}
.week-dot.done{color:#3D1F0A;}
.week-dot:first-child{border-radius:6px 0 0 6px;}
.week-dot:last-child{border-radius:0 6px 6px 0;}
.week-dot.partial{background:#FFE8B0;}

/* Card footer */
.card-footer{display:flex;align-items:center;justify-content:space-between;}
.card-stat{font-size:12px;font-weight:600;color:var(--sub);}
.card-stat b{color:var(--text);}
.card-actions{display:flex;gap:6px;}
.icon-btn{
  width:30px;height:30px;border-radius:8px;border:none;
  background:var(--bg);cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;touch-action:manipulation;
  -webkit-user-select:none;user-select:none;
}
.icon-btn:active{background:var(--border);}

/* Empty state */
.empty{text-align:center;padding:60px 20px;}
.empty-emoji{font-size:52px;margin-bottom:16px;}
.empty-title{font-size:17px;font-weight:800;color:var(--text);margin-bottom:6px;}
.empty-sub{font-size:14px;font-weight:500;color:var(--sub);}

/* Archive section */
.archive-toggle{
  display:flex;align-items:center;gap:8px;padding:12px 0;
  cursor:pointer;font-size:13px;font-weight:700;color:var(--sub);
  background:none;border:none;width:100%;
}
.archive-card{
  background:var(--card);border-radius:16px;padding:14px 16px;
  margin-bottom:8px;border:1.5px solid var(--border);
  display:flex;align-items:center;gap:10px;opacity:.6;
}

/* Add form */
.form-sheet{padding:4px 0;}
.form-back{
  display:flex;align-items:center;gap:8px;background:none;border:none;
  cursor:pointer;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;
  color:var(--sub);padding:0 0 20px;
}
.form-title{font-size:22px;font-weight:800;color:var(--text);margin-bottom:24px;}
.field{margin-bottom:20px;}
.field-label{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;}
.field-input{
  width:100%;padding:14px 16px;border-radius:14px;
  border:1.5px solid var(--border);background:var(--card);
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:600;color:var(--text);
  outline:none;-webkit-appearance:none;
}
.field-input:focus{border-color:#A89080;}

/* Emoji picker */
.emoji-display{
  width:56px;height:56px;border-radius:16px;background:var(--bg);
  border:1.5px solid var(--border);display:flex;align-items:center;
  justify-content:center;font-size:28px;cursor:pointer;transition:background .15s;
}
.emoji-display:active{background:var(--border);}
.emoji-grid{
  display:flex;flex-wrap:wrap;gap:4px;padding:14px;
  background:var(--card);border-radius:16px;border:1.5px solid var(--border);
  margin-top:10px;max-height:160px;overflow-y:auto;
}
.emoji-opt{
  width:40px;height:40px;border-radius:10px;display:flex;
  align-items:center;justify-content:center;font-size:22px;cursor:pointer;
  transition:background .12s;
}
.emoji-opt:active{background:var(--border);}
.emoji-opt.sel{background:var(--border);}

/* Freq type */
.seg{display:flex;background:var(--bg);border-radius:14px;padding:4px;gap:4px;border:1.5px solid var(--border);}
.seg-btn{
  flex:1;padding:10px;border-radius:10px;border:none;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;color:var(--sub);background:transparent;transition:all .15s;
}
.seg-btn.active{background:var(--card);color:#3D1F0A;box-shadow:0 2px 8px rgba(0,0,0,.1);font-weight:800;}

/* Stepper */
.stepper{display:flex;align-items:center;gap:0;background:var(--bg);border-radius:14px;border:1.5px solid var(--border);overflow:hidden;width:fit-content;}
.step-btn{
  width:44px;height:44px;border:none;background:transparent;
  font-size:20px;font-weight:700;cursor:pointer;color:var(--text);
  font-family:'Nunito',sans-serif;transition:background .12s;
}
.step-btn:active{background:var(--border);}
.step-val{
  min-width:48px;text-align:center;font-size:17px;font-weight:800;
  color:var(--text);padding:0 4px;border-left:1.5px solid var(--border);border-right:1.5px solid var(--border);
  height:44px;display:flex;align-items:center;justify-content:center;
}
.step-hint{font-size:13px;font-weight:600;color:var(--sub);margin-left:12px;}

/* Tags */
.tag-row{display:flex;flex-wrap:wrap;gap:6px;}
.form-tag{
  padding:7px 14px;border-radius:100px;border:1.5px solid var(--border);
  font-size:13px;font-weight:700;cursor:pointer;color:var(--sub);background:var(--card);
  transition:all .15s;
}
.form-tag.active{background:#A86050;color:white;border-color:#3D1F0A;}

/* Color picker */
.color-row{display:flex;gap:8px;flex-wrap:wrap;}
.color-swatch{width:34px;height:34px;border-radius:10px;cursor:pointer;transition:transform .12s;border:2.5px solid transparent;}
.color-swatch.sel{border-color:var(--text);transform:scale(1.1);}

/* Save button */
.save-btn{
  width:100%;padding:16px;border-radius:16px;border:none;
  background:var(--text);color:white;font-family:'Nunito',sans-serif;
  font-size:16px;font-weight:800;cursor:pointer;margin-top:8px;
  transition:opacity .15s;
}
.save-btn:active{opacity:.85;}

/* Hint box */
.hint-box{
  background:var(--bg);border-radius:12px;padding:10px 14px;
  font-size:13px;font-weight:600;color:var(--sub);margin-top:8px;
  border:1.5px solid var(--border);
}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.4);
  display:flex;align-items:flex-end;justify-content:center;z-index:500;
  padding:0;
}
.modal-sheet{
  background:var(--card);padding:24px 24px 0;
  width:100%;max-width:480px;
  max-height:90vh;display:flex;flex-direction:column;
  border-radius:24px 24px 0 0;
}
.modal-scroll{overflow-y:auto;flex:1;padding-bottom:12px;}
.modal-footer{padding:12px 0 calc(env(safe-area-inset-bottom,0px) + 24px);border-top:1px solid var(--border);background:var(--card);}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 20px;}
.modal-title{font-size:18px;font-weight:800;color:var(--text);margin-bottom:8px;}
.modal-sub{font-size:14px;font-weight:500;color:var(--sub);margin-bottom:24px;line-height:1.5;}
.modal-btns{display:flex;flex-direction:column;gap:10px;}
.modal-btn-danger{width:100%;padding:15px;border-radius:14px;border:none;background:#FAD8D4;color:#A02020;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;}
.modal-btn-cancel{width:100%;padding:15px;border-radius:14px;border:none;background:var(--bg);color:var(--sub);font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;cursor:pointer;}

/* Sub tabs */
.sub-tabs{display:flex;background:var(--bg);border-radius:16px;padding:4px;gap:4px;border:1.5px solid var(--border);margin-bottom:20px;}
.sub-tab{flex:1;padding:9px;border-radius:12px;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;color:var(--sub);background:transparent;transition:all .15s;}
.sub-tab.active{background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.1);}

/* ── ANTRENMAN ── */
.kas-badge{display:inline-block;padding:3px 8px;border-radius:100px;font-size:10px;font-weight:700;background:var(--bg);color:var(--sub);border:1.5px solid var(--border);}
.egzersiz-card{background:var(--card);border-radius:16px;padding:14px 16px;margin-bottom:8px;border:1.5px solid var(--border);}
.set-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.set-input{width:60px;padding:8px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;text-align:center;color:var(--text);outline:none;}

/* Toast */
.toast{
  position:fixed;bottom:88px;left:50%;transform:translateX(-50%);
  background:var(--text);color:white;padding:11px 20px;border-radius:100px;
  font-size:13px;font-weight:700;white-space:nowrap;z-index:300;
  transition:opacity .3s,transform .3s;
  box-shadow:0 4px 20px rgba(0,0,0,.25);
}

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

window._fbSignIn = async () => {
  try {
    const result = await signInWithPopup(auth, provider);
    if(result && result.user) syncUser(result.user);
  } catch(e) {
    // popup bloklandıysa redirect dene
    if(e.code === 'auth/popup-blocked' || e.code === 'auth/popup-closed-by-user') {
      signInWithRedirect(auth, provider);
    } else {
      console.error('signin error:', e.code, e.message);
      if(window.showToast) showToast('Giriş hatası: ' + (e.code||e.message));
    }
  }
};
window._fbSignOut = () => signOut(auth).then(() => { window._fbUser = null; render(); });

window._fbSave = async (data) => {
  if(!window._fbUser) return;
  try { await setDoc(doc(db,"users",window._fbUser.uid),{state:JSON.stringify(data)}); } catch(e){ console.error(e); }
};

async function syncUser(user) {
  window._fbUser = user;
  if(user) {
    try {
      const snap = await getDoc(doc(db,"users",user.uid));
      if(snap.exists()) {
        const remote = JSON.parse(snap.data().state);
        Object.assign(state, remote);
        try{ localStorage.setItem(SK, JSON.stringify(state)); } catch{}
      }
    } catch(e){ console.error(e); }
  }
  render();
}

// Redirect sonucunu yakala
getRedirectResult(auth).then(result => {
  if(result && result.user) syncUser(result.user);
}).catch(e => console.error('redirect result error:', e));

// Auth state değişikliklerini dinle
onAuthStateChanged(auth, user => {
  if(user) syncUser(user);
  else { window._fbUser = null; render(); }
});
</script>

function todayStr(){return new Date().toISOString().split("T")[0];}
function getWN(ds){const d=new Date(ds),j=new Date(d.getFullYear(),0,1);return Math.ceil(((d-j)/86400000+j.getDay()+1)/7);}
function weekKey(ds){const d=new Date(ds||todayStr());return d.getFullYear()+"-W"+getWN(d.toISOString().split("T")[0]);}
function getLast7Days(){
  const today=new Date();
  const day=today.getDay(); // 0=Pazar
  const mondayOffset=day===0?-6:1-day; // pazartesiye mesafe
  const mon=new Date(today);
  mon.setDate(today.getDate()+mondayOffset);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d.toISOString().split("T")[0];});
}
function dow(ds){return new Date(ds+"T12:00:00").getDay();}
function showToast(m){
  let t=document.getElementById("toast-el");
  if(!t){t=document.createElement("div");t.id="toast-el";t.className="toast";document.body.appendChild(t);}
  t.textContent=m;t.style.opacity="1";t.style.transform="translateX(-50%) translateY(0)";
  if(tt)clearTimeout(tt);
  tt=setTimeout(()=>{t.style.opacity="0";t.style.transform="translateX(-50%) translateY(8px)";},2000);
}

function getCount(id,key){return(state.logs[id]||[]).filter(k=>k===key||k.startsWith(key+"#")).length;}
function isDone(id,key,n){return getCount(id,key)>=n;}
function toggleLog(id,key,n){
  if(!state.logs[id])state.logs[id]=[];
  const ex=state.logs[id].filter(k=>k===key||k.startsWith(key+"#"));
  if(ex.length>=n)state.logs[id]=state.logs[id].filter(k=>k!==key&&!k.startsWith(key+"#"));
  else{const c=ex.length;state.logs[id].push(c===0?key:key+"#"+c);}
  save();render();
}
function getWeekDays(id,wk){
  const days=new Set();
  (state.logs[id]||[]).forEach(k=>{const b=k.split("#")[0];if(weekKey(b)===wk)days.add(b);});
  return days.size;
}
function toggleWeekDay(id,ds){
  if(!state.logs[id])state.logs[id]=[];
  const has=state.logs[id].includes(ds);
  if(has)state.logs[id]=state.logs[id].filter(k=>k!==ds);
  else state.logs[id].push(ds);
  save();render();
}
function getStreak(h){
  const{id,freq:{type,tpd,dpw}}=h;let s=0;
  if(type==="daily"){let d=new Date();while(true){const k=d.toISOString().split("T")[0];if(!isDone(id,k,tpd))break;s++;d.setDate(d.getDate()-1);}}
  else{let w=0;while(true){const d=new Date();d.setDate(d.getDate()-w*7);const k=weekKey(d.toISOString().split("T")[0]);if(getWeekDays(id,k)<dpw)break;s++;w++;}}
  return s;
}

  }
});

function updateNav(){
  const rail=document.getElementById("main-rail");
  if(!rail)return;

  const ITEMS=[
    {v:"todo_kisa",    icon:SVG.todo,     sep:false},
    {v:"todo_orta",    icon:SVG.todo2,    sep:false},
    {v:"todo_uzun",    icon:SVG.todo3,    sep:false},
    {v:"todo_sureziz", icon:SVG.randevu,  sep:false},
    {v:"",             sep:true},
    {v:"notlar",       icon:SVG.notlar,   sep:false},
    {v:"",             sep:true},
    {v:"ayarlar",      icon:SVG.ayarlar,  sep:false},
  ];

  const headerEl=document.querySelector('.header');
  if(headerEl){
    const hh=headerEl.getBoundingClientRect().height;
    document.documentElement.style.setProperty('--header-h', hh+'px');
    rail.style.top=hh+'px';
  }

  if(!rail.dataset.init){
    rail.dataset.init="1";
    ITEMS.forEach(function(item){
      if(item.sep){
        const sep=document.createElement('div');
        sep.className='rail-sep';
        sep.style.pointerEvents='none';
        rail.appendChild(sep);
        return;
      }
      if(item.lbl!==undefined){
        if(item.lbl){
          const lbl=document.createElement('div');
          lbl.className='rail-lbl';
          lbl.textContent=item.lbl;
          rail.appendChild(lbl);
        }
        return;
      }
      const btn=document.createElement('button');
      btn.className='rail-item';
      btn.dataset.v=item.v;
      btn.innerHTML=item.icon||'';
      btn.addEventListener('click',function(e){
        e.stopPropagation();
        const v=this.dataset.v;
        if(v.startsWith('todo_')){
          todoVade=v.replace('todo_','');
          cv='todo';
        } else {
          cv=v;
        }
        render();
      });
      rail.appendChild(btn);
    });
  }

  // Active durumu güncelle
  rail.querySelectorAll('.rail-item').forEach(function(btn){
    const v=btn.dataset.v;
    let isActive=false;
    if(v==='todo_kisa') isActive=cv==='todo'&&todoVade==='kisa';
    else if(v==='todo_orta') isActive=cv==='todo'&&todoVade==='orta';
    else if(v==='todo_uzun') isActive=cv==='todo'&&todoVade==='uzun';
    else if(v==='todo_sureziz') isActive=cv==='todo'&&todoVade==='sureziz';
    else if(v==='notlar') isActive=cv==='notlar';
    else if(v==='ayarlar') isActive=cv==='ayarlar';
    btn.classList.toggle('active',isActive);

    // Todo badge'leri güncelle
    if(v==='todo_kisa'||v==='todo_orta'||v==='todo_uzun'){
      const vade=v.replace('todo_','');
      const sayi=(state.todos||[]).filter(t=>(t.vade||t.oncelik||'orta')===vade&&!t.tamamlandi).length;
      const RENK={kisa:'#C84848',orta:'#C87828',uzun:'#4A70B0'};
      let badge=btn.querySelector('.rail-badge');
      if(sayi>0){
        if(!badge){
          badge=document.createElement('span');
          badge.className='rail-badge';
          badge.style.cssText='position:absolute;top:2px;right:2px;min-width:14px;height:14px;border-radius:7px;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 3px;pointer-events:none;font-family:Nunito,sans-serif;color:white;';
          btn.style.position='relative';
          btn.appendChild(badge);
        }
        badge.style.background=RENK[vade];
        badge.textContent=sayi>9?'9+':sayi;
      } else if(badge){
        badge.remove();
      }
    }
  });
}

function buildHeader(){

  const gr=hr<12?"Günaydın":hr<18?"İyi günler":"İyi akşamlar";
  const grEmoji=hr<12?"☀️":hr<18?"🌤️":"🌙";
  const _ad=(state.kullaniciAdi||"").trim();
  const grFull=(_ad?gr+", "+_ad:gr)+" "+grEmoji;
  return `<div class="header">
    <div class="header-top">
      <div>
        <div class="header-greeting">${grFull}</div>
        <div class="header-title">${(function(){
        const todoAlt={kisa:'Kısa Vade',orta:'Orta Vade',uzun:'Uzun Vade',sureziz:'Süresiz'};
        if(cv==='ayarlar') return 'Ayarlar';
        if(cv==='notlar') return 'Notlar';

        return 'Yapılacak <span style="opacity:.5;font-weight:600;font-size:16px">/ '+alt+'</span>';

    </div>
  </div>`;
}

// Actions
function setView(v){cv=v;render();}
function _indir(icerik, dosyaAdi, tip){
  const blob=new Blob([icerik],{type:tip});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=dosyaAdi;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},100);
}
function indir(){
  _indir('<!DOCTYPE html>\n'+document.documentElement.outerHTML,'hobi_takip_uygulama.html','text/html;charset=utf-8');
}
function indirVeri(){
  _indir(JSON.stringify(state,null,2),'hobi_takip_veri_'+(new Date().toISOString().slice(0,10))+'.json','application/json;charset=utf-8');
}
function veriyukle(){
  const input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{try{Object.assign(state,JSON.parse(ev.target.result));save();render();showToast('Veri yüklendi ✓');}catch{showToast('Geçersiz dosya');}};
    r.readAsText(f);
  };input.click();
}
function buildNotlar(){
  if(!state.notlar)state.notlar=[];
  const notlar=state.notlar;
  let html='';

  // Not formu
  if(notForm!==null){
    const f=notForm;
    html+=`<div class="modal-overlay" onclick="if(event.target===this){notForm=null;render();}">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">${f.id?'Notu Düzenle':'Yeni Not'}</div>
        <div class="modal-scroll">
          <input id="not-baslik" class="field-input" placeholder="Başlık..." value="${esc(f.baslik||'')}"
            style="font-size:15px;font-weight:700;margin-bottom:12px" oninput="notForm.baslik=this.value"/>
          <textarea id="not-icerik" style="width:100%;min-height:160px;border:1.5px solid var(--border);border-radius:14px;padding:12px 14px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;background:var(--card);color:var(--text);resize:none;box-sizing:border-box;outline:none" placeholder="Not içeriği..."
            oninput="notForm.icerik=this.value">${esc(f.icerik||'')}</textarea>
        </div>
        <div class="modal-footer">
          <div class="modal-btns">
            <button class="save-btn" onclick="notKaydet()" style="margin-top:0">Kaydet</button>
            <button class="modal-btn-cancel" onclick="notForm=null;render()">Vazgeç</button>
          </div>
        </div>
      </div>
    </div>`;
  }

  if(notlar.length===0&&notForm===null){
    html+=`<div class="empty">
      <div class="empty-emoji">📝</div>
      <div class="empty-title">Henüz not yok</div>
      <div class="empty-sub">+ butonuna basarak not ekle</div>
    </div>`;
    return html;
  }

  // Açık not detayı
  if(acikNotId){
    const not=notlar.find(n=>n.id===acikNotId);
    if(not){
      html+=`<div style="background:var(--card);border-radius:20px;border:1.5px solid var(--border);padding:18px;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
          <button onclick="acikNotId=null;render()" style="width:30px;height:30px;border:none;background:var(--bg);border-radius:8px;cursor:pointer;font-size:18px;color:var(--sub)">←</button>
          <div style="flex:1;font-size:16px;font-weight:800;color:var(--text)">${esc(not.baslik||'Başlıksız')}</div>
          <button onclick="notDuzenle('${not.id}')" style="width:30px;height:30px;border:none;background:var(--bg);border-radius:8px;cursor:pointer;font-size:14px">✏️</button>
          <button onclick="notSil('${not.id}')" style="width:30px;height:30px;border:none;background:#FAE8E8;border-radius:8px;cursor:pointer;font-size:14px">🗑️</button>
        </div>
        <div style="font-size:14px;font-weight:600;color:var(--text);line-height:1.7;white-space:pre-wrap">${esc(not.icerik||'')}</div>
        <div style="font-size:11px;font-weight:600;color:var(--sub);margin-top:14px">${new Date(not.tarih||Date.now()).toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'})}</div>
      </div>`;
      html+=`<div style="height:20px"></div>`;
      return html;
    }
  }

  // Not listesi
  [...notlar].reverse().forEach(not=>{
    const ozet=(not.icerik||'').slice(0,80).replace(/\n/g,' ');
    const tarih=new Date(not.tarih||Date.now()).toLocaleDateString('tr-TR',{day:'numeric',month:'short'});
    html+=`<div onclick="acikNotId='${not.id}';render()" style="background:var(--card);border-radius:16px;border:1.5px solid var(--border);padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:opacity .15s" onmousedown="this.style.opacity='.7'" onmouseup="this.style.opacity='1'">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px">
        <div style="font-size:14px;font-weight:800;color:var(--text);flex:1">${esc(not.baslik||'Başlıksız')}</div>
        <div style="font-size:11px;font-weight:600;color:var(--sub);flex-shrink:0;margin-top:2px">${tarih}</div>
      </div>
      ${ozet?`<div style="font-size:13px;font-weight:600;color:var(--sub);line-height:1.5">${esc(ozet)}${(not.icerik||'').length>80?'…':''}</div>`:''}
    </div>`;
  });

  html+=`<div style="height:20px"></div>`;
  return html;
}

function notYeniAc(){
  notForm={id:null,baslik:'',icerik:''};
  render();
  setTimeout(()=>{const el=document.getElementById('not-baslik');if(el)el.focus();},80);
}
function notDuzenle(id){
  const not=(state.notlar||[]).find(n=>n.id===id);
  if(!not)return;
  notForm={...not};
  render();
  setTimeout(()=>{const el=document.getElementById('not-baslik');if(el)el.focus();},80);
}
function notKaydet(){
  const bEl=document.getElementById('not-baslik');
  const iEl=document.getElementById('not-icerik');
  const baslik=(bEl?bEl.value:notForm.baslik||'').trim();
  const icerik=(iEl?iEl.value:notForm.icerik||'').trim();
  if(!baslik&&!icerik){showToast('Bir şeyler yaz 📝');return;}
  if(!state.notlar)state.notlar=[];
  if(notForm.id){
    state.notlar=state.notlar.map(n=>n.id===notForm.id?{...n,baslik,icerik,guncelleme:Date.now()}:n);
    showToast('Not güncellendi ✓');
  } else {
    state.notlar.push({id:Date.now().toString(),baslik,icerik,tarih:Date.now()});
    showToast('Not eklendi 📝');
  }
  notForm=null;save();render();
}
function notSil(id){
  state.notlar=(state.notlar||[]).filter(n=>n.id!==id);
  acikNotId=null;save();render();showToast('Silindi');
}

function toggleArch(){archOpen=!archOpen;render();}
function saveHobby(){
  const ni=document.getElementById("hni");
  const name=(ni?ni.value:fs.name).trim();
  if(!name){showToast("Bir isim gir 📝");return;}
  if(!fs.group)fs.group="Diğer";
  fs.name=name;
  if(eid){state.hobbies=state.hobbies.map(h=>h.id===eid?{...h,...fs,adimlar:fs.adimlar||[],adimNotlar:fs.adimNotlar||{}}:h);showToast("Güncellendi ✓");eid=null;}
  else{state.hobbies.push({id:Date.now().toString(),...fs,adimlar:fs.adimlar||[],adimNotlar:fs.adimNotlar||{},archived:false,createdAt:todayStr()});showToast("Hobi eklendi 🌸");}
  save();adimModalId=null;eid=null;render();
}
function adimEkle(){
  const inp=document.getElementById('yeni-adim');
  const v=inp?inp.value.trim():'';
  if(!v)return;
  if(!fs.adimlar)fs.adimlar=[];
  if(fs.adimlar.length>=10)return;
  fs.adimlar.push(v);inp.value='';render();
}
function adimSil(i){if(!fs.adimlar)return;fs.adimlar.splice(i,1);render();}

  const inp=document.getElementById('adim-edit-'+i);

function adimNotKaydet(){
  const el=document.getElementById('adim-not-inp');

  if(!fs.adimNotlar)fs.adimNotlar={};

function buildAdimModal(){
  if(!adimModalId)return '';
  const h=state.hobbies.find(x=>x.id===adimModalId);
  if(!h)return '';
  const adimlar=h.adimlar||[];
  const bugun=todayStr();
  if(!state.adimDurumlar)state.adimDurumlar={};
  const tumGruplar=[...new Set([...state.groups,"Kişisel","Sağlık","Hobi","Diğer","Vitamin"])];
  const grpIdx=tumGruplar.indexOf(h.group);
  const renk=grpIdx>=0?GROUP_COLORS[grpIdx%GROUP_COLORS.length]:'#F0EDE8';
  const freq=fs.freq;

  return `<div onclick="adimModalKapat()" style="position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px">

        <button onclick="adimModalKapat()" style="width:30px;height:30px;border:none;background:var(--bg);border-radius:8px;cursor:pointer;font-size:18px;color:var(--sub)">×</button>
      </div>

      <!-- Adımlar -->
      <div style="padding:14px 16px 0">
        <div style="font-size:11px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">Bugünün Adımları</div>
        ${adimlar.length===0

function toggleEmoji(){eo=!eo;render();}
function pickEmoji(e){fs.emoji=e;eo=false;render();}
function setFT(t){fs.freq.type=t;render();}
function adj(f,d){
  if(f==="tpd")fs.freq.tpd=Math.max(1,Math.min(10,fs.freq.tpd+d));
  if(f==="dpw")fs.freq.dpw=Math.max(1,Math.min(7,fs.freq.dpw+d));
  render();
}
function setFG(g){fs.group=g;render();}
function confirmArchive(id){caid=id;render();}
function doArchive(){state.hobbies=state.hobbies.map(h=>h.id===caid?{...h,archived:true}:h);save();caid=null;showToast("Bırakıldı");render();}
function unarchive(id){state.hobbies=state.hobbies.map(h=>h.id===id?{...h,archived:false}:h);save();showToast("Geri alındı ✓");render();}
function deleteHobby(id){state.hobbies=state.hobbies.filter(h=>h.id!==id);delete state.logs[id];save();showToast("Silindi");render();}
function addGroup(){
  const i=document.getElementById("ngi");const v=i?i.value.trim():"";
  if(!v)return;state.groups.push(v);save();showToast("Grup eklendi ✓");render();
}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}

            </div>
            <div class="field-label" style="margin-bottom:6px">Not <span style="font-weight:500;opacity:.6">(opsiyonel)</span></div>
            <input class="field-input" placeholder="Kısa bir not..." value="${esc(f.not||'')}" style="font-size:13px;margin-bottom:16px" oninput="todoForm.not=this.value"/>
          </div>
          <div class="modal-footer">
            <div class="modal-btns">
              <button class="save-btn" onclick="surezKaydet()" style="margin-top:0;background:#2A9E78">Kaydet</button>
              <button class="modal-btn-cancel" onclick="todoForm=null;render()">Vazgeç</button>
            </div>
          </div>
        </div>
      </div>`;
    }
    html+=`<div style="height:20px"></div>`;
    return html;
  }

  let goruntule=state.todos.filter(t=>{
    const v=t.vade||t.oncelik||'orta';
    if(v!==todoVade)return false;
    return true;
  });

  // Sırala: deadline önce, sonra ekleme sırası
  goruntule=[...goruntule].sort((a,b)=>{
    if(a.tamamlandi!==b.tamamlandi)return a.tamamlandi?1:-1;
    if(a.deadline&&b.deadline)return a.deadline.localeCompare(b.deadline);
    if(a.deadline)return -1;if(b.deadline)return 1;
    return 0;
  });

  // Her vade için sayılar (aktif)
  const sayilar={};
  ['kisa','orta','uzun'].forEach(v=>{
    sayilar[v]=state.todos.filter(t=>(t.vade||t.oncelik||'orta')===v&&!t.tamamlandi).length;
  });

  // Özet şerit
  const _RENK={kisa:'#C84848',orta:'#C87828',uzun:'#4A70B0'};
  const _BG={kisa:'#FAE8E8',orta:'#FAF0DC',uzun:'#E4EEF8'};
  const _LBL={kisa:'Kısa',orta:'Orta',uzun:'Uzun'};
  html+=`<div style="display:flex;gap:6px;margin-bottom:16px">
    ${['kisa','orta','uzun'].map(v=>`
      <button onclick="todoVade='${v}';render()" style="flex:1;padding:8px 6px;border-radius:12px;border:1.5px solid ${todoVade===v?_RENK[v]:'var(--border)'};background:${todoVade===v?_BG[v]:'var(--card)'};cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .15s">
        <span style="font-size:16px;font-weight:800;color:${_RENK[v]}">${sayilar[v]}</span>
        <span style="font-size:10px;font-weight:700;color:${todoVade===v?_RENK[v]:'var(--sub)'}">${_LBL[v]}</span>
      </button>
    `).join('')}
  </div>`;

  if(goruntule.length===0){
    html+=`<div class="empty">
      <div class="empty-emoji">✅</div>
      <div class="empty-title">'Bu vadede görev yok'</div>
      <div class="empty-sub">+ butonuna basarak görev ekle</div>
    </div>`;
  } else {
    goruntule.forEach(t=>{
      const gecikme=t.deadline&&t.deadline<today&&!t.tamamlandi;
      const bugunmu=t.deadline===today&&!t.tamamlandi;
      const deadlineLbl=t.deadline?(() => {
        const d=new Date(t.deadline+'T12:00:00');
        const diff=Math.round((d-new Date(today+'T12:00:00'))/(1000*60*60*24));
        if(diff<0)return`<span style="color:#C84848;font-weight:700">${Math.abs(diff)}g geçti</span>`;
        if(diff===0)return`<span style="color:#C84848;font-weight:700">Bugün</span>`;
        if(diff===1)return`<span style="color:#C87828;font-weight:700">Yarın</span>`;
        return`<span style="color:var(--sub)">${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}</span>`;
      })():'';

      const isListe=t.tip==='liste';
      const altMaddeler=t.altMaddeler||[];
      const tamamlananAlt=altMaddeler.filter(a=>a.tamamlandi).length;
      const acik=t.acik||false;

      html+=`<div style="background:var(--card);border-radius:16px;border:1.5px solid ${gecikme?'#F0C8C8':bugunmu?'#F0D8A0':'var(--border)'};margin-bottom:8px;overflow:hidden;opacity:1">
        <div style="padding:12px 14px;display:flex;gap:10px;align-items:center">
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:700;color:var(--text);text-decoration:none;line-height:1.3">
              ${esc(t.baslik)}
              ${isListe?`<span style="font-size:11px;font-weight:600;color:var(--sub);margin-left:6px">${tamamlananAlt}/${altMaddeler.length}</span>`:''}
            </div>
            ${t.deadline?`<div style="font-size:11px;font-weight:600;margin-top:2px">📅 ${deadlineLbl}</div>`:''}
          </div>
          ${isListe?`<button onclick="todoAcKapat('${t.id}')" style="width:26px;height:26px;border-radius:7px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;color:var(--sub);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .2s;transform:rotate(${acik?180:0}deg)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button>`:''}
          <div style="display:flex;gap:4px;flex-shrink:0">
            <button onclick="todoDuzenle('${t.id}')" style="width:26px;height:26px;border-radius:7px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button onclick="todoSil('${t.id}')" style="width:26px;height:26px;border-radius:7px;border:1.5px solid #F0C8C8;background:#FAE8E8;cursor:pointer;display:flex;align-items:center;justify-content:center">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#C84848" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
            </button>
          </div>
        </div>
        ${isListe&&acik?`<div style="border-top:1px solid var(--border);padding:8px 14px 12px">
          ${altMaddeler.length===0?'<div style="font-size:12px;color:var(--sub);text-align:center;padding:8px 0">Henüz madde yok — düzenle ile ekle</div>':
            altMaddeler.map((a,i)=>`<div style="display:flex;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">
              <span style="flex:1;font-size:13px;font-weight:600;color:${a.tamamlandi?'var(--sub)':'var(--text)'};text-decoration:${a.tamamlandi?'line-through':'none'}">${esc(a.baslik)}</span>
            </div>`).join('')
          }
        </div>`:''}
      </div>`;
    });
  }

  // Form modal
  if(todoForm!==null){
    const f=todoForm;
    const fTip=f.tip||'tek';
    const altMaddeler=f.altMaddeler||[];
    html+=`<div class="modal-overlay" onclick="if(event.target===this){todoForm=null;render();}">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">${f.id?'Görevi Düzenle':'Yeni Görev'}</div>
        <div class="modal-scroll">
          <div class="field-label" style="margin-bottom:8px">Tür</div>
          <div style="display:flex;gap:6px;margin-bottom:16px">
            <button onclick="todoForm.tip='tek';render()" style="flex:1;padding:10px 4px;border-radius:10px;border:1.5px solid ${fTip==='tek'?'#6B3F28':'var(--border)'};background:${fTip==='tek'?'#FAF0DC':'var(--bg)'};color:${fTip==='tek'?'#6B3F28':'var(--sub)'};font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer">✓ Tek İş</button>
            <button onclick="todoForm.tip='liste';if(!todoForm.altMaddeler)todoForm.altMaddeler=[];render()" style="flex:1;padding:10px 4px;border-radius:10px;border:1.5px solid ${fTip==='liste'?'#6B3F28':'var(--border)'};background:${fTip==='liste'?'#FAF0DC':'var(--bg)'};color:${fTip==='liste'?'#6B3F28':'var(--sub)'};font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer">☰ Liste</button>
          </div>

          <div class="field-label" style="margin-bottom:6px">${fTip==='liste'?'Liste Başlığı':'Görev'}</div>
          <input id="todo-baslik" class="field-input" placeholder="${fTip==='liste'?'örn. Çeyiz Listesi...':'örn. Faturayı öde...'}" value="${esc(f.baslik||'')}"
            style="font-size:15px;font-weight:700;margin-bottom:16px"
            oninput="todoForm.baslik=this.value"/>

          ${fTip==='liste'?`
          <div class="field-label" style="margin-bottom:8px">Alt Maddeler</div>
          <div style="margin-bottom:8px">
            ${altMaddeler.map((a,i)=>`<div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">
              <input class="field-input" value="${esc(a.baslik||'')}" placeholder="Madde..." style="flex:1;font-size:13px;font-weight:600" oninput="todoForm.altMaddeler[${i}].baslik=this.value"/>
              <button onclick="todoForm.altMaddeler.splice(${i},1);render()" style="width:30px;height:30px;border-radius:8px;border:1.5px solid #F0C8C8;background:#FAE8E8;cursor:pointer;font-size:14px;color:#C84848">✕</button>
            </div>`).join('')}
            <button onclick="if(!todoForm.altMaddeler)todoForm.altMaddeler=[];todoForm.altMaddeler.push({baslik:'',tamamlandi:false});render()" style="width:100%;padding:8px;border-radius:10px;border:1.5px dashed var(--border);background:transparent;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--sub);cursor:pointer">+ Madde Ekle</button>
          </div>`:''}

          <div class="field-label" style="margin-bottom:8px">Vade</div>
          <div style="display:flex;gap:6px;margin-bottom:16px">
            ${[['kisa','Kısa','#C84848','#FAE8E8'],['orta','Orta','#C87828','#FAF0DC'],['uzun','Uzun','#4A70B0','#E4EEF8']].map(([v,lb,clr,bg])=>`
              <button onclick="todoForm.vade='${v}';render()" style="flex:1;padding:10px 4px;border-radius:10px;border:1.5px solid ${(f.vade||'orta')===v?clr:'var(--border)'};background:${(f.vade||'orta')===v?bg:'var(--bg)'};color:${(f.vade||'orta')===v?clr:'var(--sub)'};font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer">${lb}</button>
            `).join('')}
          </div>

          <div class="field-label" style="margin-bottom:6px">Son Tarih <span style="font-weight:600;opacity:0.6">(opsiyonel)</span></div>
          <input type="date" class="field-input" value="${f.deadline||''}" style="font-size:14px;font-weight:600;margin-bottom:16px"
            onchange="todoForm.deadline=this.value||null"/>
        </div>
        <div class="modal-footer">
          <div class="modal-btns">
            <button class="save-btn" onclick="todoKaydet()" style="margin-top:0">Kaydet</button>
            <button class="modal-btn-cancel" onclick="todoForm=null;render()">Vazgeç</button>
          </div>
        </div>
      </div>
    </div>`;
  }

  html+=`<div style="height:20px"></div>`;
  return html;
}

function todoDuzenle(id){
  const t=(state.todos||[]).find(x=>x.id===id);if(!t)return;
  todoForm={...t};render();
}

function surezDuzenle(id){
  const t=(state.surezler||[]).find(x=>x.id===id);
  if(!t)return;
  todoForm={...t,_sureziz:true};
  render();
  setTimeout(()=>{const el=document.getElementById('todo-baslik');if(el)el.focus();},80);
}

function todoSil(id){
  state.todos=(state.todos||[]).filter(t=>t.id!==id);
  save();render();showToast('Silindi');
}

function todoAcKapat(id){
  const t=state.todos.find(x=>x.id===id);
  if(!t)return;
  t.acik=!t.acik;
  save();render();
}

function todoYeniAc(){
  if(todoVade==='sureziz'){
    todoForm={id:null,baslik:'',not:'',_sureziz:true};
    render();
    setTimeout(()=>{const el=document.getElementById('todo-baslik');if(el)el.focus();},80);
    return;
  }
  todoForm={id:null,baslik:'',vade:todoVade||'orta',deadline:null,tip:'tek',altMaddeler:[],acik:false};
  render();
  setTimeout(()=>{const el=document.getElementById('todo-baslik');if(el){el.focus();}},80);
}

function istekSil(id){
  state.istekler=(state.istekler||[]).filter(x=>x.id!==id);
  save();render();showToast('Silindi');
}

function surezSil(id){
  state.surezler=(state.surezler||[]).filter(x=>x.id!==id);
  save();render();showToast('Silindi');
}

function takipKartOdeme(o,today,cfg,periyot){
  periyot=periyot||o.periyot||'aylik';
  const odendi=o.odendi||false;
  const acik=odemeAcikId===o.id;

  // ── İstatistik hesapla ──
  const gecmis=o.gecmis||[];
  const toplamOdeme=gecmis.length;
  const tutar=o.tutar||0;
  const toplamTutar=gecmis.reduce((s,g)=>s+(g.tutar||tutar||0),0);
  const AYLAR_LONG=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  const gecmisSirali=[...gecmis].reverse().slice(0,12);
  const simdi2=new Date(today+'T12:00:00');
  const AYLAR_K=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
  // Tüm geçmiş kayıtlarından benzersiz ay listesi oluştur (kronolojik)
  const tumAylar=[...new Set(gecmis.map(g=>g.ay||(g.tarih?g.tarih.slice(0,7):null)).filter(Boolean))].sort();
  const grafAylar=tumAylar.map(key=>{
    const kayit=gecmis.filter(g=>g.ay===key||(g.tarih&&g.tarih.slice(0,7)===key));
    const ayTutar=kayit.length>0?(kayit.reduce((s,g)=>s+(g.tutar||tutar||0),0)/kayit.length):null;
    const ayNo=parseInt(key.slice(5,7))-1;
    const yil=key.slice(2,4);
    return {key,lbl:AYLAR_K[ayNo]+"'"+yil,tutar:ayTutar};
  });
  const grafTutarlar=grafAylar.map(a=>a.tutar);
  const grafMax=Math.max(...grafTutarlar.filter(t=>t!==null),1);
  const grafMin=Math.min(...grafTutarlar.filter(t=>t!==null),0);
  const grafRange=grafMax-grafMin||1;

  // Rutin ödeme zamanı gösterimi
  let zamanStr='';
  let badgeStr='';
  const todayD=new Date(today+'T12:00:00');
  const todayGun=todayD.getDate();
  const todayAy=todayD.getMonth()+1;
  const AYLAR=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];

  const effGun = o.gun || (periyot!=='aylik' && o.tarih ? new Date(o.tarih+'T12:00:00').getDate() : null);
  if(periyot==='aylik'){
    zamanStr=effGun?`Her ayın ${effGun}. günü`:'Her ay';
    if(effGun){
      const diff=effGun-todayGun;
      if(diff===0)badgeStr=`<span style="background:#FAE8E8;color:#C84848;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700">Bugün</span>`;
      else if(diff===1)badgeStr=`<span style="background:#FAF0DC;color:#C87828;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700">Yarın</span>`;
      else if(diff>0&&diff<=7)badgeStr=`<span style="background:${cfg.bg};color:${cfg.renk};padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700">${diff}g sonra</span>`;
      else if(diff<0)badgeStr=`<span style="background:#FAE8E8;color:#C84848;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700">${Math.abs(diff)}g geçti</span>`;
    }
  } else if(periyot==='yillik'){
    const tarihler=o.tarihler&&o.tarihler.length?o.tarihler:(effGun&&o.ay?[{ay:o.ay,gun:effGun}]:[]);
    if(tarihler.length){
      zamanStr=tarihler.map(t=>`${t.gun||'?'} ${AYLAR[(t.ay||1)-1]}`).join(' · ');
      // Find nearest upcoming
      const nearest=tarihler.map(t=>{const diff=(t.ay-todayAy)*30+((t.gun||0)-todayGun);return diff;}).sort((a,b)=>a-b);
      const d=nearest[0];
      if(d===0)badgeStr=`<span style="background:#FAE8E8;color:#C84848;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700">Bugün</span>`;
      else if(d>0&&d<=14)badgeStr=`<span style="background:${cfg.bg};color:${cfg.renk};padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700">${d}g sonra</span>`;
      else if(d<0&&d>-14)badgeStr=`<span style="background:#FAE8E8;color:#C84848;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700">${Math.abs(d)}g geçti</span>`;
    }
  }
  const tarihStr=zamanStr;
  const gecikme=badgeStr.includes('geçti')&&!odendi;
  const bugunmu=badgeStr.includes('Bugün')&&!odendi;

  // ── İstatistik paneli HTML ──
  const istatPanel=acik?`
  <div style="border-top:1.5px solid var(--border);margin-top:12px;padding-top:14px">
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <div style="flex:1;background:${cfg.bg};border-radius:12px;padding:10px 12px;text-align:center">
        <div style="font-size:22px;font-weight:800;color:${cfg.renk}">${toplamOdeme}</div>
        <div style="font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.4px;margin-top:2px">Ödeme Ayı</div>
      </div>
      <div style="flex:1;background:${cfg.bg};border-radius:12px;padding:10px 12px;text-align:center">
        <div style="font-size:22px;font-weight:800;color:${cfg.renk}">${toplamTutar.toLocaleString('tr-TR')}₺</div>
        <div style="font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.4px;margin-top:2px">Toplam Ödendi</div>
      </div>
      ${tutar?`<div style="flex:1;background:var(--bg);border-radius:12px;padding:10px 12px;text-align:center;border:1.5px solid var(--border)">
        <div style="font-size:22px;font-weight:800;color:var(--text)">${tutar.toLocaleString('tr-TR')}₺</div>
        <div style="font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.4px;margin-top:2px">Aylık Tutar</div>
      </div>`:''}
    </div>
    <div style="margin-bottom:14px">
      <div style="font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Fiyat Değişimi — Son 6 Ay</div>
      ${(()=>{
        const W=300,H=80,padL=4,padR=4,padT=8,padB=20;
        const iW=W-padL-padR, iH=H-padT-padB;
        const noktalar=grafAylar.map((a,i)=>{
          const x=padL+(i/(grafAylar.length-1||1))*iW;
          const y=a.tutar!==null?padT+iH-(((a.tutar-grafMin)/grafRange)*iH):null;
          return {x,y,lbl:a.lbl,tutar:a.tutar};
        });
        const gercek=noktalar.filter(n=>n.y!==null);
        if(gercek.length<2) return '<div style="text-align:center;font-size:12px;color:var(--sub);padding:16px 0">Grafik için en az 2 kayıt gerekli</div>';
        // Çizgi path
        const path=gercek.map((n,i)=>(i===0?`M${n.x},${n.y}`:`L${n.x},${n.y}`)).join(' ');
        // Alan dolgu
        const alanPath=`${path} L${gercek[gercek.length-1].x},${padT+iH} L${gercek[0].x},${padT+iH} Z`;
        // Noktalar ve etiketler
        const circles=noktalar.map(n=>n.y!==null?`
          <circle cx="${n.x}" cy="${n.y}" r="3.5" fill="${cfg.renk}" stroke="white" stroke-width="1.5"/>
          <text x="${n.x}" y="${n.y-7}" text-anchor="middle" font-size="8" font-weight="700" fill="${cfg.renk}">${n.tutar!==null?n.tutar+'₺':''}</text>
        `:'').join('');
        const labels=noktalar.map(n=>`<text x="${n.x}" y="${H-3}" text-anchor="middle" font-size="9" font-weight="700" fill="var(--sub)">${n.lbl}</text>`).join('');
        return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;overflow:visible">
          <defs>
            <linearGradient id="grafGrad-${o.id}" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="${cfg.renk}" stop-opacity="0.25"/>
              <stop offset="100%" stop-color="${cfg.renk}" stop-opacity="0.02"/>
            </linearGradient>
          </defs>
          <path d="${alanPath}" fill="url(#grafGrad-${o.id})"/>
          <path d="${path}" fill="none" stroke="${cfg.renk}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          ${circles}
          ${labels}
        </svg>`;
      })()}
    </div>

    ${gecmisSirali.length>0?`
    <div>
      <div style="font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Ödeme Geçmişi</div>
      ${gecmisSirali.map(g=>{
        const tarihG=g.tarih||'';
        const ayG=g.ay||(tarihG?tarihG.slice(0,7):'');
        const ayNoG=ayG?parseInt(ayG.slice(5,7))-1:-1;
        const yilG=ayG?ayG.slice(0,4):'';
        const ayLblG=ayNoG>=0?AYLAR_LONG[ayNoG]+' '+yilG:tarihG;
        const gunLblG=tarihG?tarihG.slice(8,10)+' '+ayLblG:ayLblG;
        const gi=gecmis.indexOf(g);
        return `<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)">
          <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0">
            <span style="font-size:12px;font-weight:600;color:var(--text)">${gunLblG}</span>
            <button data-id="${o.id}" data-gi="${gi}" data-tarih="${g.tarih||''}" data-tutar="${g.tutar||0}" onclick="odemeGecmisDuzenle(this.dataset.id,parseInt(this.dataset.gi),this.dataset.tarih,parseFloat(this.dataset.tutar)||0)" style="width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:12px;font-weight:800;color:${cfg.renk}">${(g.tutar||tutar)?(g.tutar||tutar).toLocaleString('tr-TR')+'₺':'✓'}</span>
            <button onclick="odemeGecmisSil('${o.id}',${gi})" style="width:32px;height:32px;border-radius:8px;border:1.5px solid #F0C8C8;background:#FAE8E8;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#C84848" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
            </button>
          </div>
        </div>`;
      }).join('')}
    </div>`:`<div style="text-align:center;padding:8px 0;font-size:12px;color:var(--sub)">Henüz ödeme geçmişi yok</div>`}
  </div>`:'';

  return `<div style="background:var(--card);border-radius:16px;border:1.5px solid ${gecikme?'#F0C8C8':bugunmu?'#F0D8A0':odendi?'#C8E6D4':acik?cfg.renk+'50':'var(--border)'};padding:16px;margin-bottom:8px;opacity:${odendi?0.75:1};box-sizing:border-box">
    <div style="display:flex;align-items:center;gap:10px">
      <button onclick="takipToggleOdeme('${o.id}')" style="width:36px;height:36px;border-radius:10px;border:none;background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1">
        ${odendi?'✅':'💸'}
      </button>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-decoration:${odendi?'line-through':'none'};margin-bottom:3px">${esc(o.baslik)}</div>
        <div style="height:18px;display:flex;align-items:center;gap:5px;margin-bottom:3px">
          ${tarihStr?`<span style="font-size:11px;font-weight:600;color:var(--sub)">📅 ${tarihStr}</span>`:'<span style="font-size:11px;color:transparent">—</span>'}
          ${badgeStr}
        </div>
        <div style="height:18px;display:flex;align-items:center;gap:5px">
          ${(()=>{
            if(o.tutar) return `<span style="font-size:12px;font-weight:800;color:${odendi?'var(--sub)':cfg.renk}">${o.tutar}₺</span>`;
            const gc=(o.gecmis||[]).filter(g=>g.tutar>0);
            if(!gc.length) return '<span style="font-size:12px;color:transparent">—</span>';
            const ort=Math.round(gc.reduce((s,g)=>s+g.tutar,0)/gc.length);
            return `<span style="font-size:12px;font-weight:800;color:${odendi?'var(--sub)':cfg.renk}">~${ort}₺ <span style="font-weight:600;opacity:.7">ort.</span></span>`;
          })()}
          ${gecmis.length>0?`<span style="font-size:12px;font-weight:700;color:var(--sub);background:var(--bg);border:1px solid var(--border);padding:1px 7px;border-radius:6px">${gecmis.length} ödeme</span>`:''}
        </div>
      </div>
      <div style="display:flex;gap:3px;flex-shrink:0;align-items:center;margin-left:auto">
        <button onclick="odemeAcikId=odemeAcikId==='${o.id}'?null:'${o.id}';render()" style="width:26px;height:26px;border-radius:7px;border:1.5px solid ${acik?cfg.renk:'var(--border)'};background:${acik?cfg.renk+'18':'var(--bg)'};cursor:pointer;display:flex;align-items:center;justify-content:center">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="${acik?cfg.renk:'currentColor'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        </button>
        <button onclick="takipDuzenle('odeme','${o.id}')" style="width:26px;height:26px;border-radius:7px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button onclick="takipSil('odeme','${o.id}')" style="width:26px;height:26px;border-radius:7px;border:1.5px solid #F0C8C8;background:#FAE8E8;cursor:pointer;display:flex;align-items:center;justify-content:center">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#C84848" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        </button>
      </div>
    </div>
    ${istatPanel}
  </div>`;
}

function todoKaydet(){
  const el=document.getElementById('todo-baslik');
  const baslik=(el?el.value:todoForm.baslik||'').trim();
  if(!baslik){showToast('Bir başlık gir 📝');return;}
  if(!state.todos)state.todos=[];
  if(!state.surezler)state.surezler=[];
  if(!state.istekler)state.istekler=[];
  const now=todayStr();
  const kayit={...todoForm,baslik,vade:todoForm.vade||'orta'};
  if(todoForm.id){
    state.todos=state.todos.map(t=>t.id===todoForm.id?kayit:t);
    showToast('Güncellendi ✓');
  } else {
    state.todos.push({...kayit,id:Date.now().toString(),tamamlandi:false,tamamlandiTarih:null,olusturmaTarih:now});
    showToast('Görev eklendi ✓');
  }
  todoForm=null;save();render();
}

function istekKaydet(){
  var el=document.getElementById('istek-baslik');
  var baslik=(el?el.value:istekForm.baslik||'').trim();
  if(!baslik){showToast('Başlık gir 📝');return;}
  if(!state.istekler)state.istekler=[];
  var kayit={...istekForm,baslik};
  if(istekForm.id){
    state.istekler=state.istekler.map(x=>x.id===istekForm.id?kayit:x);
    showToast('Güncellendi ✓');
  } else {
    state.istekler.push({...kayit,id:Date.now().toString(),tamamlandi:false});
    showToast('Eklendi ✓');
  }
  istekForm=null;save();render();
}

function surezKaydet(){
  const el=document.getElementById('todo-baslik');
  const baslik=(el?el.value:todoForm.baslik||'').trim();
  if(!baslik){showToast('Bir başlık gir 📝');return;}
  if(!todoForm.etiket){showToast('Bir etiket seç 🏷️');return;}
  if(!state.surezler)state.surezler=[];
  const kayit={...todoForm,baslik};
  delete kayit._sureziz;
  if(todoForm.id){
    state.surezler=state.surezler.map(x=>x.id===todoForm.id?kayit:x);
    showToast('Güncellendi ✓');
  } else {
    state.surezler.push({...kayit,id:Date.now().toString(),tamamlandi:false});
    showToast('Eklendi ✓');
  }
  todoForm=null;save();render();
}

function surezGrupToggle(k){  if(!state.surezGrupAcik)state.surezGrupAcik={};
  state.surezGrupAcik[k]=state.surezGrupAcik[k]===false?true:false;
  save();render();
}

function istekDuzenle(id){
  const t=(state.istekler||[]).find(x=>x.id===id);
  if(!t)return;
  istekForm={...t};render();
  setTimeout(function(){var el=document.getElementById('istek-baslik');if(el)el.focus();},80);
}

_ensureState();
applyDarkMode();
render();

// ── PULL TO REFRESH (soft) ──
(function(){
  let startY=0, pulling=false, indicator=null;
  const THRESHOLD=80;

  function createIndicator(){
    if(indicator)return;
    indicator=document.createElement('div');
    indicator.id='ptr-indicator';
    indicator.style.cssText='position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:center;height:0;overflow:hidden;z-index:999;transition:height .2s;background:#F5A888;';
    indicator.innerHTML='<div style="display:flex;align-items:center;gap:8px;font-family:Nunito,sans-serif;font-size:13px;font-weight:700;color:rgba(61,31,10,.75)"><svg id="ptr-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(61,31,10,.75)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transition:transform .3s"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg><span id="ptr-txt">Yenilemek için çek</span></div>';
    document.body.appendChild(indicator);
  }

  async function softRefresh(){
    if(window._fbUser&&window._fbUser.uid){
      try{
        const {getFirestore,doc,getDoc}=await import("https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js");
        const db=getFirestore();
        const snap=await getDoc(doc(db,"users",window._fbUser.uid));
        if(snap.exists()){
          const remote=JSON.parse(snap.data().state);
          Object.assign(state,remote);
          state._egzMerged=false;
          _ensureState();
          try{localStorage.setItem(SK,JSON.stringify(state));}catch{}
        }
      }catch(e){console.error('soft refresh err',e);}
    }
    render();
    showToast('Yenilendi ✓');
  }

  document.addEventListener('touchstart',e=>{
    if(document.documentElement.scrollTop===0) startY=e.touches[0].clientY, pulling=true;
  },{passive:true});

  document.addEventListener('touchmove',e=>{
    if(!pulling)return;
    createIndicator();
    const dy=e.touches[0].clientY-startY;
    if(dy<0){pulling=false;return;}
    const h=Math.min(dy*0.5,THRESHOLD);
    indicator.style.height=h+'px';
    const icon=document.getElementById('ptr-icon');
    const txt=document.getElementById('ptr-txt');
    if(icon)icon.style.transform=`rotate(${(h/THRESHOLD)*360}deg)`;
    if(txt)txt.textContent=h>=THRESHOLD*0.9?'Bırak, yenileniyor...':'Yenilemek için çek';
  },{passive:true});

  document.addEventListener('touchend',e=>{
    if(!pulling||!indicator)return;
    const h=parseFloat(indicator.style.height)||0;
    if(h>=THRESHOLD*0.9){
      indicator.style.height='50px';
      softRefresh().finally(()=>{
        setTimeout(()=>{if(indicator)indicator.style.height='0';},600);
      });
    } else {
      indicator.style.height='0';
    }
    pulling=false;
  },{passive:true});
})();
</script>
