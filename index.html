<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>

<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="hersey"/>

  const ctx=c.getContext('2d');

  ctx.fillText('🐰',32,36);
  document.getElementById('favicon').href=c.toDataURL('image/png');

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
button{cursor:pointer;-webkit-appearance:none;appearance:none;touch-action:manipulation;}
button *{pointer-events:none;}
button svg{pointer-events:none;display:block;}
html,body{background:#FDF8F4;}
body{font-family:'Nunito',sans-serif;color:#3D1F0A;padding-bottom:150px;overflow-y:scroll;scrollbar-width:none;-ms-overflow-style:none;}body::-webkit-scrollbar{display:none;}

:root{
  --bg:#FDF8F4;
  --card:#FFFFFF;
  --border:#D8CEC4;
  --text:#3D1F0A;
  --sub:#7A6858;
  --accent:#C86848;
  --accent2:#5A9E88;
  --accent3:#7A6EC4;
  --accent4:#C48830;
  --accent5:#4F90B8;
  --header-bg:linear-gradient(135deg,#F5A888 0%,#EDB888 100%);
  --btn-bg:#A86050;
  --nav-active:#3D1F0A;
  --nav-bg:#FFFCF9;
}

/* Header */
.header{
  background:linear-gradient(135deg,#F5A888 0%,#EDB888 100%);
  padding:calc(env(safe-area-inset-top,0px) + 16px) 20px 16px 20px;
  position:sticky;top:0;z-index:100;
  border-bottom:none;
}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;}
.header-greeting{font-size:12px;font-weight:700;color:rgba(61,31,10,.75);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:4px;}
.header-title{font-size:20px;font-weight:800;color:#3D1F0A;}
.add-btn{
  width:40px;height:36px;border-radius:50%;background:#3D1F0A;
  border:none;color:white;font-size:20px;font-weight:300;line-height:1;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:4px;
  box-shadow:0 4px 14px rgba(44,44,44,.25);
  transition:transform .15s,box-shadow .15s;
}
.add-btn:active{transform:scale(.92);box-shadow:0 2px 6px rgba(44,44,44,.15);}

/* Bottom nav */
/* Dikey Rail */
.rail{
  position:fixed;left:0;top:80px;bottom:0;
  width:52px;
  background:rgba(255,252,249,.97);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-right:1.5px solid var(--border);
  display:flex;flex-direction:column;align-items:center;
  padding:8px 4px calc(env(safe-area-inset-bottom,0px) + 8px);
  gap:2px;
  z-index:99;
  overflow-y:auto;
  scrollbar-width:none;
  -ms-overflow-style:none;
  -webkit-overflow-scrolling:touch;
}
.rail::-webkit-scrollbar{display:none;}
.rail-item{
  width:40px;height:40px;border-radius:12px;
  border:none;background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--sub);transition:background .15s;
  flex-shrink:0;padding:8px;box-sizing:border-box;
}
.rail-item svg{width:100%;height:100%;pointer-events:none;display:block;}
.rail-item.active{background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.1);}
.rail-sep{width:24px;height:1px;background:var(--border);margin:4px 0;flex-shrink:0;pointer-events:none;}

/* Content */
.content{padding:20px 20px 40px 68px;max-width:100%;margin:0;}

/* Section title */
.section-title{font-size:12px;font-weight:700;color:var(--sub);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:14px;}

/* Group filter pills */
.pills{display:flex;gap:8px;overflow-x:auto;padding-bottom:16px;scrollbar-width:none;justify-content:center;flex-wrap:wrap;}
.pills::-webkit-scrollbar{display:none;}
.pill{
  flex-shrink:0;padding:7px 16px;border-radius:100px;
  font-size:13px;font-weight:700;cursor:pointer;
  background:var(--card);border:1.5px solid var(--border);color:var(--sub);
  transition:all .15s;
}
.pill.active{color:white;border-color:transparent;} .pill.active.tumupill{color:#2C2C2C;}

/* Hobby card */
.hobby-row{
  display:flex;align-items:center;gap:4px;
  padding:4px 6px;background:var(--card);
  border-radius:0;height:40px;
}
.hobby-row-left{display:flex;align-items:center;gap:4px;width:112px;flex-shrink:0;min-width:0;}
.hobby-row-emoji{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.hobby-row-info{display:flex;flex-direction:column;min-width:0;}
.hobby-row-name{font-size:12px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;}
.hobby-row-streak{font-size:10px;font-weight:700;color:var(--sub);}
.hobby-row-dots{display:flex;gap:0;flex:1;align-items:center;}
.hobby-row-actions{display:flex;align-items:center;gap:0px;flex-shrink:0;}
.main-check{
  width:26px;height:26px;border-radius:6px;
  border:1.5px solid var(--border);background:white;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;flex-shrink:0;
  font-size:9px;font-weight:800;color:var(--sub);
}
.main-check.done{border-color:transparent;color:white;}
.streak{font-size:10px;font-weight:700;color:var(--sub);}

/* Week dots */
.week-row{display:flex;gap:2px;}
.week-cell{flex:1;display:flex;flex-direction:column;align-items:center;}
.week-label{display:none;}
.week-dot{
  flex:1;min-width:26px;max-width:52px;height:26px;border-radius:0;
  background:var(--border);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:6px;font-weight:800;color:var(--sub);
  transition:all .15s;
}
.week-dot.done{color:#3D1F0A;}
.week-dot:first-child{border-radius:6px 0 0 6px;}
.week-dot:last-child{border-radius:0 6px 6px 0;}
.week-dot.partial{background:#FFE8B0;}

/* Card footer */
.card-footer{display:flex;align-items:center;justify-content:space-between;}
.card-stat{font-size:12px;font-weight:600;color:var(--sub);}
.card-stat b{color:var(--text);}
.card-actions{display:flex;gap:6px;}
.icon-btn{
  width:30px;height:30px;border-radius:8px;border:none;
  background:var(--bg);cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;touch-action:manipulation;
  -webkit-user-select:none;user-select:none;
}
.icon-btn:active{background:var(--border);}

/* Empty state */
.empty{text-align:center;padding:60px 20px;}
.empty-emoji{font-size:52px;margin-bottom:16px;}
.empty-title{font-size:17px;font-weight:800;color:var(--text);margin-bottom:6px;}
.empty-sub{font-size:14px;font-weight:500;color:var(--sub);}

/* Archive section */
.archive-toggle{
  display:flex;align-items:center;gap:8px;padding:12px 0;
  cursor:pointer;font-size:13px;font-weight:700;color:var(--sub);
  background:none;border:none;width:100%;
}
.archive-card{
  background:var(--card);border-radius:16px;padding:14px 16px;
  margin-bottom:8px;border:1.5px solid var(--border);
  display:flex;align-items:center;gap:10px;opacity:.6;
}

/* Stats */
.stat-card{
  background:var(--card);border-radius:20px;padding:18px;
  margin-bottom:12px;border:1.5px solid var(--border);
}
.stat-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.stat-nums{display:flex;gap:0;margin-bottom:12px;border:1.5px solid var(--border);border-radius:14px;overflow:hidden;}
.stat-num-box{flex:1;padding:12px 8px;text-align:center;border-right:1.5px solid var(--border);}
.stat-num-box:last-child{border-right:none;}
.stat-big{font-size:20px;font-weight:800;color:var(--text);}
.stat-lbl{font-size:10px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;}
.progress-bar-wrap{border-radius:100px;background:var(--border);height:8px;overflow:hidden;margin-bottom:10px;}
.progress-bar-fill{height:100%;border-radius:100px;transition:width .6s;}
.heatmap{display:flex;flex-wrap:wrap;gap:3px;}
.heat-cell{width:13px;height:13px;border-radius:3px;background:var(--border);}
.heat-label{font-size:10px;font-weight:600;color:var(--sub);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}

/* Groups */
.group-card{
  background:var(--card);border-radius:20px;padding:18px;
  margin-bottom:12px;border:1.5px solid var(--border);
}
.group-name{font-size:16px;font-weight:800;color:var(--text);margin-bottom:4px;}
.group-count{font-size:12px;font-weight:600;color:var(--sub);}
.group-hobbies{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
.group-hobby-chip{
  display:flex;align-items:center;gap:5px;padding:5px 12px;
  border-radius:100px;font-size:12px;font-weight:700;
  background:var(--bg);color:var(--text);
}

/* Add form */
.form-sheet{padding:4px 0;}
.form-back{
  display:flex;align-items:center;gap:8px;background:none;border:none;
  cursor:pointer;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;
  color:var(--sub);padding:0 0 20px;
}
.form-title{font-size:22px;font-weight:800;color:var(--text);margin-bottom:24px;}
.field{margin-bottom:20px;}
.field-label{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;}
.field-input{
  width:100%;padding:14px 16px;border-radius:14px;
  border:1.5px solid var(--border);background:var(--card);
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:600;color:var(--text);
  outline:none;-webkit-appearance:none;
}
.field-input:focus{border-color:#A89080;}

/* Emoji picker */
.emoji-display{
  width:56px;height:56px;border-radius:16px;background:var(--bg);
  border:1.5px solid var(--border);display:flex;align-items:center;
  justify-content:center;font-size:28px;cursor:pointer;transition:background .15s;
}
.emoji-display:active{background:var(--border);}
.emoji-grid{
  display:flex;flex-wrap:wrap;gap:4px;padding:14px;
  background:var(--card);border-radius:16px;border:1.5px solid var(--border);
  margin-top:10px;max-height:160px;overflow-y:auto;
}
.emoji-opt{
  width:40px;height:40px;border-radius:10px;display:flex;
  align-items:center;justify-content:center;font-size:22px;cursor:pointer;
  transition:background .12s;
}
.emoji-opt:active{background:var(--border);}
.emoji-opt.sel{background:var(--border);}

/* Freq type */
.seg{display:flex;background:var(--bg);border-radius:14px;padding:4px;gap:4px;border:1.5px solid var(--border);}
.seg-btn{
  flex:1;padding:10px;border-radius:10px;border:none;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;color:var(--sub);background:transparent;transition:all .15s;
}
.seg-btn.active{background:var(--card);color:#3D1F0A;box-shadow:0 2px 8px rgba(0,0,0,.1);font-weight:800;}

/* Stepper */
.stepper{display:flex;align-items:center;gap:0;background:var(--bg);border-radius:14px;border:1.5px solid var(--border);overflow:hidden;width:fit-content;}
.step-btn{
  width:44px;height:44px;border:none;background:transparent;
  font-size:20px;font-weight:700;cursor:pointer;color:var(--text);
  font-family:'Nunito',sans-serif;transition:background .12s;
}
.step-btn:active{background:var(--border);}
.step-val{
  min-width:48px;text-align:center;font-size:17px;font-weight:800;
  color:var(--text);padding:0 4px;border-left:1.5px solid var(--border);border-right:1.5px solid var(--border);
  height:44px;display:flex;align-items:center;justify-content:center;
}
.step-hint{font-size:13px;font-weight:600;color:var(--sub);margin-left:12px;}

/* Tags */
.tag-row{display:flex;flex-wrap:wrap;gap:6px;}
.form-tag{
  padding:7px 14px;border-radius:100px;border:1.5px solid var(--border);
  font-size:13px;font-weight:700;cursor:pointer;color:var(--sub);background:var(--card);
  transition:all .15s;
}
.form-tag.active{background:#A86050;color:white;border-color:#3D1F0A;}

/* Color picker */
.color-row{display:flex;gap:8px;flex-wrap:wrap;}
.color-swatch{width:34px;height:34px;border-radius:10px;cursor:pointer;transition:transform .12s;border:2.5px solid transparent;}
.color-swatch.sel{border-color:var(--text);transform:scale(1.1);}

/* Save button */
.save-btn{
  width:100%;padding:16px;border-radius:16px;border:none;
  background:var(--text);color:white;font-family:'Nunito',sans-serif;
  font-size:16px;font-weight:800;cursor:pointer;margin-top:8px;
  transition:opacity .15s;
}
.save-btn:active{opacity:.85;}

/* Hint box */
.hint-box{
  background:var(--bg);border-radius:12px;padding:10px 14px;
  font-size:13px;font-weight:600;color:var(--sub);margin-top:8px;
  border:1.5px solid var(--border);
}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.4);
  display:flex;align-items:flex-end;justify-content:center;z-index:500;
  padding:0;
}
.modal-sheet{
  background:var(--card);padding:24px 24px 0;
  width:100%;max-width:480px;
  max-height:90vh;display:flex;flex-direction:column;
  border-radius:24px 24px 0 0;
}
.modal-scroll{overflow-y:auto;flex:1;padding-bottom:12px;}
.modal-footer{padding:12px 0 calc(env(safe-area-inset-bottom,0px) + 24px);border-top:1px solid var(--border);background:var(--card);}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 20px;}
.modal-title{font-size:18px;font-weight:800;color:var(--text);margin-bottom:8px;}
.modal-sub{font-size:14px;font-weight:500;color:var(--sub);margin-bottom:24px;line-height:1.5;}
.modal-btns{display:flex;flex-direction:column;gap:10px;}
.modal-btn-danger{width:100%;padding:15px;border-radius:14px;border:none;background:#FAD8D4;color:#A02020;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;}
.modal-btn-cancel{width:100%;padding:15px;border-radius:14px;border:none;background:var(--bg);color:var(--sub);font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;cursor:pointer;}



/* Sub tabs */
.sub-tabs{display:flex;background:var(--bg);border-radius:16px;padding:4px;gap:4px;border:1.5px solid var(--border);margin-bottom:20px;}
.sub-tab{flex:1;padding:9px;border-radius:12px;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;color:var(--sub);background:transparent;transition:all .15s;}
.sub-tab.active{background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.1);}


/* ── ANTRENMAN ── */
.kas-badge{display:inline-block;padding:3px 8px;border-radius:100px;font-size:10px;font-weight:700;background:var(--bg);color:var(--sub);border:1.5px solid var(--border);}
.egzersiz-card{background:var(--card);border-radius:16px;padding:14px 16px;margin-bottom:8px;border:1.5px solid var(--border);}
.set-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.set-num{width:24px;height:24px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--sub);flex-shrink:0;}
.set-input{width:60px;padding:8px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;text-align:center;color:var(--text);outline:none;}
.set-done{width:32px;height:32px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;}
.set-done.done{background:#B8DEC8;border-color:#88B898;}
.program-day{background:var(--card);border-radius:16px;padding:14px 16px;margin-bottom:8px;border:1.5px solid var(--border);display:flex;align-items:center;gap:12px;}
.program-day-num{width:36px;height:36px;border-radius:12px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--text);flex-shrink:0;}
.ant-stat-card{background:var(--card);border-radius:16px;padding:14px 16px;margin-bottom:8px;border:1.5px solid var(--border);}
.ant-chart{display:flex;align-items:flex-end;gap:4px;height:60px;margin-top:10px;}
.ant-bar{flex:1;border-radius:4px 4px 0 0;background:#A8D0E8;min-height:4px;transition:height .3s;}
.ant-bar-lbl{font-size:9px;font-weight:600;color:var(--sub);text-align:center;margin-top:3px;}

/* ── KALORI ── */
.kalori-hero{
  background:var(--card);border-radius:20px;padding:14px;
  margin-bottom:12px;border:1.5px solid var(--border);
}
.kalori-ring-wrap{display:flex;align-items:stretch;gap:16px;margin-bottom:16px;}
.kalori-ring{position:relative;width:90px;height:90px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.kalori-ring svg{width:90px;height:90px;transform:rotate(-90deg);}
.kalori-ring-bg{fill:none;stroke:var(--border);stroke-width:8;}
.kalori-ring-fill{fill:none;stroke:#D07060;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .6s;}
.kalori-ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.kalori-ring-num{font-size:18px;font-weight:800;color:var(--text);line-height:1;}
.kalori-ring-lbl{font-size:9px;font-weight:600;color:var(--sub);text-transform:uppercase;}
.kalori-macros{flex:1;display:flex;flex-direction:column;gap:4px;justify-content:space-between;}
.macro-row{display:flex;align-items:center;gap:8px;}
.macro-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.macro-name{font-size:12px;font-weight:600;color:var(--sub);flex:1;}
.macro-val{font-size:12px;font-weight:800;color:var(--text);}
.macro-bar-wrap{width:60px;height:5px;border-radius:3px;background:var(--border);overflow:hidden;}
.macro-bar{height:100%;border-radius:3px;}

.ogün-section{margin-bottom:12px;}
.ogün-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.ogün-title{font-size:13px;font-weight:800;color:var(--text);}
.ogün-kal{font-size:12px;font-weight:700;color:var(--sub);}
.besin-card{
  background:var(--card);border-radius:14px;padding:12px 14px;
  margin-bottom:6px;border:1.5px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.besin-emoji{font-size:20px;width:32px;text-align:center;flex-shrink:0;}
.besin-info{flex:1;min-width:0;}
.besin-name{font-size:14px;font-weight:700;color:var(--text);}
.besin-macros{font-size:11px;font-weight:600;color:var(--sub);margin-top:1px;}
.besin-kal{font-size:14px;font-weight:800;color:var(--text);flex-shrink:0;}
.besin-del{width:28px;height:28px;border-radius:8px;border:none;background:var(--bg);font-size:12px;cursor:pointer;flex-shrink:0;}
.add-besin-btn{
  width:100%;padding:11px;border-radius:12px;border:1.5px dashed var(--border);
  background:transparent;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;
  color:var(--sub);cursor:pointer;transition:all .15s;
}
.add-besin-btn:active{background:var(--bg);}

/* Su takibi */
.su-card{
  background:var(--card);border-radius:20px;padding:18px;
  margin-bottom:12px;border:1.5px solid var(--border);
}
.su-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.su-title{font-size:15px;font-weight:800;color:var(--text);}
.su-sub{font-size:12px;font-weight:600;color:var(--sub);}
.su-cups{display:flex;gap:6px;flex-wrap:wrap;}
.su-cup{
  width:36px;height:36px;border-radius:10px;border:1.5px solid var(--border);
  background:var(--bg);font-size:18px;cursor:pointer;

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

window._fbSignIn = async () => {
  try {
    const result = await signInWithPopup(auth, provider);
    if(result && result.user) syncUser(result.user);
  } catch(e) {
    // popup bloklandıysa redirect dene
    if(e.code === 'auth/popup-blocked' || e.code === 'auth/popup-closed-by-user') {
      signInWithRedirect(auth, provider);
    } else {
      console.error('signin error:', e.code, e.message);
      if(window.showToast) showToast('Giriş hatası: ' + (e.code||e.message));
    }
  }
};
window._fbSignOut = () => signOut(auth).then(() => { window._fbUser = null; render(); });

window._fbSave = async (data) => {
  if(!window._fbUser) return;
  try { await setDoc(doc(db,"users",window._fbUser.uid),{state:JSON.stringify(data)}); } catch(e){ console.error(e); }
};

async function syncUser(user) {
  window._fbUser = user;
  if(user) {
    try {
      const snap = await getDoc(doc(db,"users",user.uid));
      if(snap.exists()) {
        const remote = JSON.parse(snap.data().state);
        Object.assign(state, remote);
        try{ localStorage.setItem(SK, JSON.stringify(state)); } catch{}
      }
    } catch(e){ console.error(e); }
  }
  render();
}

// Redirect sonucunu yakala
getRedirectResult(auth).then(result => {
  if(result && result.user) syncUser(result.user);
}).catch(e => console.error('redirect result error:', e));

// Auth state değişikliklerini dinle
onAuthStateChanged(auth, user => {
  if(user) syncUser(user);
  else { window._fbUser = null; render(); }
});
</script>

function todayStr(){return new Date().toISOString().split("T")[0];}

function weekKey(ds){const d=new Date(ds||todayStr());return d.getFullYear()+"-W"+getWN(d.toISOString().split("T")[0]);}
function getLast7Days(){
  const today=new Date();
  const day=today.getDay(); // 0=Pazar
  const mondayOffset=day===0?-6:1-day; // pazartesiye mesafe
  const mon=new Date(today);
  mon.setDate(today.getDate()+mondayOffset);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d.toISOString().split("T")[0];});
}
function getLast7Weeks(){const w=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i*7);const k=weekKey(d.toISOString().split("T")[0]);if(!w.includes(k))w.push(k);}return w;}
function getLast28Days(){return Array.from({length:28},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(27-i));return d.toISOString().split("T")[0];});}

function updateNav(){
  const rail=document.getElementById("main-rail");
  if(!rail)return;

  const ITEMS=[
    {v:"tracker",      icon:SVG.tracker,  sep:false},
    {v:"stats",        icon:SVG.ilerleme, sep:false},
    {v:"",             sep:true},
    {v:"kalori",       icon:SVG.kalori,   sep:false},
    {v:"su",           icon:SVG.su,       sep:false},
    {v:"kilo",         icon:SVG.kilo,     sep:false},
    {v:"",             sep:true},
    {v:"antrenman",    icon:SVG.bugun,    sep:false},
    {v:"antrenman_program", icon:SVG.program, sep:false},
    {v:"antrenman_stats",   icon:SVG.ilerleme2||SVG.ilerleme, sep:false},
    {v:"",             sep:true},
    {v:"todo_kisa",    icon:SVG.todo,     sep:false},
    {v:"todo_orta",    icon:SVG.todo2, sep:false},
    {v:"todo_uzun",    icon:SVG.todo3, sep:false},
    {v:"todo_sureziz", icon:SVG.randevu,  sep:false},
    {v:"",             sep:true},
    {v:"takip_odeme",  icon:SVG.odeme,    sep:false},
    {v:"takip_harcama",icon:SVG.harcama,  sep:false},
    {v:"",             sep:true},
    {v:"ayarlar",      icon:SVG.ayarlar,  sep:false},
  ];

  const headerEl=document.querySelector('.header');
  if(headerEl){
    const hh=headerEl.getBoundingClientRect().height;
    document.documentElement.style.setProperty('--header-h', hh+'px');
    rail.style.top=hh+'px';
  }

  if(!rail.dataset.init){
    rail.dataset.init="1";
    ITEMS.forEach(function(item){
      if(item.sep){
        const sep=document.createElement('div');
        sep.className='rail-sep';
        sep.style.pointerEvents='none';
        rail.appendChild(sep);
        return;
      }
      const btn=document.createElement('button');
      btn.className='rail-item';
      btn.dataset.v=item.v;
      btn.innerHTML=item.icon||'';
      btn.addEventListener('click',function(e){
        e.stopPropagation();
        const v=this.dataset.v;
        if(v.startsWith('todo_')){
          todoVade=v.replace('todo_','');
          cv='todo';
        } else if(v.startsWith('takip_')){
          takipSekme=v.replace('takip_','');
          cv='takip';
        } else if(v==='su'||v==='kilo'){
          bsv=v; cv='kalori';
        } else if(v==='kalori'){
          bsv='kalori'; cv='kalori';
        } else {
          cv=v;
        }
        render();
      });
      rail.appendChild(btn);
    });
  }

  // Active durumu güncelle
  rail.querySelectorAll('.rail-item').forEach(function(btn){
    const v=btn.dataset.v;
    let isActive=false;
    if(v==='tracker') isActive=cv==='tracker'||cv==='add';
    else if(v==='stats') isActive=cv==='stats';
    else if(v==='kalori') isActive=cv==='kalori'&&bsv==='kalori';
    else if(v==='su') isActive=cv==='kalori'&&bsv==='su';
    else if(v==='kilo') isActive=cv==='kalori'&&bsv==='kilo';
    else if(v==='antrenman') isActive=cv==='antrenman';
    else if(v==='antrenman_program') isActive=cv==='antrenman_program';
    else if(v==='antrenman_stats') isActive=cv==='antrenman_stats';
    else if(v==='todo_kisa') isActive=cv==='todo'&&todoVade==='kisa';
    else if(v==='todo_orta') isActive=cv==='todo'&&todoVade==='orta';
    else if(v==='todo_uzun') isActive=cv==='todo'&&todoVade==='uzun';
    else if(v==='todo_sureziz') isActive=cv==='todo'&&todoVade==='sureziz';
    else if(v==='takip_odeme') isActive=cv==='takip'&&takipSekme==='odeme';
    else if(v==='takip_harcama') isActive=cv==='takip'&&takipSekme==='harcama';
    else if(v==='ayarlar') isActive=cv==='ayarlar';
    btn.classList.toggle('active',isActive);
  });
}

function showToast(m){
  let t=document.getElementById("toast-el");
  if(!t){t=document.createElement("div");t.id="toast-el";t.className="toast";document.body.appendChild(t);}
  t.textContent=m;t.style.opacity="1";t.style.transform="translateX(-50%) translateY(0)";
  if(tt)clearTimeout(tt);
  tt=setTimeout(()=>{t.style.opacity="0";t.style.transform="translateX(-50%) translateY(8px)";},2000);
}

// Log helpers
function getCount(id,key){return(state.logs[id]||[]).filter(k=>k===key||k.startsWith(key+"#")).length;}
function isDone(id,key,n){return getCount(id,key)>=n;}
function toggleLog(id,key,n){
  if(!state.logs[id])state.logs[id]=[];
  const ex=state.logs[id].filter(k=>k===key||k.startsWith(key+"#"));
  if(ex.length>=n)state.logs[id]=state.logs[id].filter(k=>k!==key&&!k.startsWith(key+"#"));
  else{const c=ex.length;state.logs[id].push(c===0?key:key+"#"+c);}
  save();render();
}
function getWeekDays(id,wk){
  const days=new Set();
  (state.logs[id]||[]).forEach(k=>{const b=k.split("#")[0];if(weekKey(b)===wk)days.add(b);});
  return days.size;
}
function toggleWeekDay(id,ds){
  if(!state.logs[id])state.logs[id]=[];
  const has=state.logs[id].includes(ds);
  if(has)state.logs[id]=state.logs[id].filter(k=>k!==ds);
  else state.logs[id].push(ds);
  save();render();
}
function getStreak(h){
  const{id,freq:{type,tpd,dpw}}=h;let s=0;
  if(type==="daily"){let d=new Date();while(true){const k=d.toISOString().split("T")[0];if(!isDone(id,k,tpd))break;s++;d.setDate(d.getDate()-1);}}
  else{let w=0;while(true){const d=new Date();d.setDate(d.getDate()-w*7);const k=weekKey(d.toISOString().split("T")[0]);if(getWeekDays(id,k)<dpw)break;s++;w++;}}
  return s;
}
function freqLabel(freq){
  if(freq.type==="daily")return freq.tpd===1?"Günlük":`Günde ${freq.tpd}x`;
  return `Haftada ${freq.dpw} gün`;
}

function buildHeader(){

  const grEmoji=hr<12?"☀️":hr<18?"🌤️":"🌙";
  const _ad=(state.kullaniciAdi||"").trim();
  const grFull=(_ad?gr+", "+_ad:gr)+" "+grEmoji;
  return `<div class="header">
    <div class="header-top">
      <div>
        <div class="header-greeting">${grFull}</div>
        <div class="header-title">${(function(){
        const ANA={tracker:'Alışkanlık',stats:'Alışkanlık',kalori:'Beslenme',su:'Beslenme',kilo:'Beslenme',antrenman:'Antrenman',antrenman_program:'Antrenman',antrenman_stats:'Antrenman',todo:'Yapılacak',takip:'Takip',ayarlar:'Ayarlar'};

        const takipAlt={odeme:'Ödeme',harcama:'Harcama'};
        const ana=ANA[cv]||'';
        let alt='';
        if(cv==='todo') alt=todoAlt[todoVade]||'';
        else if(cv==='takip') alt=takipAlt[takipSekme]||'';
        else if(cv==='kalori') alt={kalori:'Kalori',su:'Su Takibi',kilo:'Kilo Takibi'}[bsv]||'Kalori';
        else alt=ALT[cv]||'';
        return alt?ana+' <span style="opacity:.5;font-weight:600;font-size:16px">/ '+alt+'</span>':ana;
      })()}</div>
      </div>
      ${(cv==="tracker"||cv==="stats")?`<button class="add-btn" onclick="openAdd()" style="padding:0;text-align:center;vertical-align:middle">+</button>`:cv==="todo"?`<button class="add-btn" onclick="todoYeniAc()" style="padding:0;text-align:center;vertical-align:middle">+</button>`:cv==="takip"?`<button class="add-btn" onclick="takipYeniAc()" style="padding:0;text-align:center;vertical-align:middle">+</button>`:""}

function buildTracker(){
  const allActive=state.hobbies.filter(h=>!h.archived);
  const arch=state.hobbies.filter(h=>h.archived);
  let html="";

  if(!allActive.length){
    html+=`<div class="empty">
      <div class="empty-emoji">🌱</div>
      <div class="empty-title">Henüz hobi yok</div>
      <div class="empty-sub">Sağ üstteki + butonuna bas</div>
    </div>`;
  }

  // Grupları sırala, her grubu açılır/kapanır göster
  const tumGruplar=[...new Set([...state.groups,"Kişisel","Sağlık","Hobi","Diğer","Vitamin"])];
  tumGruplar.forEach((g,gi)=>{
    const grpHobiler=allActive.filter(h=>h.group===g);
    if(!grpHobiler.length) return;
    const grpColor=GROUP_COLORS[gi%GROUP_COLORS.length];
    const acik=groupAcik[g]!==false; // varsayılan açık
    html+=`<div style="margin-bottom:4px;border-radius:10px;overflow-x:auto;border:1px solid ${grpColor}">
      <button onclick="groupAcik['${esc(g)}']=groupAcik['${esc(g)}']===false?true:false;render()" style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:5px 10px;border-radius:0;border:none;background:var(--card);border-bottom:1px solid ${grpColor};cursor:pointer;font-family:'Nunito',sans-serif">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:10px;height:10px;border-radius:50%;background:${grpColor};flex-shrink:0"></div>
          <span style="font-size:13px;font-weight:800;color:var(--text)">${esc(g)}</span>
          <span style="font-size:11px;font-weight:600;color:var(--sub)">${grpHobiler.length}</span>
        </div>
        <span style="font-size:12px;color:var(--sub)">${acik?"▾":"▸"}</span>
      </button>
      ${acik?grpHobiler.map(h=>{
    const groupIdx=state.groups.indexOf(h.group);
    const cardBg=groupIdx>=0?GROUP_COLORS[groupIdx%GROUP_COLORS.length]:"#F0EDE8";
    const streak=getStreak(h);
    const freq=h.freq;
    const td=todayStr();
    const wk=weekKey(td);
    const keys=getLast7Days();
    const todayCount=freq.type==="daily"?getCount(h.id,td):getWeekDays(h.id,wk);
    const todayNeeded=freq.type==="daily"?freq.tpd:freq.dpw;
    const allDone=todayCount>=todayNeeded;
    let checkContent="";
    if(allDone) checkContent=todayNeeded===1?`<span style="font-size:18px">✓</span>`:`<span>${todayCount}/${todayNeeded}</span>`;
    else if(todayNeeded>1&&todayCount>0) checkContent=`<span>${todayCount}/${todayNeeded}</span>`;
    const checkonclick=freq.type==="daily"?`toggleLog('${h.id}','${td}',${freq.tpd})`:`toggleWeekDay('${h.id}','${td}')`;
    const dotCells=keys.map((key)=>{
      if(freq.type==="daily"){
        const cnt=getCount(h.id,key);const isDone=cnt>=freq.tpd;const isPartial=cnt>0&&!isDone;
        const bg=isDone?cardBg:isPartial?"#FFE090":cardBg+"60";
        const txtColor=isDone?"#3D1F0A":isPartial?"#8A6000":"var(--sub)";
        const mainTxt=isDone?(freq.tpd>1?`${cnt}/${freq.tpd}`:"✓"):isPartial?`${cnt}/${freq.tpd}`:"";
        const lbl=DAYS[dow(key)];const dayNum=key.slice(8);
        return `<div class="week-dot ${isDone?"done":isPartial?"partial":""}" style="background:${bg};color:${txtColor}" onclick="toggleLog('${h.id}','${key}',${freq.tpd})"><span style="font-size:7px;font-weight:700;opacity:.75">${lbl}</span><span style="font-size:9px;font-weight:800">${mainTxt||dayNum}</span></div>`;
      } else {
        const isDone2=getCount(h.id,key)>0;const bg2=isDone2?cardBg:cardBg+"60";
        const lbl2=DAYS[dow(key)];const dayNum2=key.slice(8);
        return `<div class="week-dot ${isDone2?"done":""}" style="background:${bg2};color:${isDone2?"#3D1F0A":"var(--sub)"}" onclick="toggleLog('${h.id}','${key}',1)"><span style="font-size:7px;font-weight:700;opacity:.75">${lbl2}</span><span style="font-size:9px;font-weight:800">${isDone2?"✓":dayNum2}</span></div>`;
      }
    }).join("");
    return `<div class="hobby-row" style="border-top:1px solid ${grpColor}">
      <div class="hobby-row-left">
        <span class="hobby-row-emoji" style="background:${cardBg};cursor:pointer" onclick="openHobiMenu('${h.id}')">${h.emoji}</span>
        <div class="hobby-row-info">
          <span class="hobby-row-name">${esc(h.name)}</span>
          ${streak>0?`<span class="hobby-row-streak">🔥${streak}</span>`:""}
        </div>
      </div>
      <div class="hobby-row-dots">${dotCells}</div>
      <div class="hobby-row-actions">
        <div class="main-check ${allDone?"done":""}" style="width:26px;height:26px;font-size:10px;border-radius:6px;${allDone?`background:${cardBg};filter:brightness(.85)`:`background:white`}" onclick="${checkonclick}">${checkContent||""}</div>
      </div>
    </div>`;
  }).join(""):""}
    </div>`;
  });

  // Archive
  if(arch.length){
    html+=`<button class="archive-toggle" onclick="toggleArch()">
      <span>${archOpen?"▾":"▸"}</span> Arşiv (${arch.length})
    </button>`;
    if(archOpen){
      arch.forEach(h=>html+=`<div class="archive-card">
        <span style="font-size:20px">${h.emoji}</span>
        <span style="flex:1;font-size:14px;font-weight:600;color:var(--sub)">${esc(h.name)}</span>
        <button class="icon-btn" onclick="unarchive('${h.id}')">↩️</button>
        <button class="icon-btn" onclick="deleteHobby('${h.id}')">🗑️</button>
      </div>`);
    }
  }
  html+=`<div style="height:20px"></div>`;
  return html;
}

function buildStats(){
  const active=state.hobbies.filter(h=>!h.archived);
  const tumGruplar=[...new Set([...state.groups,"Kişisel","Sağlık","Hobi","Diğer","Vitamin"])];
  if(!active.length)return `<div class="empty"><div class="empty-emoji">🎯</div><div class="empty-title">Henüz veri yok</div></div>`;
  if(typeof window.statsPeriod==='undefined')window.statsPeriod='hafta';

  let html=`<div style="display:flex;gap:0;background:var(--bg);border-radius:12px;padding:3px;margin-bottom:8px">
    ${['hafta','ay','yil'].map(p=>`<button onclick="window.statsPeriod='${p}';render()" style="flex:1;padding:7px;border:none;border-radius:9px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:${window.statsPeriod===p?'var(--card)':'transparent'};color:${window.statsPeriod===p?'var(--text)':'var(--sub)'};box-shadow:${window.statsPeriod===p?'0 1px 4px rgba(0,0,0,.1)':'none'}">${p==='hafta'?'Haftalık':p==='ay'?'Aylık':'Yıllık'}</button>`).join('')}
  </div>`;

  const bugun=new Date();let donemGunler=[];
  if(window.statsPeriod==='hafta'){
    const pzt=new Date(bugun);pzt.setDate(bugun.getDate()-((bugun.getDay()+6)%7));
    for(let i=0;i<7;i++){const d=new Date(pzt);d.setDate(pzt.getDate()+i);donemGunler.push(d.toISOString().slice(0,10));}
  } else if(window.statsPeriod==='ay'){
    const y=bugun.getFullYear(),m=bugun.getMonth();
    const days=new Date(y,m+1,0).getDate();
    for(let i=1;i<=days;i++)donemGunler.push(new Date(y,m,i).toISOString().slice(0,10));
  } else {
    const y=bugun.getFullYear();
    for(let m2=0;m2<12;m2++){const days=new Date(y,m2+1,0).getDate();for(let i=1;i<=days;i++)donemGunler.push(new Date(y,m2,i).toISOString().slice(0,10));}
  }

  // Genel özet
  let gTam=0,gTop=0;
  active.forEach(h=>{
    const freq=h.freq;
    donemGunler.forEach(d=>{
      if(freq.type==='daily'){gTop+=freq.tpd;gTam+=Math.min(freq.tpd,getCount(h.id,d));}
      else{gTop+=1;if(getCount(h.id,d)>0)gTam+=1;}
    });
  });
  const gOran=gTop>0?Math.round(gTam/gTop*100):0;
  const gRenk=gOran>=75?'#80B898':gOran>=45?'#D8A840':'#D07060';
  const gR=34,gC=2*Math.PI*gR,gDash=gC*gOran/100;

  html+=`<div style="background:var(--card);border-radius:14px;padding:10px 12px;margin-bottom:10px;border:1.5px solid var(--border);display:flex;align-items:center;gap:10px">
    <svg width="64" height="64" viewBox="0 0 84 84" style="flex-shrink:0">
      <circle cx="42" cy="42" r="${gR}" fill="none" stroke="var(--border)" stroke-width="8"/>
      <circle cx="42" cy="42" r="${gR}" fill="none" stroke="${gRenk}" stroke-width="8"
        stroke-dasharray="${gDash} ${gC-gDash}" stroke-dashoffset="${gC/4}" stroke-linecap="round"/>
      <text x="42" y="39" text-anchor="middle" font-family="Nunito,sans-serif" font-size="15" font-weight="800" fill="${gRenk}">%${gOran}</text>
      <text x="42" y="50" text-anchor="middle" font-family="Nunito,sans-serif" font-size="7" font-weight="600" fill="#9A8878">${gTam}/${gTop}</text>
    </svg>
    <div style="flex:1">
      <div style="font-size:11px;font-weight:700;color:var(--sub);margin-bottom:8px">${active.length} aktif alışkanlık</div>
      <div style="display:flex;gap:16px">
        <div><div style="font-size:20px;font-weight:800;color:var(--text)">${active.filter(h=>getStreak(h)>0).length}</div><div style="font-size:10px;color:var(--sub)">Aktif seri</div></div>
        <div><div style="font-size:20px;font-weight:800;color:var(--text)">${active.filter(h=>donemGunler.every(d=>getCount(h.id,d)>0)).length}</div><div style="font-size:10px;color:var(--sub)">Mükemmel</div></div>
      </div>
    </div>
  </div>`;

  // Gruplara göre 4'lü grid
  tumGruplar.forEach(g=>{
    const grpHobiler=active.filter(h=>h.group===g);
    if(!grpHobiler.length)return;
    const grpIdx=tumGruplar.indexOf(g);
    const grpRenk=GROUP_COLORS[grpIdx%GROUP_COLORS.length];

    html+=`<div style="margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
        <div style="width:8px;height:8px;border-radius:50%;background:${grpRenk};flex-shrink:0"></div>
        <span style="font-size:11px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.5px">${esc(g)}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px">`;

    grpHobiler.forEach(h=>{
      const freq=h.freq;const streak=getStreak(h);
      let tam=0,toplam=0;
      donemGunler.forEach(d=>{
        if(freq.type==='daily'){toplam+=freq.tpd;tam+=Math.min(freq.tpd,getCount(h.id,d));}
        else{toplam+=1;if(getCount(h.id,d)>0)tam+=1;}
      });
      const rate=toplam>0?Math.round(tam/toplam*100):0;
      const bRenk=rate>=75?'#80B898':rate>=45?'#D8A840':'#D07060';
      const R=20,C=2*Math.PI*R,dash=C*rate/100;

      html+=`<div style="background:var(--card);border-radius:10px;padding:5px 4px;border:1px solid ${grpRenk};display:flex;flex-direction:column;align-items:center;gap:2px">
        <svg width="38" height="38" viewBox="0 0 48 48">
          <circle cx="24" cy="24" r="${R}" fill="none" stroke="${grpRenk}" stroke-width="5"/>
          <circle cx="24" cy="24" r="${R}" fill="none" stroke="${bRenk}" stroke-width="5"
            stroke-dasharray="${dash} ${C-dash}" stroke-dashoffset="${C/4}" stroke-linecap="round"/>
          <text x="24" y="29" text-anchor="middle" font-family="Nunito,sans-serif" font-size="18">${h.emoji}</text>
        </svg>
        <div style="font-size:9px;font-weight:800;color:var(--text);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;padding:0 2px">${esc(h.name)}</div>
        <div style="display:flex;align-items:center;gap:4px">
          <span style="font-size:10px;font-weight:800;color:${bRenk}">%${rate}</span>
          <span style="font-size:9px;color:var(--sub)">${streak>0?`🔥${streak}`:'—'}</span>
        </div>
      </div>`;
    });

    html+=`</div></div>`;
  });

  html+=`<div style="height:20px"></div>`;
  return html;
}

      </div>
      ${eo?`<div class="emoji-grid" style="margin-bottom:10px">${EMOJIS.map(e=>`<div class="emoji-opt ${fs.emoji===e?"sel":""}" onclick="pickEmoji('${e}')">${e}</div>`).join("")}</div>`:""}
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
        <div class="seg" style="flex:1;margin:0">
          <button class="seg-btn ${freq.type==="daily"?"active":""}" onclick="setFT('daily')">Günlük</button>
          <button class="seg-btn ${freq.type==="weekly"?"active":""}" onclick="setFT('weekly')">Haftalık</button>
        </div>
        <div class="stepper" style="flex-shrink:0">
          <button class="step-btn" onclick="adj('${freq.type==="daily"?"tpd":"dpw"}',-1)">−</button>
          <div class="step-val">${freq.type==="daily"?freq.tpd:freq.dpw}</div>
          <button class="step-btn" onclick="adj('${freq.type==="daily"?"tpd":"dpw"}',1)">+</button>
        </div>
        <span style="font-size:11px;font-weight:600;color:var(--sub);flex-shrink:0">${freq.type==="daily"?"kez/gün":"gün/hafta"}</span>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px">
        ${([...new Set([...state.groups,"Kişisel","Sağlık","Hobi","Diğer","Vitamin"])]).map((g,gi)=>{const gc=GROUP_COLORS[gi%GROUP_COLORS.length];const isA=fs.group===g;return `<div class="form-tag" style="font-size:11px;padding:4px 10px;background:${isA?gc:'transparent'};border-color:${isA?'transparent':'var(--border)'};color:${isA?'#3D1F0A':'var(--sub)'};font-weight:${isA?800:600}" onclick="setFG('${esc(g)}')">${esc(g)}</div>`;}).join("")}
      </div>
      <div style="margin-bottom:10px">
        <div style="font-size:11px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Adımlar ${adimlar.length>0?`(${adimlar.length}/${maxAdim})`:""}</div>
        <div style="display:flex;flex-direction:column;gap:3px;margin-bottom:${adimlar.length<maxAdim?6:0}px">
          ${adimlar.map((a,i)=>adimDuzenlemeIdx===i
            ? `<div style="display:flex;align-items:center;gap:4px">
                <input id="adim-edit-${i}" class="field-input" value="${esc(a)}" style="flex:1;font-size:12px;padding:5px 8px" onkeydown="if(event.key==='Enter'){adimDuzenlemeBitir(${i})}"/>
                <button onclick="adimDuzenlemeBitir(${i})" style="padding:5px 8px;border:none;background:var(--text);color:white;border-radius:8px;cursor:pointer;font-size:11px;font-weight:700">✓</button>
                <button onclick="adimSil(${i})" style="width:26px;height:26px;border:none;background:var(--bg);border-radius:8px;cursor:pointer;font-size:13px;color:var(--sub)">×</button>
              </div>`
            : `<div style="padding:5px 8px;background:var(--bg);border-radius:8px">
                <div style="display:flex;align-items:center;gap:4px">
                  <span onclick="adimDuzenlemeAc(${i})" style="flex:1;font-size:12px;font-weight:600;color:var(--text);cursor:pointer">${esc(a)}</span>
                  <button onclick="adimNotAc(${i})" style="width:22px;height:22px;border:none;background:transparent;cursor:pointer;font-size:12px">📝</button>
                  <button onclick="adimSil(${i})" style="width:22px;height:22px;border:none;background:transparent;cursor:pointer;font-size:13px;color:var(--sub)">×</button>
                </div>
                ${(fs.adimNotlar||{})[i]?'<div style="font-size:10px;color:var(--sub);margin-top:2px">'+esc((fs.adimNotlar||{})[i])+'</div>':''}
              </div>`
          ).join("")}
        </div>
        ${adimlar.length<maxAdim?`<div style="display:flex;gap:6px">
          <input id="yeni-adim" class="field-input" placeholder="Adım ekle… (max ${maxAdim})" style="flex:1;font-size:12px;padding:6px 10px" onkeydown="if(event.key==='Enter'){event.preventDefault();adimEkle()}"/>
          <button onclick="adimEkle()" style="padding:6px 12px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer">+ Ekle</button>
        </div>`:`<div style="font-size:11px;color:var(--sub);font-weight:600;text-align:center">Maksimum ${maxAdim} adım</div>`}
      </div>
      <button class="save-btn" onclick="saveHobby()" style="margin-top:4px;padding:12px">${isEdit?"Kaydet":"Hobi Ekle"}</button>
    </div>
  </div>`;
}

function getKaloriGun(ds){return (state.kalori.gunler[ds]||{ogün:{sabah:[],ogle:[],aksam:[],atistirma:[]}})}
function saveKalori(){save();}
function kaloriTopla(items){return items.reduce((s,i)=>s+i.kal,0);}
function makroTopla(items,k){return items.reduce((s,i)=>s+(i[k]||0),0);}

function buildBeslenme(){
  return buildKalori();
}

function buildKalori(){
  const td=todayStr();
  const gun=getKaloriGun(td);
  const ogünler=gun.ogün;

  const tumBesinler=[...ogünler.sabah,...ogünler.ogle,...ogünler.aksam,...ogünler.atistirma];
  const topKal=kaloriTopla(tumBesinler);
  const topProtein=makroTopla(tumBesinler,'protein');
  const topKarb=makroTopla(tumBesinler,'karb');
  const topYag=makroTopla(tumBesinler,'yag');
  const hedef=state.kalori.hedef||2000;
  const pct=Math.min(1,topKal/hedef);
  const r=40;const circ=2*Math.PI*r;
  const dash=circ*(1-pct);

  let html=``;
  if(bsv==='su'){
    const suCount=((state.kalori.su||{})[todayStr()]||0);
    const suHedef=8;
    html+=`<div class="su-card">
      <div class="su-header">
        <div>
          <div class="su-title">💧 Su Takibi</div>
          <div class="su-sub">${suCount} / ${suHedef} bardak</div>
        </div>
        <div style="font-size:22px;font-weight:800;color:#3878A0">${suCount>=suHedef?'✓':suCount+'/'+suHedef}</div>
      </div>
      <div class="su-cups">
        ${Array.from({length:suHedef},(_,i)=>`<div class="su-cup ${i<suCount?'filled':''}" onclick="suToggle(${i},'${todayStr()}')">💧</div>`).join('')}
      </div>
      <div style="margin-top:16px;font-size:13px;font-weight:600;color:var(--sub)">Günlük hedef: <b style="color:var(--text)">${suHedef} bardak (${suHedef*250}ml)</b></div>
    </div>`;
    html+=`<div style="height:20px"></div>`;
    if(hedefDlg)html+=`<div class="modal-overlay" onclick="if(event.target===this){hedefDlg=false;render();}">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">Kalori Hedefi</div>
        <div style="margin:16px 0 20px">
          <input id="hedef-inp" class="field-input" type="number" placeholder="kcal" value="${state.kalori.hedef||2000}" style="font-size:24px;font-weight:800;text-align:center"/>
        </div>
        <div class="modal-btns">
          <button class="save-btn" onclick="hedefKaydet()" style="margin-top:0">Kaydet</button>
          <button class="modal-btn-cancel" onclick="hedefDlg=false;render()">Vazgeç</button>
        </div>
      </div>
    </div>`;
    return html;
  }

  if(bsv==='kilo'){
    const kiloLog=state.kalori.kilo||[];
    const sonKilo=kiloLog.length?kiloLog[kiloLog.length-1]:null;
    const ilkKilo=kiloLog.length>1?kiloLog[0]:null;
    const fark=sonKilo&&ilkKilo?(sonKilo.kg-ilkKilo.kg).toFixed(1):null;

    // ── Özet kart ──
    html+=`<div class="kilo-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div class="su-title">⚖️ Kilo Takibi</div>
        <button onclick="openKiloGir()" style="padding:7px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--sub);cursor:pointer">+ Gir</button>
      </div>
      ${sonKilo?`
        <div style="display:flex;align-items:flex-end;gap:10px;margin-bottom:4px">
          <div class="kilo-big">${sonKilo.kg}</div>
          <div class="kilo-unit" style="margin-bottom:6px">kg</div>
          ${fark!==null?`<div class="kilo-diff" style="background:${parseFloat(fark)<=0?'#B8E8C8':'#FAD8D4'};color:${parseFloat(fark)<=0?'#206040':'#A02020'};margin-bottom:6px">${parseFloat(fark)>0?'+':''}${fark} kg</div>`:''}
        </div>
        <div style="font-size:12px;font-weight:600;color:var(--sub)">Son giriş: ${sonKilo.ds}</div>
      `:`<div style="font-size:13px;color:var(--sub);margin-bottom:12px">Henüz kilo girilmedi</div>`}
    </div>`;

    // ── Çizgi grafik ──
    if(kiloLog.length>=1){
      const AYLAR_UZUN=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
      const AYLAR_KISA=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
      const now=new Date();
      const nowYil=now.getFullYear();
      const nowAy=now.getMonth();

      const mevcutYillar=[...new Set(kiloLog.map(k=>parseInt(k.ds.slice(0,4))))].sort();
      if(!mevcutYillar.includes(nowYil)) mevcutYillar.push(nowYil);
      mevcutYillar.sort();

      let filtreLog=[];
      if(kiloAralik==='ay'){
        filtreLog=kiloLog.filter(k=>{const d=new Date(k.ds+'T12:00:00');return d.getFullYear()===kiloYil&&d.getMonth()===kiloAy;});
      } else if(kiloAralik==='yil'){
        filtreLog=kiloLog.filter(k=>parseInt(k.ds.slice(0,4))===kiloYil);
      } else {
        filtreLog=[...kiloLog];
      }

      function buildKiloChart(data){
        const W=320,H=150,PL=38,PR=12,PT=16,PB=30,iW=W-PL-PR,iH=H-PT-PB;
        const refData=data.length>0?data:kiloLog;
        const minK=Math.min(...refData.map(x=>x.kg));
        const maxK=Math.max(...refData.map(x=>x.kg));
        const pad=(maxK-minK)<0.5?0.5:(maxK-minK)*0.18;
        const yMin=minK-pad,yMax=maxK+pad;
        const py=v=>PT+iH-((v-yMin)/(yMax-yMin))*iH;
        let gridLines='',yLabels='';
        for(let i=0;i<=4;i++){
          const v=yMin+(yMax-yMin)*(i/4),y=py(v);
          gridLines+=`<line x1="${PL}" y1="${y.toFixed(1)}" x2="${W-PR}" y2="${y.toFixed(1)}" stroke="#E8DDD4" stroke-width="1"/>`;
          yLabels+=`<text x="${PL-5}" y="${(y+3.5).toFixed(1)}" text-anchor="end" font-size="9" fill="#7A6858" font-family="Nunito,sans-serif" font-weight="600">${v.toFixed(1)}</text>`;
        }
        let xLabels='';
        if(kiloAralik==='ay'){
          const ayGun=new Date(kiloYil,kiloAy+1,0).getDate();
          [1,8,15,22,ayGun].forEach(g=>{
            const x=PL+((g-1)/(ayGun-1))*iW;
            xLabels+=`<text x="${x.toFixed(1)}" y="${H-6}" text-anchor="middle" font-size="8" fill="#7A6858" font-family="Nunito,sans-serif" font-weight="600">${g}</text>`;
          });
        } else if(kiloAralik==='yil'){
          for(let m=0;m<12;m++){
            const x=PL+(m/11)*iW;
            xLabels+=`<text x="${x.toFixed(1)}" y="${H-6}" text-anchor="middle" font-size="8" fill="#7A6858" font-family="Nunito,sans-serif" font-weight="600">${AYLAR_KISA[m]}</text>`;
          }
        } else {
          const n2=data.length;if(n2>1){const step=Math.max(1,Math.floor(n2/5));
          data.forEach((k,i)=>{if(i===0||i===n2-1||i%step===0){const d=new Date(k.ds+'T12:00:00'),x=PL+(i/(n2-1))*iW;
          xLabels+=`<text x="${x.toFixed(1)}" y="${H-6}" text-anchor="middle" font-size="8" fill="#7A6858" font-family="Nunito,sans-serif" font-weight="600">${(d.getMonth()+1)+'/'+(d.getFullYear()+'').slice(2)}</text>`;}});}
        }
        let pxFn;
        if(kiloAralik==='ay'){const ag=new Date(kiloYil,kiloAy+1,0).getDate();pxFn=(k)=>{const d=new Date(k.ds+'T12:00:00');return PL+((d.getDate()-1)/(ag-1))*iW;};}
        else if(kiloAralik==='yil'){pxFn=(k)=>{const d=new Date(k.ds+'T12:00:00');return PL+(d.getMonth()/11)*iW;};}
        else{pxFn=(k,i,arr)=>PL+(arr.length>1?i/(arr.length-1):0.5)*iW;}
        let area='',line='',dots='';
        if(data.length>=2){
          const pts=data.map((k,i,a)=>`${pxFn(k,i,a).toFixed(1)},${py(k.kg).toFixed(1)}`).join(' ');
          const ap=`M${pxFn(data[0],0,data).toFixed(1)},${py(data[0].kg).toFixed(1)} `+data.map((k,i,a)=>`L${pxFn(k,i,a).toFixed(1)},${py(k.kg).toFixed(1)}`).join(' ')+` L${pxFn(data[data.length-1],data.length-1,data).toFixed(1)},${(PT+iH).toFixed(1)} L${pxFn(data[0],0,data).toFixed(1)},${(PT+iH).toFixed(1)} Z`;
          area=`<path d="${ap}" fill="url(#kg-grad)"/>`;
          line=`<polyline points="${pts}" fill="none" stroke="#D07060" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
          dots=data.map((k,i,a)=>`<circle cx="${pxFn(k,i,a).toFixed(1)}" cy="${py(k.kg).toFixed(1)}" r="${data.length>30?2:3}" fill="#D07060" stroke="white" stroke-width="1.5"/>`).join('');
        } else if(data.length===1){
          dots=`<circle cx="${pxFn(data[0],0,[data[0]]).toFixed(1)}" cy="${py(data[0].kg).toFixed(1)}" r="4" fill="#D07060" stroke="white" stroke-width="1.5"/>`;
        }
        return `<svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block;overflow:visible;"><defs><linearGradient id="kg-grad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#D07060" stop-opacity="0.2"/><stop offset="100%" stop-color="#D07060" stop-opacity="0.01"/></linearGradient></defs>${gridLines}${yLabels}${xLabels}${area}${line}${dots}</svg>`;
      }

      const hasData=filtreLog.length>0;
      const minKF=hasData?Math.min(...filtreLog.map(x=>x.kg)):null;
      const maxKF=hasData?Math.max(...filtreLog.map(x=>x.kg)):null;
      const avgKF=hasData?filtreLog.reduce((s,k)=>s+k.kg,0)/filtreLog.length:null;
      const farkF=filtreLog.length>=2?(filtreLog[filtreLog.length-1].kg-filtreLog[0].kg):null;
      const farkStr=farkF!==null?((farkF>0?'+':'')+farkF.toFixed(1)):null;

      const ddStyle=`width:100%;padding:10px 14px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px;outline:none;-webkit-appearance:none;appearance:none;background-image:url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%228%22 viewBox=%220 0 12 8%22><path d=%22M1 1l5 5 5-5%22 stroke=%22%237A6858%22 stroke-width=%221.5%22 fill=%22none%22/></svg>');background-repeat:no-repeat;background-position:right 14px center;cursor:pointer`;

      let ayOptions='',yilOptions='';
      mevcutYillar.slice().reverse().forEach(y=>{
        for(let m=11;m>=0;m--){
          if(y>nowYil||(y===nowYil&&m>nowAy)) continue;
          const hasEntry=kiloLog.some(k=>{const d=new Date(k.ds+'T12:00:00');return d.getFullYear()===y&&d.getMonth()===m;});
          ayOptions+=`<option value="${y}-${m}" ${kiloYil===y&&kiloAy===m?'selected':''}>${AYLAR_UZUN[m]} ${y}</option>`;
        }
      });
      mevcutYillar.slice().reverse().forEach(y=>{
        yilOptions+=`<option value="${y}" ${kiloYil===y?'selected':''}>${y}</option>`;
      });

      html+=`<div class="kilo-card" style="padding:16px 14px 14px">
        <div style="display:flex;gap:4px;margin-bottom:12px">
          ${[['ay','Aylık'],['yil','Yıllık'],['tumu','Tümü']].map(([v,lb])=>`<button onclick="kiloAralik='${v}';render()" style="flex:1;padding:7px 4px;border-radius:10px;border:1.5px solid ${kiloAralik===v?'var(--text)':'var(--border)'};background:${kiloAralik===v?'var(--text)':'var(--bg)'};color:${kiloAralik===v?'white':'var(--sub)'};font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s">${lb}</button>`).join('')}
        </div>
        ${kiloAralik==='ay'?`<select onchange="const p=this.value.split('-');kiloYil=parseInt(p[0]);kiloAy=parseInt(p[1]);render()" style="${ddStyle}">${ayOptions}</select>`
        :kiloAralik==='yil'?`<select onchange="kiloYil=parseInt(this.value);render()" style="${ddStyle}">${yilOptions}</select>`
        :`<div style="font-size:13px;font-weight:700;color:var(--sub);margin-bottom:12px">Tüm geçmiş · ${kiloLog.length} giriş</div>`}
        <div style="margin-bottom:8px">${buildKiloChart(filtreLog)}</div>
        <div style="display:flex;border:1.5px solid var(--border);border-radius:12px;overflow:hidden">
          <div style="text-align:center;flex:1;padding:10px 6px">
            <div style="font-size:16px;font-weight:800;color:${hasData?'var(--text)':'var(--sub)'}">${hasData?minKF.toFixed(1):'—'}</div>
            <div style="font-size:9px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.5px">En düşük</div>
          </div>
          <div style="text-align:center;flex:1;padding:10px 6px;border-left:1.5px solid var(--border);border-right:1.5px solid var(--border)">
            <div style="font-size:16px;font-weight:800;color:${hasData?'var(--text)':'var(--sub)'}">${hasData?avgKF.toFixed(1):'—'}</div>
            <div style="font-size:9px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.5px">Ortalama</div>
          </div>
          <div style="text-align:center;flex:1;padding:10px 6px;border-right:1.5px solid var(--border)">
            <div style="font-size:16px;font-weight:800;color:${hasData?'var(--text)':'var(--sub)'}">${hasData?maxKF.toFixed(1):'—'}</div>
            <div style="font-size:9px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.5px">En yüksek</div>
          </div>
          <div style="text-align:center;flex:1;padding:10px 6px">
            <div style="font-size:16px;font-weight:800;color:${farkStr===null?'var(--sub)':parseFloat(farkStr)<=0?'#206040':'#A02020'}">${farkStr||'—'}</div>
            <div style="font-size:9px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.5px">Değişim</div>
          </div>
        </div>
      </div>`;
    }


  if(kiloDlg){
      html+=`<div class="modal-overlay" onclick="if(event.target===this){kiloDlg=false;render();}">
        <div class="modal-sheet">
          <div class="modal-handle"></div>
          <div class="modal-title">Kilo Gir</div>
          <div style="margin:16px 0 12px">
            <input id="kilo-inp" class="field-input" type="number" step="0.1" placeholder="örn. 68.5" style="font-size:24px;font-weight:800;text-align:center"/>
          </div>
          <div style="margin-bottom:16px">
            <div class="field-label" style="margin-bottom:6px">Tarih</div>
            <input id="kilo-tarih" class="field-input" type="date" value="${todayStr()}" style="font-size:15px;font-weight:600"/>
          </div>
          <div class="modal-btns">
            <button class="save-btn" onclick="kiloKaydet()" style="margin-top:0">Kaydet</button>
            <button class="modal-btn-cancel" onclick="kiloDlg=false;render()">Vazgeç</button>
          </div>
        </div>
      </div>`;
    }
    html+=`<div style="height:20px"></div>`;
    if(hedefDlg)html+=`<div class="modal-overlay" onclick="if(event.target===this){hedefDlg=false;render();}">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">Kalori Hedefi</div>
        <div style="margin:16px 0 20px">
          <input id="hedef-inp" class="field-input" type="number" placeholder="kcal" value="${state.kalori.hedef||2000}" style="font-size:24px;font-weight:800;text-align:center"/>
        </div>
        <div class="modal-btns">
          <button class="save-btn" onclick="hedefKaydet()" style="margin-top:0">Kaydet</button>
          <button class="modal-btn-cancel" onclick="hedefDlg=false;render()">Vazgeç</button>
        </div>
      </div>
    </div>`;
    return html;
  }

  html+=`<div class="kalori-hero">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <div class="kalori-ring">
        <svg viewBox="0 0 90 90"><circle class="kalori-ring-bg" cx="45" cy="45" r="${r}"/><circle class="kalori-ring-fill" cx="45" cy="45" r="${r}" stroke-dasharray="${circ}" stroke-dashoffset="${dash}"/></svg>
        <div class="kalori-ring-text">
          <div class="kalori-ring-num">${topKal}</div>
          <div class="kalori-ring-lbl">kcal</div>
        </div>
      </div>
      <div style="display:flex;gap:10px;flex:1;justify-content:space-around">
        ${[['P','#70A888',topProtein,hedef*0.3/4],['K','#C89020',topKarb,hedef*0.4/4],['Y','#C07060',topYag,hedef*0.3/9]].map(([lbl,clr,val,maks])=>{
          const mR=22,mC=2*Math.PI*mR,mRate=maks>0?Math.min(1,val/maks):0,mDash=mC*mRate;
          return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px">
            <div style="position:relative;width:52px;height:52px">
              <svg viewBox="0 0 52 52" width="52" height="52">
                <circle cx="26" cy="26" r="${mR}" fill="none" stroke="var(--border)" stroke-width="5"/>
                <circle cx="26" cy="26" r="${mR}" fill="none" stroke="${clr}" stroke-width="5"
                  stroke-dasharray="${mDash} ${mC-mDash}" stroke-dashoffset="${mC/4}" stroke-linecap="round"/>
                <text x="26" y="30" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" font-weight="800" fill="${clr}">${val}g</text>
              </svg>
            </div>
            <div style="font-size:10px;font-weight:700;color:var(--sub)">${lbl==='P'?'Protein':lbl==='K'?'Karb':'Yağ'}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px">
      <div style="border:1px solid var(--border);border-radius:10px;padding:8px 12px">
        <div style="font-size:13px;font-weight:600;color:var(--sub);margin-bottom:4px;display:flex;align-items:center;gap:6px">
          <span style="font-size:13px">🎯</span>
          <span style="flex:1">Hedef: <b style="color:var(--text)">${hedef} kcal</b></span>
          <button style="padding:2px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);font-family:'Nunito',sans-serif;font-size:10px;font-weight:700;color:var(--sub);cursor:pointer" onclick="bsv='kalori';hedefDlg=true;render()">Düzenle</button>
          </div>
          <div style="font-size:13px;font-weight:600;color:var(--sub);display:flex;align-items:center;gap:6px">
          <span style="font-size:13px">🔥</span><span style="flex:1">Kalan: <b style="color:${topKal>hedef?'#B03020':'var(--text)'}">${Math.max(0,hedef-topKal)} kcal</b></span>
        </div>

      </div>
    </div>
  </div>`;

  const ogünDefs=[['sabah','☀️ Sabah'],['ogle','🌤️ Öğle'],['aksam','🌙 Akşam'],['atistirma','🍎 Atıştırmalık']];
  ogünDefs.forEach(([key,label])=>{
    const items=ogünler[key]||[];
    const kal=kaloriTopla(items);
    html+=`<div class="ogün-section">
      <div class="ogün-header">
        <div class="ogün-title">${label}</div>
        <div class="ogün-kal">${kal} kcal</div>
      </div>`;
    items.forEach((b,bi)=>{
      html+=`<div class="besin-card">
        <div class="besin-emoji">${b.emoji||'🍽️'}</div>
        <div class="besin-info">
          <div class="besin-name">${esc(b.name)}</div>
          <div class="besin-macros">P: ${b.protein||0}g · K: ${b.karb||0}g · Y: ${b.yag||0}g</div>
        </div>
        <div class="besin-kal">${b.kal} kcal</div>
        <button class="besin-del" onclick="besinSil('${key}',${bi})">✕</button>
      </div>`;
    });
    html+=`<button class="add-besin-btn" onclick="besinEkleAc('${key}')">+ Besin Ekle</button>
    </div>`;
  });

  if(kform){
    const ogünLabel={'sabah':'Sabah','ogle':'Öğle','aksam':'Akşam','atistirma':'Atıştırmalık'}[kform.ogün];
    html+=`<div class="besin-form" id="besin-form-el">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div style="font-size:15px;font-weight:800;color:var(--text)">${ogünLabel} · Besin Ekle</div>
        <button onclick="besinKapat()" style="border:none;background:none;font-size:20px;cursor:pointer;color:var(--sub)">✕</button>
      </div>
      <div style="margin-bottom:12px">
        <button onclick="favAcik=!favAcik;render()" style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--sub);cursor:pointer;margin-bottom:6px">
          <span>⭐ Favorilerden Seç</span>
          <span>${favAcik?'▲':'▼'}</span>
        </button>
        ${favAcik?`<div style="display:flex;flex-wrap:wrap;gap:4px">
          ${(state.kalori.favoriler||[]).map(f=>`<div class="fav-chip" onclick="favEkle('${kform.ogün}','${f.id}')">${f.emoji} ${esc(f.name)} <span style="color:var(--sub);font-weight:600">${f.kal}kcal</span></div>`).join('')}
        </div>`:''}
      </div>
      <div class="field-label" style="margin-bottom:8px">Manuel Gir</div>
      <div style="margin-bottom:8px">
        <input id="b-name" class="field-input" placeholder="İsim"/>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:12px">
        <div><div class="field-label">Kalori</div><input id="b-kal" class="field-input" type="number" placeholder="0"/></div>
        <div><div class="field-label">Protein</div><input id="b-pro" class="field-input" type="number" placeholder="0g"/></div>
        <div><div class="field-label">Karb</div><input id="b-karb" class="field-input" type="number" placeholder="0g"/></div>
        <div><div class="field-label">Yağ</div><input id="b-yag" class="field-input" type="number" placeholder="0g"/></div>
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="besinKaydet('${kform.ogün}')" class="save-btn" style="margin-top:0">Ekle</button>
      </div>
    </div>`;
    setTimeout(()=>{const el=document.getElementById('besin-form-el');if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},50);
  }

  if(kiloDlg){
    html+=`<div class="modal-overlay" onclick="if(event.target===this){kiloDlg=false;render();}">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">Kilo Gir</div>
        <div style="margin:16px 0">
          <input id="kilo-inp" class="field-input" type="number" step="0.1" placeholder="örn. 68.5" style="font-size:24px;font-weight:800;text-align:center"/>
        </div>
        <div class="modal-btns">
          <button class="save-btn" onclick="kiloKaydet()" style="margin-top:0">Kaydet</button>
          <button class="modal-btn-cancel" onclick="kiloDlg=false;render()">Vazgeç</button>
        </div>
      </div>
    </div>`;
  }

  if(hedefDlg){
    html+=`<div class="modal-overlay" onclick="if(event.target===this){hedefDlg=false;render();}">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">Kalori Hedefi</div>
        <div style="margin:16px 0 20px">
          <input id="hedef-inp" class="field-input" type="number" placeholder="kcal" value="${state.kalori.hedef||2000}" style="font-size:24px;font-weight:800;text-align:center"/>
        </div>
        <div class="modal-btns">
          <button class="save-btn" onclick="hedefKaydet()" style="margin-top:0">Kaydet</button>
          <button class="modal-btn-cancel" onclick="hedefDlg=false;render()">Vazgeç</button>
        </div>
      </div>
    </div>`;
  }
  html += `<div style="height:20px"></div>`;
  return html;
}

function besinEkleAc(ogün){kform={ogün};render();setTimeout(()=>{const el=document.getElementById('besin-form-el');if(el)el.scrollIntoView({behavior:'smooth'});},80);}
function besinKapat(){kform=null;render();}
function favEkle(ogün,fid){
  const f=(state.kalori.favoriler||[]).find(x=>x.id===fid);if(!f)return;
  const td=todayStr();
  if(!state.kalori.gunler[td])state.kalori.gunler[td]={ogün:{sabah:[],ogle:[],aksam:[],atistirma:[]}};
  state.kalori.gunler[td].ogün[ogün].push({...f});
  kform=null;saveKalori();render();showToast(f.name+' eklendi ✓');
}
function besinKaydet(ogün){
  const emoji='🍽️';
  const name=document.getElementById('b-name')?.value?.trim()||'';
  const kal=parseInt(document.getElementById('b-kal')?.value)||0;
  const protein=parseInt(document.getElementById('b-pro')?.value)||0;
  const karb=parseInt(document.getElementById('b-karb')?.value)||0;
  const yag=parseInt(document.getElementById('b-yag')?.value)||0;
  if(!name){showToast('İsim gir 📝');return;}
  if(!kal){showToast('Kalori gir 📝');return;}
  const td=todayStr();
  if(!state.kalori.gunler[td])state.kalori.gunler[td]={ogün:{sabah:[],ogle:[],aksam:[],atistirma:[]}};
  state.kalori.gunler[td].ogün[ogün].push({emoji,name,kal,protein,karb,yag});
  kform=null;saveKalori();render();showToast(name+' eklendi ✓');
}
function besinSil(ogün,idx){
  const td=todayStr();
  if(state.kalori.gunler[td])state.kalori.gunler[td].ogün[ogün].splice(idx,1);
  saveKalori();render();
}
function suToggle(i,ds){
  const cur=(state.kalori.su||{})[ds]||0;
  if(!state.kalori.su)state.kalori.su={};
  state.kalori.su[ds]=i<cur?i:i+1;
  saveKalori();render();
}
function openKiloGir(){kiloDlg=true;render();}
function kiloKaydet(){
  const v=parseFloat(document.getElementById('kilo-inp')?.value);
  if(!v||v<20||v>300){showToast('Geçerli bir kilo gir');return;}
  const ds=document.getElementById('kilo-tarih')?.value||todayStr();
  if(!state.kalori.kilo)state.kalori.kilo=[];
  // Aynı tarihte kayıt varsa güncelle, yoksa ekle
  const idx=state.kalori.kilo.findIndex(k=>k.ds===ds);
  if(idx>=0)state.kalori.kilo[idx].kg=v;
  else{state.kalori.kilo.push({ds,kg:v});state.kalori.kilo.sort((a,b)=>a.ds.localeCompare(b.ds));}
  kiloDlg=false;saveKalori();render();showToast('Kilo kaydedildi ✓');
}
function setBsv(v){bsv=v;render();}
function setKaloriHedef(){hedefDlg=true;render();}
function hedefKaydet(){
  const v=parseInt(document.getElementById('hedef-inp')?.value);
  if(v&&v>0){state.kalori.hedef=v;saveKalori();showToast('Hedef güncellendi ✓');}
  hedefDlg=false;render();
}


function buildAntrenman(){
  const subv = cv==="antrenman_program"?"program":cv==="antrenman_stats"?"stats":"bugun";
  const td = todayStr();
  const gun = state.antrenman.gunluk[td] || {egzersizler:[]};

  let html = '';

  if(subv==="bugun"){
    if(!gun.egzersizler.length){
      html+=`<div class="empty"><div class="empty-emoji">🏋️</div><div class="empty-title">Bugün antrenman yok</div><div class="empty-sub">Aşağıdan egzersiz ekle</div></div>`;
    }
    gun.egzersizler.forEach((eg,ei)=>{
      const sets = eg.sets||[];
      const tip = eg.tip||"agirlik";
      html+=`<div class="egzersiz-card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div>
            <div style="font-size:15px;font-weight:800;color:var(--text)">${esc(eg.name)}</div>
            <span class="kas-badge">${esc(eg.kas||"")}</span>
          </div>
          <div style="display:flex;gap:6px">
            <button class="icon-btn" onclick="setEkle('${td}',${ei})">+ Set</button>
            <button class="icon-btn" onclick="egSil('${td}',${ei})" style="background:#FAD8D4">✕</button>
          </div>
        </div>`;
      sets.forEach((s,si)=>{
        if(tip==="agirlik"){
          html+=`<div class="set-row">
            <div class="set-num">${si+1}</div>
            <input class="set-input" type="number" placeholder="kg" value="${s.kg||""}" onchange="setUpdate('${td}',${ei},${si},'kg',this.value)" style="width:55px"/>
            <span style="font-size:12px;color:var(--sub);font-weight:600">kg</span>
            <input class="set-input" type="number" placeholder="tekrar" value="${s.reps||""}" onchange="setUpdate('${td}',${ei},${si},'reps',this.value)" style="width:65px"/>
            <span style="font-size:12px;color:var(--sub);font-weight:600">tekrar</span>
            <div class="set-done ${s.done?"done":""}" onclick="setDone('${td}',${ei},${si})">${s.done?"✓":"○"}</div>
          </div>`;
        } else {
          html+=`<div class="set-row">
            <div class="set-num">${si+1}</div>
            <input class="set-input" type="number" placeholder="dk" value="${s.sure||""}" onchange="setUpdate('${td}',${ei},${si},'sure',this.value)" style="width:65px"/>
            <span style="font-size:12px;color:var(--sub);font-weight:600">dakika</span>
            <div class="set-done ${s.done?"done":""}" onclick="setDone('${td}',${ei},${si})">${s.done?"✓":"○"}</div>
          </div>`;
        }
      });
      html+=`</div>`;
    });

    html+=`<div style="margin-top:4px">
      <div class="field-label" style="margin-bottom:8px">Egzersiz Ekle</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${(state.antrenman.egzersizler||[]).map(e=>`<div class="fav-chip" onclick="egEkle('${td}','${e.id}')">${e.name} <span style="color:var(--sub);font-size:11px">${e.kas}</span></div>`).join("")}
      </div>
    </div>`;
  }

  else if(subv==="program"){
    const HAFTAGUNLERI=["Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi","Pazar"];
    const program = state.antrenman.program||[];
    html+=`<div class="section-title">Haftalık Program</div>`;
    HAFTAGUNLERI.forEach((gun,gi)=>{
      const pg = program[gi]||{gunler:[]};
      const egListesi = (pg.egzersizler||[]).map(id=>(state.antrenman.egzersizler||[]).find(e=>e.id===id)?.name||id).join(", ");
      html+=`<div class="program-day">
        <div class="program-day-num">${gun.slice(0,2)}</div>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:800;color:var(--text)">${gun}</div>
          <div style="font-size:12px;font-weight:600;color:var(--sub);margin-top:2px">${egListesi||"Dinlenme günü"}</div>
        </div>
        <button class="icon-btn" onclick="programDuzenle(${gi})">✏️</button>
      </div>`;
    });

    if(typeof programDlg!=="undefined"&&programDlg!==null){
      const gi=programDlg;
      const pg=state.antrenman.program[gi]||{egzersizler:[]};
      html+=`<div class="modal-overlay" onclick="if(event.target===this){programDlg=null;render();}">
        <div class="modal-sheet">
          <div class="modal-handle"></div>
          <div class="modal-title">${HAFTAGUNLERI[gi]} Egzersizleri</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin:12px 0">
            ${(state.antrenman.egzersizler||[]).map(e=>{
              const sel=(pg.egzersizler||[]).includes(e.id);
              return `<div class="fav-chip" style="${sel?`background:${COLORS[2].bg};border-color:#8898C8`:""}" onclick="programToggle(${gi},'${e.id}')">${sel?"✓ ":""}${e.name}</div>`;
            }).join("")}
          </div>
          <button class="save-btn" onclick="programDlg=null;render()" style="margin-top:8px">Tamam</button>
        </div>
      </div>`;
    }
  }

  else if(subv==="stats"){
    html+=`<div class="section-title">Antrenman İlerleme</div>`;
    const son7=getLast7Days();
    const gunSayilari=son7.map(d=>(state.antrenman.gunluk[d]?.egzersizler||[]).length);
    const maxG=Math.max(...gunSayilari,1);
    html+=`<div class="ant-stat-card">
      <div style="font-size:14px;font-weight:800;color:var(--text);margin-bottom:4px">Son 7 Gün</div>
      <div style="font-size:12px;font-weight:600;color:var(--sub)">Günlük egzersiz sayısı</div>
      <div class="ant-chart">
        ${son7.map((d,i)=>{
          const h=Math.max(4,Math.round((gunSayilari[i]/maxG)*56));
          return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
            <div class="ant-bar" style="height:${h}px"></div>
            <div class="ant-bar-lbl">${DAYS[dow(d)]}</div>
          </div>`;
        }).join("")}
      </div>
    </div>`;

    const sayac={};
    Object.values(state.antrenman.gunluk).forEach(g=>(g.egzersizler||[]).forEach(e=>{sayac[e.name]=(sayac[e.name]||0)+1;}));
    const siralanmis=Object.entries(sayac).sort((a,b)=>b[1]-a[1]).slice(0,5);
    if(siralanmis.length){
      const maxS=siralanmis[0][1];
      html+=`<div class="ant-stat-card">
        <div style="font-size:14px;font-weight:800;color:var(--text);margin-bottom:12px">En Çok Yapılanlar</div>
        ${siralanmis.map(([n,s])=>`
        <div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:13px;font-weight:700;color:var(--text)">${esc(n)}</span>
            <span style="font-size:13px;font-weight:700;color:var(--sub)">${s}x</span>
          </div>
          <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${Math.round(s/maxS*100)}%;background:#A8D0E8"></div></div>
        </div>`).join("")}
      </div>`;
    }

    const pr={};
    Object.values(state.antrenman.gunluk).forEach(g=>(g.egzersizler||[]).forEach(e=>{
      (e.sets||[]).forEach(s=>{
        if(s.kg&&s.reps){const v=parseFloat(s.kg);if(!pr[e.name]||v>pr[e.name])pr[e.name]=v;}
      });
    }));
    const prList=Object.entries(pr).slice(0,5);
    if(prList.length){
      html+=`<div class="ant-stat-card">
        <div style="font-size:14px;font-weight:800;color:var(--text);margin-bottom:12px">🏆 Kişisel Rekortlar</div>
        ${prList.map(([n,v])=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:13px;font-weight:700;color:var(--text)">${esc(n)}</span>
          <span style="font-size:13px;font-weight:800;color:var(--text)">${v} kg</span>
        </div>`).join("")}
      </div>`;
    }
  }

  return html;
}

let programDlg=null;

function egEkle(ds,eid2){
  const eg=(state.antrenman.egzersizler||[]).find(e=>e.id===eid2);if(!eg)return;
  if(!state.antrenman.gunluk[ds])state.antrenman.gunluk[ds]={egzersizler:[]};
  state.antrenman.gunluk[ds].egzersizler.push({...eg,sets:[]});
  save();render();showToast(eg.name+' eklendi ✓');
}
function egSil(ds,idx){
  state.antrenman.gunluk[ds].egzersizler.splice(idx,1);
  save();render();
}
function setEkle(ds,ei){
  const eg=state.antrenman.gunluk[ds]?.egzersizler[ei];if(!eg)return;
  if(!eg.sets)eg.sets=[];
  eg.sets.push({kg:"",reps:"",sure:"",done:false});
  save();render();
}
function setUpdate(ds,ei,si,field,val){
  const s=state.antrenman.gunluk[ds]?.egzersizler[ei]?.sets[si];if(!s)return;
  s[field]=val;save();
}
function setDone(ds,ei,si){
  const s=state.antrenman.gunluk[ds]?.egzersizler[ei]?.sets[si];if(!s)return;
  s.done=!s.done;save();render();
}
function programDuzenle(gi){programDlg=gi;render();}
function programToggle(gi,eid2){
  if(!state.antrenman.program[gi])state.antrenman.program[gi]={egzersizler:[]};
  const arr=state.antrenman.program[gi].egzersizler;
  const idx=arr.indexOf(eid2);
  if(idx>=0)arr.splice(idx,1);else arr.push(eid2);
  save();render();
}

function buildModal(){
  const h=state.hobbies.find(x=>x.id===caid);

        <button class="modal-btn-danger" onclick="doArchive()">Evet, bırak</button>
